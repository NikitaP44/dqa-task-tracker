<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📌 Task Tracker</title>
<style id="app-style">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:inherit}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.toast{animation:slideIn .3s ease}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>
<body>
<div id="toastBox" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:340px"></div>
<div id="root"></div>
<script id="app-script">
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const CAT=[
  {id:'report',     label:'Report',            icon:'📊',color:'#6366f1'},
  {id:'outreaches', label:'Outreaches',         icon:'📣',color:'#f59e0b'},
  {id:'meeting',    label:'Meeting',            icon:'🤝',color:'#10b981'},
  {id:'preparation',label:'Preparation',        icon:'📋',color:'#3b82f6'},
  {id:'escalation', label:'Support Escalation', icon:'🚨',color:'#ef4444'},
  {id:'tools',      label:'Tools Training',     icon:'🛠️',color:'#8b5cf6'},
  {id:'skill',      label:'Skill Development',  icon:'📚',color:'#06b6d4'},
  {id:'adhoc',      label:'Adhoc',              icon:'⚡',color:'#f97316'},
];
const STS=[
  {id:'todo',       label:'Yet to Start',color:'#64748b',bg:'#f1f5f9'},
  {id:'inprogress', label:'In Progress', color:'#d97706',bg:'#fffbeb'},
  {id:'completed',  label:'Completed',   color:'#16a34a',bg:'#f0fdf4'},
];
const PRI=[
  {id:'high',  label:'High',  color:'#ef4444'},
  {id:'medium',label:'Medium',color:'#f59e0b'},
  {id:'low',   label:'Low',   color:'#22c55e'},
];

// ── STATE ──────────────────────────────────────────────────────────────────
let tasks    = lsLoad('tt_tasks',[]);
let settings = lsLoad('tt_settings',{ntfyEnabled:false,ntfyTopic:'',emailEnabled:false,emailjsServiceId:'',emailjsTemplateId:'',emailjsPublicKey:'',emailTo:'',iftttEnabled:false,iftttKey:''});
let fCat='all', fSt='all', now=new Date(), notified=new Set(), toastArr=[];
let showForm=false, editId=null, adhocMode=false, form=emptyF();
let showSt=false, stTab='browser', draftSt={...settings}, testSt={};

// ── HELPERS ────────────────────────────────────────────────────────────────
function lsLoad(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSave(k,v){
  try{
    localStorage.setItem(k,JSON.stringify(v));
    if(k==='tt_tasks') showSaveToast();
  }catch(e){ showErrToast('❌ Save failed — storage may be full.'); }
}
function showSaveToast(){
  toastArr=toastArr.filter(x=>x.type!=='saved');
  const aid=Date.now()+Math.random();
  toastArr.push({aid,type:'saved',msg:'✅ Tasks saved'});
  renderToasts();
  setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},2000);
}
function showErrToast(msg){
  const aid=Date.now()+Math.random();
  toastArr.push({aid,type:'overdue',msg});
  renderToasts();
  setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},5000);
}
function emptyF(){return{title:'',category:'adhoc',priority:'medium',startDate:'',startTime:'',dueDate:'',dueTime:'',notes:'',status:'todo'};}
function gc(id){return CAT.find(c=>c.id===id)||CAT[0];}
function gs(id){return STS.find(s=>s.id===id)||STS[0];}
function gp(id){return PRI.find(p=>p.id===id)||PRI[1];}
function fd(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):''}
function fdt(d,t){return d?fd(d)+(t?' at '+t:''):''}
function isDis(t){return t.status==='todo'&&t.startDate&&now>new Date(t.startDate+(t.startTime?'T'+t.startTime:'T00:00'));}
function isOv(t){return t.status!=='completed'&&t.dueDate&&now>new Date(t.dueDate+(t.dueTime?'T'+t.dueTime:'T23:59'));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isInIframe(){try{return window.self!==window.top;}catch{return true;}}
function getNP(){return('Notification' in window)?Notification.permission:'denied';}

// ── NOTIFICATIONS ──────────────────────────────────────────────────────────
function pushToast(id,type,msg){
  const k=id+'_'+type;
  if(notified.has(k))return false;
  notified.add(k);
  const aid=Date.now()+Math.random();
  toastArr.push({aid,type,msg});
  renderToasts();
  setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},9000);
  return true;
}
function renderToasts(){
  const b=document.getElementById('toastBox');
  if(!b)return;
  const bg={saved:'#dcfce7',disrupted:'#fef9c3',overdue:'#fee2e2'};
  const br={saved:'#86efac',disrupted:'#fde047',overdue:'#fca5a5'};
  b.innerHTML=toastArr.map(a=>`
    <div class="toast" style="background:${bg[a.type]||'#fee2e2'};border:1.5px solid ${br[a.type]||'#fca5a5'};border-radius:10px;padding:12px 14px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:13px;font-weight:500;display:flex;justify-content:space-between;gap:8px;pointer-events:all">
      <span>${esc(a.msg)}</span>
      <button data-action="dimToast" data-aid="${a.aid}" style="border:none;background:transparent;cursor:pointer;font-size:14px;color:#64748b;padding:0">✕</button>
    </div>`).join('');
}
function fireBrowser(title,body,tag){
  if('Notification' in window&&Notification.permission==='granted'){try{new Notification(title,{body,tag});}catch{}}
}
async function fireNtfy(title,body){if(!settings.ntfyEnabled||!settings.ntfyTopic)return;try{await fetch('https://ntfy.sh/'+settings.ntfyTopic,{method:'POST',headers:{Title:title,Priority:'high',Tags:'bell'},body});}catch{}}
async function fireEmail(subj,msg){if(!settings.emailEnabled||!settings.emailjsServiceId)return;try{await fetch('https://api.emailjs.com/api/v1.0/email/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service_id:settings.emailjsServiceId,template_id:settings.emailjsTemplateId,user_id:settings.emailjsPublicKey,template_params:{to_email:settings.emailTo,subject:subj,message:msg,time:new Date().toLocaleString('en-IN')}})});}catch{}}
async function fireIFTTT(v1,v2){if(!settings.iftttEnabled||!settings.iftttKey)return;try{await fetch('https://maker.ifttt.com/trigger/task_alert/with/key/'+settings.iftttKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value1:v1,value2:v2,value3:new Date().toLocaleString('en-IN')})});}catch{}}
function sendAlert(task,type){
  const isS=type==='disrupted';
  const title=isS?'⚠️ Not Started: '+task.title:'🔴 Overdue: '+task.title;
  const body=isS?'"'+task.title+'" planned to start '+fdt(task.startDate,task.startTime)+' — not started yet.':'"'+task.title+'" was due '+fdt(task.dueDate,task.dueTime)+' — not completed.';
  fireBrowser(title,body,type+'_'+task.id);
  fireNtfy(title,body);fireEmail(title,body);fireIFTTT(title,body);
}
function checkAlerts(){
  tasks.forEach(t=>{
    if(isDis(t)&&pushToast(t.id,'disrupted','⚠️ Not Started: '+t.title))sendAlert(t,'disrupted');
    if(isOv(t)&&pushToast(t.id,'overdue','🔴 Overdue: '+t.title))sendAlert(t,'overdue');
  });
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function openAdd(){form=emptyF();editId=null;adhocMode=false;showForm=true;render();}
function openAdhoc(){form={...emptyF(),category:'adhoc',priority:'high'};editId=null;adhocMode=true;showForm=true;render();}
function closeForm(){showForm=false;editId=null;adhocMode=false;render();}
function openSt(){draftSt={...settings};stTab='browser';testSt={};showSt=true;render();}
function closeSt(){showSt=false;render();}

function saveTask(){
  if(!form.title.trim()){showErrToast('⚠️ Please enter a task title.');return;}
  if(editId){
    ['disrupted','overdue'].forEach(t=>notified.delete(editId+'_'+t));
    tasks=tasks.map(x=>x.id===editId?{...x,...form}:x);editId=null;
  }else{
    tasks.push({...form,id:String(Date.now()),createdAt:new Date().toISOString()});
  }
  lsSave('tt_tasks',tasks);
  showForm=false;adhocMode=false;form=emptyF();render();
}
function updSt(id,status){
  ['disrupted','overdue'].forEach(t=>notified.delete(id+'_'+t));
  tasks=tasks.map(x=>x.id===id?{...x,status}:x);lsSave('tt_tasks',tasks);render();
}
function delTask(id){tasks=tasks.filter(x=>x.id!==id);lsSave('tt_tasks',tasks);render();}
function editTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  form={title:t.title,category:t.category,priority:t.priority,startDate:t.startDate||'',startTime:t.startTime||'',dueDate:t.dueDate||'',dueTime:t.dueTime||'',notes:t.notes||'',status:t.status};
  editId=id;adhocMode=false;showForm=true;render();
}
function saveSt(){settings={...draftSt};lsSave('tt_settings',settings);showSt=false;render();}
async function enBrowser(){
  if(!('Notification' in window)){showErrToast('❌ Notifications not supported here.');return;}
  await Notification.requestPermission();render();
  if(Notification.permission==='granted') fireBrowser('✅ Task Tracker Alerts Active','You will now be notified for missed and overdue tasks.','test');
}
async function tstNtfy(){
  testSt.ntfy='sending';render();
  try{const r=await fetch('https://ntfy.sh/'+draftSt.ntfyTopic,{method:'POST',headers:{Title:'✅ Task Tracker',Tags:'white_check_mark'},body:'Ntfy connected!'});testSt.ntfy=r.ok?'ok':'error';}
  catch{testSt.ntfy='error';}
  render();
}
async function tstIFTTT(){
  testSt.ifttt='sending';render();
  try{const r=await fetch('https://maker.ifttt.com/trigger/task_alert/with/key/'+draftSt.iftttKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value1:'✅ Task Tracker',value2:'IFTTT connected!',value3:new Date().toLocaleString('en-IN')})});testSt.ifttt=r.ok?'ok':'error';}
  catch{testSt.ifttt='error';}
  render();
}
function dlHTML(){
  const sty=document.getElementById('app-style').textContent;
  const scr=document.getElementById('app-script').textContent;
  const html='<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>📌 Task Tracker</title>\n<style id="app-style">'+sty+'</style>\n</head>\n<body>\n<div id="toastBox" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:340px"></div>\n<div id="root"></div>\n<script id="app-script">'+scr+'<\/script>\n</body>\n</html>';
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='TaskTracker.html';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(a.href);
}

// ── EVENT DELEGATION — replaces all inline onclick/oninput/onchange ────────
document.addEventListener('click', function(e){
  // Overlay close
  if(e.target.dataset.overlay==='form'){closeForm();return;}
  if(e.target.dataset.overlay==='settings'){closeSt();return;}

  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const {action,id,tab,aid}=btn.dataset;
  switch(action){
    case 'openAdd':       openAdd();break;
    case 'openAdhoc':     openAdhoc();break;
    case 'closeForm':     closeForm();break;
    case 'openSt':        openSt();break;
    case 'closeSt':       closeSt();break;
    case 'saveTask':      saveTask();break;
    case 'editTask':      editTask(id);break;
    case 'delTask':       if(confirm('Delete this task?'))delTask(id);break;
    case 'dlHTML':        dlHTML();break;
    case 'setStTab':      stTab=tab;render();break;
    case 'saveSt':        saveSt();break;
    case 'enBrowser':     enBrowser();break;
    case 'tstNtfy':       tstNtfy();break;
    case 'tstIFTTT':      tstIFTTT();break;
    case 'dimToast':      toastArr=toastArr.filter(x=>String(x.aid)!==String(aid));renderToasts();break;
    case 'clearFilters':  fCat='all';fSt='all';render();break;
  }
});

// Handles selects (filters, form fields, task status, settings)
document.addEventListener('change', function(e){
  const el=e.target;
  if(el.dataset.filter==='status'){fSt=el.value;render();return;}
  if(el.dataset.filter==='category'){fCat=el.value;render();return;}
  if(el.dataset.action==='updSt'){updSt(el.dataset.id,el.value);return;}
  if(el.dataset.field){form[el.dataset.field]=el.value;return;}
  if(el.dataset.draft){
    draftSt[el.dataset.draft]=el.type==='checkbox'?el.checked:el.value;return;
  }
});

// Handles text inputs and textareas
document.addEventListener('input', function(e){
  const el=e.target;
  if(el.dataset.field) form[el.dataset.field]=el.value;
  if(el.dataset.draft) draftSt[el.dataset.draft]=el.value;
});

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');if(!root)return;
  const today=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const cnt=STS.reduce((a,s)=>{a[s.id]=tasks.filter(t=>t.status===s.id).length;return a;},{});
  const disC=tasks.filter(isDis).length,ovC=tasks.filter(isOv).length;
  const np=getNP();
  const ach=[np==='granted'&&'🔔 Browser',settings.ntfyEnabled&&settings.ntfyTopic&&'📲 Ntfy',settings.emailEnabled&&settings.emailjsServiceId&&'📧 Email',settings.iftttEnabled&&settings.iftttKey&&'🔗 IFTTT'].filter(Boolean);
  const filtered=tasks.filter(t=>(fCat==='all'||t.category===fCat)&&(fSt==='all'||t.status===fSt))
    .sort((a,b)=>{const po={high:0,medium:1,low:2};if(isDis(a)!==isDis(b))return isDis(a)?-1:1;if(isOv(a)!==isOv(b))return isOv(a)?-1:1;return po[a.priority]-po[b.priority];});

  root.innerHTML=`
  <div style="background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:20px 24px 16px">
    <div style="max-width:900px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div>
          <h1 style="margin:0;font-size:22px;font-weight:700">📌 Task Tracker</h1>
          <p style="margin:4px 0 0;font-size:13px;opacity:.7">${today}</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          ${ach.length>0?`<span style="font-size:12px;background:rgba(34,197,94,.2);color:#86efac;border-radius:8px;padding:7px 12px;font-weight:600">🔔 ${ach.join(' · ')}</span>`:`<span data-action="openSt" style="font-size:12px;background:rgba(255,255,255,.1);color:#94a3b8;border-radius:8px;padding:7px 12px;font-weight:600;cursor:pointer">🔕 No Alerts</span>`}
          <button data-action="dlHTML" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer">⬇️ Download</button>
          <button data-action="openSt" style="background:#fff;color:#1e293b;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer">⚙️ Settings</button>
          <button data-action="openAdhoc" style="background:#f97316;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:600;font-size:13px;cursor:pointer">⚡ Adhoc</button>
          <button data-action="openAdd" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:600;font-size:13px;cursor:pointer">+ Add Task</button>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
        ${STS.map(s=>`<div style="background:rgba(255,255,255,.1);border-radius:8px;padding:6px 14px;font-size:13px"><span style="opacity:.8">${s.label}: </span><span style="font-weight:700">${cnt[s.id]}</span></div>`).join('')}
        ${disC>0?`<div style="background:rgba(234,179,8,.25);border-radius:8px;padding:6px 14px;font-size:13px">⚠️ Disrupted: <span style="font-weight:700;color:#fde047">${disC}</span></div>`:''}
        ${ovC>0?`<div style="background:rgba(239,68,68,.2);border-radius:8px;padding:6px 14px;font-size:13px">🔴 Overdue: <span style="font-weight:700;color:#fca5a5">${ovC}</span></div>`:''}
      </div>
    </div>
  </div>

  <div style="max-width:900px;margin:0 auto;padding:20px 16px">
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      <select data-filter="status" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;background:#fff;cursor:pointer">
        <option value="all" ${fSt==='all'?'selected':''}>All Statuses</option>
        ${STS.map(s=>`<option value="${s.id}" ${fSt===s.id?'selected':''}>${s.label}</option>`).join('')}
      </select>
      <select data-filter="category" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;background:#fff;cursor:pointer">
        <option value="all" ${fCat==='all'?'selected':''}>All Categories</option>
        ${CAT.map(c=>`<option value="${c.id}" ${fCat===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
      </select>
      ${(fCat!=='all'||fSt!=='all')?`<button data-action="clearFilters" style="border:1.5px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;background:#fff;cursor:pointer;color:#64748b">✕ Clear</button>`:''}
    </div>
    ${filtered.length===0
      ?`<div style="text-align:center;padding:60px 0;color:#94a3b8"><div style="font-size:40px;margin-bottom:12px">📭</div><div>No tasks yet — add one to get started!</div></div>`
      :filtered.map(t=>renderTask(t)).join('')}
  </div>
  ${showForm?renderForm():''}
  ${showSt?renderStModal():''}`;
}

function renderTask(t){
  const cat=gc(t.category),st=gs(t.status),pr=gp(t.priority),ov=isOv(t),dis=isDis(t);
  return `
  <div style="background:${dis?'#fefce8':t.status==='completed'?'#f8fafc':'#fff'};border:1.5px solid ${dis?'#fde047':ov?'#fca5a5':'#e2e8f0'};border-left:4px solid ${dis?'#eab308':ov?'#ef4444':cat.color};border-radius:10px;padding:14px 16px;margin-bottom:10px;opacity:${t.status==='completed'?.75:1};box-shadow:0 1px 3px rgba(0,0,0,.06)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <span>${cat.icon}</span>
          <span style="font-weight:600;font-size:15px;text-decoration:${t.status==='completed'?'line-through':'none'};color:${t.status==='completed'?'#94a3b8':'#1e293b'}">${esc(t.title)}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span style="font-size:11px;font-weight:600;color:${cat.color};background:${cat.color}18;border-radius:5px;padding:2px 8px">${cat.label}</span>
          <span style="font-size:11px;font-weight:600;color:${pr.color};background:${pr.color}18;border-radius:5px;padding:2px 8px">● ${pr.label}</span>
          ${dis?`<span style="font-size:11px;font-weight:700;color:#854d0e;background:#fef08a;border:1px solid #fde047;border-radius:5px;padding:2px 8px">⚠️ DISRUPTED</span>`:''}
          ${ov?`<span style="font-size:11px;font-weight:700;color:#991b1b;background:#fee2e2;border:1px solid #fca5a5;border-radius:5px;padding:2px 8px">🔴 OVERDUE</span>`:''}
          ${t.startDate?`<span style="font-size:11px;color:${dis?'#854d0e':'#64748b'}">🟢 ${fdt(t.startDate,t.startTime)}</span>`:''}
          ${t.dueDate?`<span style="font-size:11px;color:${ov?'#ef4444':'#64748b'}">📅 ${fdt(t.dueDate,t.dueTime)}</span>`:''}
        </div>
        ${t.notes?`<div style="font-size:12px;color:#64748b;margin-top:6px;font-style:italic">📝 ${esc(t.notes)}</div>`:''}
        ${dis?`<div style="font-size:11px;color:#92400e;margin-top:6px;background:#fef3c7;border-radius:5px;padding:4px 8px;display:inline-block">Planned to start ${fdt(t.startDate,t.startTime)} — not yet started</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <select data-action="updSt" data-id="${t.id}" style="border:1.5px solid ${st.color}40;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;background:${st.bg};color:${st.color};cursor:pointer;outline:none;min-width:130px">
          ${STS.map(s=>`<option value="${s.id}" ${t.status===s.id?'selected':''}>${s.label}</option>`).join('')}
        </select>
        <div style="display:flex;gap:6px">
          <button data-action="editTask" data-id="${t.id}" style="border:1.5px solid #e2e8f0;border-radius:6px;padding:4px 10px;font-size:12px;background:#fff;cursor:pointer;color:#475569">✏️</button>
          <button data-action="delTask"  data-id="${t.id}" style="border:1.5px solid #fee2e2;border-radius:6px;padding:4px 10px;font-size:12px;background:#fff;cursor:pointer;color:#ef4444">🗑️</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderForm(){
  return `
  <div data-overlay="form" style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px">
    <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="margin:0;font-size:17px;font-weight:700">${adhocMode?'⚡ Add Adhoc Task':editId?'✏️ Edit Task':'➕ Add Task'}</h2>
        <button data-action="closeForm" style="border:none;background:#f1f5f9;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">Task Title *</label>
          <input data-field="title" value="${esc(form.title)}" placeholder="What needs to be done?" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:14px;box-sizing:border-box;outline:none"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">Category</label>
            <select data-field="category" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;background:#fff;box-sizing:border-box">
              ${CAT.map(c=>`<option value="${c.id}" ${form.category===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
            </select>
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">Priority</label>
            <select data-field="priority" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;background:#fff;box-sizing:border-box">
              ${PRI.map(p=>`<option value="${p.id}" ${form.priority===p.id?'selected':''}>${p.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">🟢 Planned Start</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <input type="date" data-field="startDate" value="${form.startDate}" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;box-sizing:border-box"/>
            <input type="time" data-field="startTime" value="${form.startTime}" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;box-sizing:border-box"/>
          </div>
          <p style="margin:4px 0 0;font-size:11px;color:#94a3b8">Alert if not started ⚠️</p>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">📅 Due Date &amp; Time</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <input type="date" data-field="dueDate" value="${form.dueDate}" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;box-sizing:border-box"/>
            <input type="time" data-field="dueTime" value="${form.dueTime}" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;box-sizing:border-box"/>
          </div>
          <p style="margin:4px 0 0;font-size:11px;color:#94a3b8">Alert if not completed 🔴</p>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">Status</label>
          <select data-field="status" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;background:#fff;box-sizing:border-box">
            ${STS.map(s=>`<option value="${s.id}" ${form.status===s.id?'selected':''}>${s.label}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">Notes (optional)</label>
          <textarea data-field="notes" placeholder="Any additional context..." rows="2" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;resize:vertical;box-sizing:border-box;font-family:inherit">${esc(form.notes)}</textarea>
        </div>
        <button data-action="saveTask" style="background:${adhocMode?'#f97316':'#6366f1'};color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer">
          ${editId?'Save Changes':adhocMode?'⚡ Add Adhoc Task':'Add Task'}
        </button>
      </div>
    </div>
  </div>`;
}

function renderStModal(){
  const np=getNP();
  const tb=(id,label)=>`<button data-action="setStTab" data-tab="${id}" style="padding:8px 14px;font-size:13px;font-weight:600;border-radius:8px;border:none;cursor:pointer;background:${stTab===id?'#6366f1':'#f1f5f9'};color:${stTab===id?'#fff':'#475569'}">${label}</button>`;
  const tvBtn=(label,act,key)=>`<button data-action="${act}" style="background:${testSt[key]==='ok'?'#16a34a':testSt[key]==='error'?'#ef4444':'#1a73e8'};color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer">${testSt[key]==='sending'?'Sending…':testSt[key]==='ok'?'✓ Sent!':testSt[key]==='error'?'✗ Failed':label}</button>`;
  let body='';
  if(stTab==='browser'){
    body=`<div style="background:#f8fafc;border-radius:12px;padding:18px">
      <div style="font-weight:700;font-size:15px;margin-bottom:6px">🔔 Browser Notifications</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:16px">Instant pop-ups while tab is open. Requires HTTPS.</div>
      ${isInIframe()?`<div style="background:#fef9c3;border:1.5px solid #fde047;border-radius:10px;padding:14px;font-size:13px;color:#854d0e"><div style="font-weight:700;margin-bottom:6px">⚠️ Blocked inside preview iframe</div><ol style="padding-left:18px;line-height:2.2"><li>Click <strong>⬇️ Download</strong> in the header</li><li>Deploy to GitHub Pages or <a href="https://app.netlify.com/drop" target="_blank" style="color:#6366f1;font-weight:600">Netlify Drop</a></li><li>Open HTTPS URL → Settings → Enable ✅</li></ol></div>`
      :np==='granted'?`<div style="background:#dcfce7;color:#16a34a;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600">✅ Enabled — you will receive browser alerts.</div>`
      :np==='denied'?`<div style="background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px">❌ Blocked. Click the 🔒 lock icon in address bar → Notifications → Allow, then refresh.</div>`
      :`<button data-action="enBrowser" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%">Enable Browser Notifications</button>`}
    </div>`;
  }else if(stTab==='ntfy'){
    body=`<div style="display:flex;flex-direction:column;gap:14px">
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px"><div style="font-weight:700;font-size:14px;color:#1d4ed8;margin-bottom:4px">📲 Ntfy.sh — No account needed!</div><div style="font-size:12px;color:#3730a3">Push alerts in browser tab. Free &amp; instant.</div></div>
      <div><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">Topic Name</label>
      <input data-draft="ntfyTopic" value="${esc(draftSt.ntfyTopic||'')}" placeholder="e.g. nikita-tasks-2024" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;box-sizing:border-box"/></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" data-draft="ntfyEnabled" ${draftSt.ntfyEnabled?'checked':''} style="width:16px;height:16px"/> Enable Ntfy</label>
        ${tvBtn('Send Test','tstNtfy','ntfy')}
      </div>
      ${testSt.ntfy==='ok'?`<div style="font-size:12px;color:#16a34a;background:#dcfce7;border-radius:8px;padding:8px 12px">✅ Check ntfy.sh — notification sent!</div>`:''}
      ${testSt.ntfy==='error'?`<div style="font-size:12px;color:#ef4444;background:#fee2e2;border-radius:8px;padding:8px 12px">❌ Failed — check topic name.</div>`:''}
    </div>`;
  }else if(stTab==='email'){
    body=`<div style="display:flex;flex-direction:column;gap:14px">
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px"><div style="font-weight:700;font-size:14px;color:#16a34a;margin-bottom:4px">📧 Email via EmailJS</div><div style="font-size:12px;color:#166534">Alerts to inbox. Works even when browser is closed.</div></div>
      ${[['emailjsServiceId','Service ID','service_abc123'],['emailjsTemplateId','Template ID','template_xyz456'],['emailjsPublicKey','Public Key','user_XXXXXXX'],['emailTo','Send To','your@email.com']].map(([f,l,p])=>`<div><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">${l}</label><input data-draft="${f}" value="${esc(draftSt[f]||'')}" placeholder="${p}" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;box-sizing:border-box"/></div>`).join('')}
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" data-draft="emailEnabled" ${draftSt.emailEnabled?'checked':''} style="width:16px;height:16px"/> Enable Email</label>
    </div>`;
  }else{
    body=`<div style="display:flex;flex-direction:column;gap:14px">
      <div style="background:#fdf4ff;border:1px solid #e9d5ff;border-radius:10px;padding:14px"><div style="font-weight:700;font-size:14px;color:#7e22ce;margin-bottom:4px">🔗 IFTTT → Slack</div><div style="font-size:12px;color:#6b21a8">Posts to Slack via free IFTTT. No Slack admin needed.</div></div>
      <div><label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:5px">IFTTT API Key</label>
      <input data-draft="iftttKey" value="${esc(draftSt.iftttKey||'')}" placeholder="dXxXxXxXxXxXxXxXxX" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;box-sizing:border-box"/></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" data-draft="iftttEnabled" ${draftSt.iftttEnabled?'checked':''} style="width:16px;height:16px"/> Enable IFTTT</label>
        ${tvBtn('Send Test','tstIFTTT','ifttt')}
      </div>
      ${testSt.ifttt==='ok'?`<div style="font-size:12px;color:#16a34a;background:#dcfce7;border-radius:8px;padding:8px 12px">✅ Check your Slack!</div>`:''}
      ${testSt.ifttt==='error'?`<div style="font-size:12px;color:#ef4444;background:#fee2e2;border-radius:8px;padding:8px 12px">❌ Failed — check API key.</div>`:''}
    </div>`;
  }
  return `
  <div data-overlay="settings" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px">
    <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="margin:0;font-size:18px;font-weight:700">⚙️ Notification Settings</h2>
        <button data-action="closeSt" style="border:none;background:#f1f5f9;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:16px">✕</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap">
        ${tb('browser','🔔 Browser')}${tb('ntfy','📲 Ntfy.sh')}${tb('email','📧 Email')}${tb('ifttt','🔗 IFTTT→Slack')}
      </div>
      ${body}
      <button data-action="saveSt" style="width:100%;background:#6366f1;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px">Save Settings</button>
    </div>
  </div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────
render();
setInterval(()=>{now=new Date();checkAlerts();if(!showForm&&!showSt)render();},30000);
</script>
</body>
</html>
