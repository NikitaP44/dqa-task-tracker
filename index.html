<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>project44 · DQA Task Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:Arial,Helvetica,sans-serif;background:#F0F4F8;color:#000;display:flex;flex-direction:column}
input,select,textarea,button{font-family:Arial,Helvetica,sans-serif;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#c4c4c4;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── SETUP SCREEN ── */
.setup-screen{min-height:100vh;background:linear-gradient(135deg,#07456B 0%,#0072EC 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:#fff;border-radius:14px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:fadeUp .3s ease}
.setup-head{background:#07456B;padding:24px 28px}
.setup-logo{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.setup-logo-circle{width:38px;height:38px;background:#0072EC;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#fff}
.setup-logo-text{color:#fff;font-size:1.1rem;font-weight:700}
.setup-head p{color:rgba(255,255,255,.65);font-size:.8rem;margin-top:4px}
.setup-body{padding:24px 28px 28px}
.setup-step{display:flex;gap:12px;margin-bottom:16px;padding:12px;background:#F0F4F8;border-radius:8px}
.step-num{width:24px;height:24px;background:#0072EC;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:1px}
.step-body{flex:1}
.step-title{font-size:.82rem;font-weight:700;color:#07456B;margin-bottom:3px}
.step-desc{font-size:.73rem;color:#64748b;line-height:1.5}
.step-link{color:#0072EC;font-weight:700;text-decoration:none}
.step-link:hover{text-decoration:underline}
.setup-divider{border:none;border-top:1px solid #E6E6E6;margin:18px 0}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:.7rem;font-weight:700;color:#07456B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fg input{width:100%;padding:8px 11px;border:1.5px solid #E6E6E6;border-radius:6px;font-size:.85rem;color:#000;outline:none;transition:border-color .15s}
.fg input:focus{border-color:#0072EC}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg .hint{font-size:.68rem;color:#969696;margin-top:4px;line-height:1.4}
.fg .hint a{color:#0072EC}
.connect-btn{width:100%;padding:11px;background:#0072EC;color:#fff;border:none;border-radius:7px;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .15s;margin-top:6px}
.connect-btn:hover{background:#005cc5}
.connect-btn:disabled{background:#969696;cursor:not-allowed}
.setup-error{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:10px 12px;font-size:.77rem;color:#dc2626;margin-top:10px;display:none}

/* ── LOADING ── */
.loading-screen{min-height:100vh;background:linear-gradient(135deg,#07456B 0%,#0072EC 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:16px}
.spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
.loading-text{font-size:.88rem;color:rgba(255,255,255,.8)}

/* ── MAIN APP ── */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:228px;min-width:228px;background:#07456B;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:16px 15px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-row{display:flex;align-items:center;gap:9px}
.logo-circle{width:28px;height:28px;background:#0072EC;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:#fff;flex-shrink:0}
.logo-text{color:#fff;font-size:.82rem;font-weight:700;line-height:1.2}
.logo-sub{color:rgba(255,255,255,.42);font-size:.62rem}
.sb-users{padding:13px 13px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-label{color:rgba(255,255,255,.35);font-size:.6rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700}
.user-card{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .15s;border:1.5px solid transparent;margin-bottom:4px}
.user-card:hover{background:rgba(255,255,255,.07)}
.user-card.active{background:rgba(0,114,236,.28);border-color:rgba(0,114,236,.5)}
.u-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;color:#fff;flex-shrink:0}
.u-name{color:#fff;font-size:.76rem;font-weight:700}
.u-stat{color:rgba(255,255,255,.38);font-size:.61rem;margin-top:1px}
.u-badge{margin-left:auto;font-size:.61rem;font-weight:700;padding:1px 5px;border-radius:999px;background:rgba(239,68,68,.3);color:#fca5a5}
.sb-nav{padding:11px 13px;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.55);font-size:.79rem;font-weight:600;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:#0072EC;color:#fff}
.nav-icon{width:17px;text-align:center;font-size:.9rem;flex-shrink:0}
.sb-mystats{padding:12px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.ss-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ss-row span:first-child{color:rgba(255,255,255,.48);font-size:.7rem}
.ss-val{font-size:.72rem;font-weight:700;color:#fff;background:rgba(255,255,255,.1);padding:1px 6px;border-radius:3px}
.ss-val.red{background:rgba(239,68,68,.3);color:#fca5a5}
.ss-val.amber{background:rgba(248,198,34,.18);color:#F8C622}
.ss-val.green{background:rgba(5,165,80,.22);color:#6ee7b7}

/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{background:#0072EC;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left h1{font-size:.92rem;font-weight:700;color:#fff}
.tb-left p{font-size:.67rem;color:rgba(255,255,255,.65);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.tbtn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:.74rem;font-weight:700;transition:all .15s;white-space:nowrap}
.tbtn-white{background:#fff;color:#0072EC}.tbtn-white:hover{background:#e6e6e6}
.tbtn-gold{background:#F8C622;color:#07456B}.tbtn-gold:hover{background:#e6b81e}
.tbtn-outline{background:rgba(255,255,255,.13);color:#fff;border:1.5px solid rgba(255,255,255,.28)}.tbtn-outline:hover{background:rgba(255,255,255,.22)}
.tbtn-red{background:rgba(239,68,68,.2);color:#fca5a5;border:1.5px solid rgba(239,68,68,.3)}

/* SYNC STATUS */
.sync-bar{display:flex;align-items:center;gap:6px;font-size:.7rem;padding:4px 8px;border-radius:4px;white-space:nowrap}
.sync-ok{background:rgba(5,165,80,.2);color:#6ee7b7}
.sync-saving{background:rgba(248,198,34,.2);color:#F8C622;animation:pulse 1.5s infinite}
.sync-error{background:rgba(239,68,68,.2);color:#fca5a5}
.sync-spinner{width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:#F8C622;border-radius:50%;animation:spin .8s linear infinite}

/* VIEW TABS */
.view-tabs{display:flex;background:#fff;border-bottom:2px solid #E6E6E6;padding:0 20px;flex-shrink:0;gap:0}
.vt{padding:9px 14px;font-size:.76rem;font-weight:700;color:#969696;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:5px}
.vt:hover{color:#0072EC}
.vt.active{color:#0072EC;border-bottom-color:#0072EC}
.vt-count{background:#F0F4F8;color:#969696;font-size:.63rem;font-weight:700;padding:1px 6px;border-radius:3px}
.vt.active .vt-count{background:#0072EC;color:#fff}

/* KANBAN */
.kanban-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.kanban-filters{background:#fff;padding:9px 20px;border-bottom:1px solid #E6E6E6;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.fl{color:#969696;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.filter-chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:2px 9px;border-radius:3px;font-size:.69rem;font-weight:700;cursor:pointer;border:1.5px solid #E6E6E6;background:#F0F4F8;color:#969696;transition:all .12s}
.chip:hover{border-color:#0072EC;color:#0072EC}
.chip.on{background:#0072EC;color:#fff;border-color:#0072EC}
.search-wrap{margin-left:auto;display:flex;align-items:center;gap:5px;background:#F0F4F8;border:1.5px solid #E6E6E6;border-radius:5px;padding:4px 9px}
.search-wrap input{border:none;background:none;outline:none;font-size:.77rem;width:140px;color:#000}
.kanban-board{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px 20px;display:flex;gap:12px;align-items:flex-start}
.kb-col{width:238px;min-width:238px;display:flex;flex-direction:column;max-height:100%;flex-shrink:0}
.kb-col-head{background:#07456B;border-radius:7px 7px 0 0;padding:9px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.kbh-icon{font-size:.95rem;flex-shrink:0}
.kbh-label{color:#fff;font-size:.76rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kbh-counts{display:flex;gap:3px;align-items:center;flex-shrink:0}
.kbh-total{background:rgba(255,255,255,.16);color:#fff;font-size:.63rem;font-weight:700;padding:2px 6px;border-radius:3px}
.kbh-risk{background:rgba(239,68,68,.4);color:#fca5a5;font-size:.61rem;font-weight:700;padding:2px 5px;border-radius:3px;animation:pulse 2s infinite}
.kb-col-body{background:#E6ECF1;border-radius:0 0 7px 7px;padding:9px 8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;min-height:100px}
.risk-divider{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.risk-divider::before,.risk-divider::after{content:'';flex:1;height:1px;background:currentColor;opacity:.25}
.rd-risk{color:#dc2626}
.rd-high{color:#d97706}
.rd-normal{color:#969696}

/* KANBAN CARD */
.kb-card{background:#fff;border-radius:6px;padding:9px 10px;border-left:3px solid var(--lc,#0072EC);box-shadow:0 1px 3px rgba(0,0,0,.07);transition:box-shadow .15s;animation:fadeUp .18s ease;flex-shrink:0}
.kb-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12)}
.kb-card.is-overdue{border-left-color:#ef4444;background:#fffafa}
.kb-card.is-disrupted{border-left-color:#F8C622;background:#fffef5}
.kc-row{display:flex;align-items:center;justify-content:space-between;gap:5px;margin-bottom:5px}
.kc-badges{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.kc-actions{display:flex;gap:2px;flex-shrink:0}
.kc-btn{background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:3px;font-size:.76rem;color:#c4c4c4;transition:all .12s}
.kc-btn:hover{background:#F0F4F8;color:#000}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:3px;font-size:.61rem;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.b-overdue{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.b-disrupted{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.b-high{background:#ef4444;color:#fff}
.b-medium{background:#F8C622;color:#07456B}
.b-low{background:#05A550;color:#fff}
.b-owner{color:#fff}
.kc-name{font-size:.79rem;font-weight:700;color:#000;line-height:1.3;margin-bottom:5px;word-break:break-word}
.sts-btn{padding:2px 7px;border-radius:3px;font-size:.62rem;font-weight:700;cursor:pointer;border:1.5px solid;background:#fff;transition:all .12s;white-space:nowrap}
.kc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:5px;gap:4px}
.kc-due{font-size:.63rem;color:#969696;display:flex;align-items:center;gap:2px}
.kc-due.near{color:#d97706;font-weight:700}
.kc-due.past{color:#dc2626;font-weight:700}
.kc-customer{font-size:.61rem;color:#0072EC;font-weight:700;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-av{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.56rem;font-weight:700;color:#fff;border:2px solid #fff;flex-shrink:0}

/* MY TASKS */
.list-area{flex:1;overflow-y:auto;padding:14px 20px}
.list-filters{background:#fff;padding:9px 14px;border-radius:7px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #E6E6E6}
.task-grid{display:grid;gap:8px}
.task-card{background:#fff;border-radius:7px;padding:12px 14px;border:1px solid #E6E6E6;border-left:4px solid var(--lc,#0072EC);box-shadow:0 1px 3px rgba(0,0,0,.04);animation:fadeUp .18s ease}
.task-card.overdue{border-left-color:#ef4444}
.task-card.disrupted{border-left-color:#F8C622}
.tc-top{display:flex;align-items:flex-start;gap:8px}
.tc-icon{font-size:1rem;margin-top:1px;flex-shrink:0}
.tc-body{flex:1;min-width:0}
.tc-name{font-size:.86rem;font-weight:700;color:#000;word-break:break-word;line-height:1.3}
.tc-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;align-items:center}
.tc-dates{margin-top:3px;display:flex;gap:10px;font-size:.66rem;color:#969696;flex-wrap:wrap}
.tc-customer{font-size:.66rem;color:#0072EC;font-weight:700;margin-top:2px}
.tc-notes{font-size:.7rem;color:#4a5568;margin-top:5px;line-height:1.5;background:#F4F6F9;padding:5px 8px;border-radius:4px;border-left:3px solid #0072EC}
.tc-actions{display:flex;gap:3px;flex-shrink:0}
.tc-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;font-size:.8rem;color:#969696;transition:all .12s}
.tc-btn:hover{background:#F0F4F8;color:#000}
.empty-state{text-align:center;padding:50px 20px;color:#969696}
.empty-icon{font-size:2.5rem;margin-bottom:10px}
.empty-state h3{font-size:.88rem;color:#4a5568;font-weight:700;margin-bottom:5px}

/* STATS */
.stats-area{flex:1;overflow-y:auto;padding:14px 20px}

/* OVERLAY + MODAL */
.overlay{position:fixed;inset:0;background:rgba(7,69,107,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:#fff;border-radius:9px;width:100%;max-width:525px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .2s ease}
.modal-head{background:#0072EC;padding:13px 18px;border-radius:9px 9px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:.92rem;font-weight:700;color:#fff}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;padding:3px 7px;border-radius:4px;font-size:.9rem}
.modal-close:hover{background:rgba(255,255,255,.3)}
.modal-body{padding:17px 19px 20px}
.mfg{margin-bottom:11px}
.mfg label{display:block;font-size:.67rem;font-weight:700;color:#07456B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.mfg input,.mfg select,.mfg textarea{width:100%;padding:7px 10px;border:1.5px solid #E6E6E6;border-radius:5px;font-size:.82rem;color:#000;outline:none;transition:border-color .15s}
.mfg input:focus,.mfg select:focus,.mfg textarea:focus{border-color:#0072EC}
.mfg textarea{resize:vertical;min-height:60px}
.mfg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:8px}
.fbtn{padding:6px 15px;border-radius:5px;border:none;cursor:pointer;font-size:.79rem;font-weight:700;transition:all .15s}
.fbtn-cancel{background:#F0F4F8;color:#07456B;border:1.5px solid #E6E6E6}.fbtn-cancel:hover{background:#E6E6E6}
.fbtn-save{background:#0072EC;color:#fff}.fbtn-save:hover{background:#005cc5}

/* STABS */
.stabs{display:flex;border-bottom:2px solid #E6E6E6;margin-bottom:13px}
.stab{padding:7px 12px;font-size:.74rem;font-weight:700;color:#969696;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s}
.stab:hover{color:#0072EC}
.stab.active{color:#0072EC;border-bottom-color:#0072EC}

/* TOAST */
#toastBox{position:fixed;top:62px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;max-width:285px;pointer-events:none}
.toast-item{background:#07456B;color:#fff;padding:8px 12px;border-radius:5px;font-size:.76rem;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.25);border-left:4px solid #0072EC;animation:slideIn .22s ease}

@media(max-width:700px){
  .sidebar{width:185px;min-width:185px}
  .mfg-row,.fg-row{grid-template-columns:1fr}
  .kb-col{width:210px;min-width:210px}
}
</style>
</head>
<body>
<div id="toastBox"></div>
<div id="root"></div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const USERS=[
  {id:'nikita',name:'Nikita Tripathi',initials:'NT',role:'DQ Analyst',color:'#0072EC'},
  {id:'jayesh',name:'Jayesh Soni',    initials:'JS',role:'DQ Analyst',color:'#05A550'},
  {id:'shashi',name:'Shashi Sahu',    initials:'SS',role:'DQ Analyst',color:'#E98A2C'},
];
const CAT=[
  {id:'report',      label:'Report',            icon:'📊',color:'#0072EC'},
  {id:'outreaches',  label:'Outreaches',         icon:'📣',color:'#E98A2C'},
  {id:'meeting',     label:'Meeting',            icon:'🤝',color:'#05A550'},
  {id:'preparation', label:'Preparation',        icon:'📋',color:'#00AEEF'},
  {id:'escalation',  label:'Support Escalation', icon:'🚨',color:'#ef4444'},
  {id:'tools',       label:'Tools Training',     icon:'🛠️',color:'#7c3aed'},
  {id:'skill',       label:'Skill Development',  icon:'📚',color:'#07456B'},
  {id:'adhoc',       label:'Adhoc',              icon:'⚡',color:'#F8C622'},
];
const STS=[
  {id:'todo',       label:'Yet to Start',color:'#969696',bg:'#F4F6F9'},
  {id:'inprogress', label:'In Progress', color:'#E98A2C',bg:'#fffbeb'},
  {id:'completed',  label:'Completed',   color:'#05A550',bg:'#f0fdf4'},
];
const PRI=[
  {id:'high',  label:'High',  cls:'b-high'},
  {id:'medium',label:'Medium',cls:'b-medium'},
  {id:'low',   label:'Low',   cls:'b-low'},
];
const GH_API='https://api.github.com';
const DATA_FILE='tasks.json';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let ghConfig = lsLoad('tt_gh_config',null);  // {owner,repo,pat}
let fileSha   = null;   // current SHA of tasks.json in GitHub
let allTasks  = {};     // {nikita:[],jayesh:[],shashi:[]}
let syncStatus= 'ok';   // 'ok'|'saving'|'error'
let lastSynced= null;
let saveTimer = null;

let currentUser = lsLoad('tt_current_user','nikita');
let settings    = lsLoad('tt_settings',{browserEnabled:false});
USERS.forEach(u=>{ if(!allTasks[u.id]) allTasks[u.id]=[]; });

let navPage  = 'my';
let fCat='all', fSts='all', fSearch='', fMember='all';
let showForm=false, editId=null, form=emptyForm();
let showSettings=false, stab='github';
let notifPerm=('Notification' in window)?Notification.permission:'unsupported';
let notified=new Set();

function emptyForm(){
  return{name:'',category:'report',priority:'medium',status:'todo',
         startDate:'',dueDate:'',customer:'',notes:'',assignedTo:currentUser};
}

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════
function lsLoad(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ══════════════════════════════════════════
// GITHUB API
// ══════════════════════════════════════════
function ghHeaders(){
  return{
    'Authorization':'token '+ghConfig.pat,
    'Content-Type':'application/json',
    'Accept':'application/vnd.github.v3+json',
  };
}

async function ghLoadTasks(){
  try{
    const r=await fetch(`${GH_API}/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${DATA_FILE}`,{headers:ghHeaders()});
    if(r.status===404){
      // File doesn't exist yet — start fresh
      fileSha=null;
      USERS.forEach(u=>{allTasks[u.id]=[];});
      return true;
    }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    fileSha=d.sha;
    const decoded=JSON.parse(atob(d.content.replace(/\n/g,'')));
    USERS.forEach(u=>{ allTasks[u.id]=decoded[u.id]||[]; });
    lastSynced=new Date();
    return true;
  }catch(e){
    console.error('Load error',e);
    return false;
  }
}

async function ghSaveTasks(){
  try{
    syncStatus='saving'; renderSyncBar();
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(allTasks,null,2))));
    const body={message:`Update tasks ${new Date().toISOString()}`,content};
    if(fileSha) body.sha=fileSha;
    const r=await fetch(`${GH_API}/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${DATA_FILE}`,{
      method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    fileSha=d.content.sha;
    syncStatus='ok'; lastSynced=new Date();
    renderSyncBar();
  }catch(e){
    console.error('Save error',e);
    syncStatus='error';
    renderSyncBar();
    toast('❌ GitHub sync failed — check your token');
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  syncStatus='saving'; renderSyncBar();
  saveTimer=setTimeout(()=>ghSaveTasks(),1800);
}

function renderSyncBar(){
  const el=document.getElementById('syncBar');
  if(!el) return;
  if(syncStatus==='saving'){
    el.className='sync-bar sync-saving';
    el.innerHTML=`<div class="sync-spinner"></div>Saving…`;
  } else if(syncStatus==='error'){
    el.className='sync-bar sync-error';
    el.innerHTML=`⚠️ Sync error`;
  } else {
    el.className='sync-bar sync-ok';
    el.innerHTML=`✅ Synced${lastSynced?' '+lastSynced.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):''}`;
  }
}

async function ghTestConnection(owner,repo,pat){
  const r=await fetch(`${GH_API}/repos/${owner}/${repo}`,{
    headers:{'Authorization':'token '+pat,'Accept':'application/vnd.github.v3+json'}
  });
  return r.ok;
}

async function ghRefresh(){
  toast('🔄 Pulling latest from GitHub…');
  const ok=await ghLoadTasks();
  if(ok){toast('✅ Tasks refreshed from GitHub');render();}
  else{toast('❌ Could not reach GitHub');}
}

function weeklyDownload(){
  const data={exportedAt:new Date().toISOString(),version:'4.0',type:'github-team-backup',tasks:allTasks};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`DQA_Tasks_Weekly_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('📥 Weekly backup downloaded');
}

function downloadApp(){
  const src='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([src],{type:'text/html'}));
  a.download='TaskTracker_GitHub.html';a.click();
  toast('⬇️ App downloaded');
}

function disconnectGitHub(){
  if(!confirm('Disconnect GitHub? Your local tasks will stay until you reconnect.')) return;
  lsSave('tt_gh_config',null);
  ghConfig=null; fileSha=null;
  renderSetup();
}

// ══════════════════════════════════════════
// TASK CRUD
// ══════════════════════════════════════════
function saveTask(){
  if(!form.name.trim()){toast('⚠️ Task name is required');return;}
  const ownerId=form.assignedTo||currentUser;
  if(editId){
    USERS.forEach(u=>{allTasks[u.id]=allTasks[u.id].filter(t=>t.id!==editId);});
    allTasks[ownerId].push({...form,id:editId,ownerId,createdAt:new Date().toISOString()});
    toast('✅ Task updated');
  }else{
    allTasks[ownerId].push({...form,id:Date.now().toString(),ownerId,createdAt:new Date().toISOString()});
    toast('✅ Task added');
  }
  scheduleSave();
  showForm=false;editId=null;form=emptyForm();render();
}
function deleteTask(uid,id){
  if(!confirm('Delete this task?'))return;
  allTasks[uid]=allTasks[uid].filter(t=>t.id!==id);
  scheduleSave(); toast('🗑️ Deleted'); render();
}
function cycleStatus(uid,id){
  const order=['todo','inprogress','completed'];
  allTasks[uid]=allTasks[uid].map(t=>t.id!==id?t:{...t,status:order[(order.indexOf(t.status)+1)%order.length]});
  scheduleSave(); render();
}
function editTask(uid,id){
  const t=allTasks[uid].find(t=>t.id===id);if(!t)return;
  editId=id;
  form={name:t.name,category:t.category,priority:t.priority,status:t.status,
        startDate:t.startDate||'',dueDate:t.dueDate||'',customer:t.customer||'',
        notes:t.notes||'',assignedTo:t.ownerId||uid};
  showForm=true;render();
}

// ══════════════════════════════════════════
// FLAGS & SORT
// ══════════════════════════════════════════
function isOverdue(t){return t.status!=='completed'&&t.dueDate&&new Date(t.dueDate)<new Date();}
function isDisrupted(t){return t.status==='todo'&&t.startDate&&new Date(t.startDate)<new Date();}
function isDueSoon(t){if(!t.dueDate||t.status==='completed')return false;const h=(new Date(t.dueDate)-new Date())/3600000;return h>0&&h<24;}
function riskScore(t){
  if(isOverdue(t))return 0;if(isDisrupted(t))return 1;
  if(t.priority==='high')return 2;if(t.priority==='medium')return 3;return 4;
}
function sortedByRisk(arr){return[...arr].sort((a,b)=>riskScore(a)-riskScore(b));}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function el(t,c){const d=document.createElement(t);if(c)d.className=c;return d;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getCat(id){return CAT.find(c=>c.id===id)||CAT[0];}
function getSts(id){return STS.find(s=>s.id===id)||STS[0];}
function getUser(id){return USERS.find(u=>u.id===id)||USERS[0];}
function fmtDate(d){if(!d)return null;return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});}
function today(){return new Date().toISOString().split('T')[0];}
function toast(msg){
  const box=document.getElementById('toastBox');if(!box)return;
  const e=document.createElement('div');e.className='toast-item';e.textContent=msg;
  box.appendChild(e);setTimeout(()=>e.remove(),3000);
}
function userStats(uid){
  const t=allTasks[uid]||[];
  return{total:t.length,todo:t.filter(x=>x.status==='todo').length,
    inprog:t.filter(x=>x.status==='inprogress').length,done:t.filter(x=>x.status==='completed').length,
    overdue:t.filter(x=>isOverdue(x)).length,disrupted:t.filter(x=>isDisrupted(x)).length};
}

async function doConnect(){
  const owner=document.getElementById('inp-owner').value.trim();
  const repo=document.getElementById('inp-repo').value.trim();
  const pat=document.getElementById('inp-pat').value.trim();
  const errEl=document.getElementById('setup-error');
  const btn=document.getElementById('connect-btn');
  if(!owner||!repo||!pat){errEl.style.display='block';errEl.textContent='Please fill in all three fields.';return;}
  btn.disabled=true;btn.textContent='Connecting…';errEl.style.display='none';
  const ok=await ghTestConnection(owner,repo,pat);
  if(!ok){
    errEl.style.display='block';
    errEl.textContent='Could not connect. Check that the repo exists, the PAT is correct, and has repo scope.';
    btn.disabled=false;btn.textContent='🔗 Connect to GitHub';
    return;
  }
  ghConfig={owner,repo,pat};
  lsSave('tt_gh_config',ghConfig);
  renderLoading('Loading team tasks from GitHub…');
  const loaded=await ghLoadTasks();
  if(!loaded){
    renderLoading('Could not load tasks. Check console.');
    return;
  }
  render();
}

// KANBAN
// ══════════════════════════════════════════
function renderKanban(content){
  const wrap=el('div','kanban-wrap');content.appendChild(wrap);
  const fb=el('div','kanban-filters');
  fb.innerHTML=`<span class="fl">Status</span>
    <div class="filter-chips">
      <span class="chip ${fSts==='all'?'on':''}" onclick="fSts='all';render()">All</span>
      ${STS.map(s=>`<span class="chip ${fSts===s.id?'on':''}" onclick="fSts='${s.id}';render()">${s.label}</span>`).join('')}
    </div>
    <div style="width:1px;height:20px;background:#E6E6E6;flex-shrink:0"></div>
    <div class="search-wrap"><span>🔍</span><input type="text" value="${esc(fSearch)}" placeholder="Search…" oninput="fSearch=this.value;render()"></div>`;
  wrap.appendChild(fb);

  const board=el('div','kanban-board');wrap.appendChild(board);

  let pool=[];
  const members=fMember==='all'?USERS.map(u=>u.id):[fMember];
  members.forEach(uid=>{(allTasks[uid]||[]).forEach(t=>pool.push({...t,_uid:uid}));});
  pool=pool.filter(t=>{
    const sOk=fSts==='all'||t.status===fSts;
    const srOk=!fSearch||[t.name,t.customer||'',t.notes||''].join(' ').toLowerCase().includes(fSearch.toLowerCase());
    return sOk&&srOk;
  });

  CAT.forEach(cat=>{
    const col=sortedByRisk(pool.filter(t=>t.category===cat.id));
    const riskCnt=col.filter(t=>isOverdue(t)||isDisrupted(t)).length;
    const hiCnt=col.filter(t=>!isOverdue(t)&&!isDisrupted(t)&&t.priority==='high').length;
    const kCol=el('div','kb-col');
    const head=el('div','kb-col-head');
    head.innerHTML=`<span class="kbh-icon">${cat.icon}</span><span class="kbh-label">${cat.label}</span>
      <div class="kbh-counts">
        ${riskCnt>0?`<span class="kbh-risk">🔴${riskCnt}</span>`:''}
        ${hiCnt>0?`<span class="kbh-total" style="background:rgba(248,198,34,.3);color:#F8C622">⭐${hiCnt}</span>`:''}
        <span class="kbh-total">${col.length}</span>
      </div>`;
    kCol.appendChild(head);
    const body=el('div','kb-col-body');
    kCol.appendChild(body);
    const atRisk=col.filter(t=>isOverdue(t)||isDisrupted(t));
    const hiPri=col.filter(t=>!isOverdue(t)&&!isDisrupted(t)&&t.priority==='high');
    const normal=col.filter(t=>!isOverdue(t)&&!isDisrupted(t)&&t.priority!=='high');
    if(atRisk.length>0){body.appendChild(divEl('🔴 At Risk','rd-risk'));atRisk.forEach(t=>body.appendChild(kCard(t)));}
    if(hiPri.length>0){body.appendChild(divEl('⭐ High Priority','rd-high'));hiPri.forEach(t=>body.appendChild(kCard(t)));}
    if(normal.length>0){if(atRisk.length>0||hiPri.length>0)body.appendChild(divEl('Normal','rd-normal'));normal.forEach(t=>body.appendChild(kCard(t)));}
    board.appendChild(kCol);
  });
}
function divEl(label,cls){
  const d=el('div','risk-divider '+cls);d.innerHTML=`<span>${label}</span>`;return d;
}
function kCard(t){
  const over=isOverdue(t),dis=isDisrupted(t),soon=isDueSoon(t);
  const sts=getSts(t.status),owner=getUser(t._uid),cat=getCat(t.category);
  const card=el('div','kb-card'+(over?' is-overdue':dis?' is-disrupted':''));
  card.style.setProperty('--lc',cat.color);
  const dueCls=over?'past':soon?'near':'';
  card.innerHTML=`
    <div class="kc-row">
      <div class="kc-badges">
        ${over?'<span class="badge b-overdue">🔴 Overdue</span>':dis?'<span class="badge b-disrupted">⚠️ Disrupted</span>':''}
        <span class="badge ${PRI.find(p=>p.id===t.priority)?.cls||'b-medium'}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>
      </div>
      <div class="kc-actions">
        <button class="kc-btn" onclick="editTask('${t._uid}','${t.id}')">✏️</button>
        <button class="kc-btn" onclick="deleteTask('${t._uid}','${t.id}')">🗑️</button>
      </div>
    </div>
    <div class="kc-name">${esc(t.name)}</div>
    <div style="margin-bottom:4px"><button class="sts-btn" style="color:${sts.color};border-color:${sts.color};background:${sts.bg}" onclick="cycleStatus('${t._uid}','${t.id}')">${sts.label} ↻</button></div>
    <div class="kc-footer">
      <div>
        ${t.dueDate?`<div class="kc-due ${dueCls}">⏰ ${fmtDate(t.dueDate)}</div>`:''}
        ${t.customer?`<div class="kc-customer">🏢 ${esc(t.customer)}</div>`:''}
      </div>
      <div class="kc-av" style="background:${owner.color}" title="${owner.name}">${owner.initials}</div>
    </div>`;
  return card;
}

  </div>
  <div style="width:1px;height:20px;background:#E6E6E6;flex-shrink:0"></div>
  <span class="fl">Status</span><div class="filter-chips">
    <span class="chip ${fSts==='all'?'on':''}" onclick="fSts='all';render()">All</span>
    ${STS.map(s=>`<span class="chip ${fSts===s.id?'on':''}" onclick="fSts='${s.id}';render()">${s.label}</span>`).join('')}

  <div class="search-wrap" style="margin-left:auto"><span>🔍</span><input type="text" value="${esc(fSearch)}" placeholder="Search…" oninput="fSearch=this.value;render()"></div>`;

  const grid=el('div','task-grid');
  if(my.length===0){grid.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><h3>No tasks</h3><p style="font-size:.78rem">Add a task or adjust filters</p></div>`;}
  else my.forEach(t=>{
    const cat=getCat(t.category),sts=getSts(t.status),over=isOverdue(t),dis=isDisrupted(t);
    const card=el('div','task-card'+(over?' overdue':dis?' disrupted':''));
    card.style.setProperty('--lc',cat.color);
    card.innerHTML=`<div class="tc-top">
      <span class="tc-icon">${cat.icon}</span>
      <div class="tc-body">
        <div class="tc-name">${esc(t.name)}</div>
        <div class="tc-meta">
          <span class="badge" style="background:${cat.color}18;color:${cat.color}">${cat.label}</span>
          <span class="badge ${PRI.find(p=>p.id===t.priority)?.cls||'b-medium'}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>
          <button class="sts-btn" style="color:${sts.color};border-color:${sts.color};background:${sts.bg}" onclick="cycleStatus('${currentUser}','${t.id}')">${sts.label} ↻</button>
          ${over?'<span class="badge b-overdue">🔴 Overdue</span>':''}
          ${dis&&!over?'<span class="badge b-disrupted">⚠️ Disrupted</span>':''}
        </div>
        ${t.customer?`<div class="tc-customer">🏢 ${esc(t.customer)}</div>`:''}
        <div class="tc-dates">${t.startDate?`<span>📅 ${fmtDate(t.startDate)}</span>`:''} ${t.dueDate?`<span>⏰ ${fmtDate(t.dueDate)}</span>`:''}</div>
        ${t.notes?`<div class="tc-notes">${esc(t.notes)}</div>`:''}
      </div>
      <div class="tc-actions">
        <button class="tc-btn" onclick="editTask('${currentUser}','${t.id}')">✏️</button>
        <button class="tc-btn" onclick="deleteTask('${currentUser}','${t.id}')">🗑️</button>
      </div>
    </div>`;
    grid.appendChild(card);
  });
  area.appendChild(grid);
}

// ══════════════════════════════════════════
// STATS
// ══════════════════════════════════════════
function renderStats(content){
  const area=el('div','stats-area');content.appendChild(area);
  let html=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:13px;margin-bottom:14px">`;
  USERS.forEach(u=>{
    const s=userStats(u.id);
    const pct=s.total>0?Math.round((s.done/s.total)*100):0;
    html+=`<div style="background:#fff;border-radius:8px;padding:15px;border:1px solid #E6E6E6;border-top:4px solid ${u.color}">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px">
        <div style="width:32px;height:32px;border-radius:50%;background:${u.color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.78rem">${u.initials}</div>
        <div><div style="font-weight:700;font-size:.86rem">${u.name}</div><div style="color:#969696;font-size:.67rem">${pct}% complete</div></div>
      </div>
      <div style="background:#F0F4F8;border-radius:3px;height:5px;margin-bottom:11px">
        <div style="background:${u.color};height:100%;border-radius:3px;width:${pct}%"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;text-align:center">
        ${[['Yet to Start',s.todo,'#969696'],['In Progress',s.inprog,'#E98A2C'],['Completed',s.done,'#05A550'],['Total',s.total,'#0072EC'],['Overdue',s.overdue,'#ef4444'],['Disrupted',s.disrupted,'#F8C622']].map(([l,v,c])=>
          `<div style="background:#F0F4F8;border-radius:4px;padding:6px 2px"><div style="font-size:1.2rem;font-weight:800;color:${c}">${v}</div><div style="font-size:.6rem;color:#969696;line-height:1.2">${l}</div></div>`).join('')}
      </div>
    </div>`;
  });
  html+=`</div>
  <div style="background:#fff;border-radius:8px;padding:15px;border:1px solid #E6E6E6">
    <div style="font-weight:700;font-size:.76rem;color:#07456B;text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px">Category Breakdown — Full Team</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">
    ${CAT.map(c=>{
      const total=USERS.reduce((n,u)=>n+(allTasks[u.id]||[]).filter(t=>t.category===c.id).length,0);
      const done=USERS.reduce((n,u)=>n+(allTasks[u.id]||[]).filter(t=>t.category===c.id&&t.status==='completed').length,0);
      const risk=USERS.reduce((n,u)=>n+(allTasks[u.id]||[]).filter(t=>t.category===c.id&&(isOverdue(t)||isDisrupted(t))).length,0);
      return `<div style="padding:9px 10px;border-radius:5px;border:1.5px solid ${c.color}22;background:${c.color}08">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
          <span>${c.icon}</span><span style="font-size:.74rem;font-weight:700;color:${c.color};flex:1">${c.label}</span>
          ${risk>0?`<span style="font-size:.6rem;background:#fef2f2;color:#dc2626;padding:1px 4px;border-radius:2px">🔴${risk}</span>`:''}
        </div>
        <div style="font-size:1.2rem;font-weight:800;color:${c.color}">${total}</div>
        <div style="font-size:.62rem;color:#969696">${done} done</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
  area.innerHTML=html;
}

// ══════════════════════════════════════════
// FORM MODAL
// ══════════════════════════════════════════
function renderFormModal(root){
  const ov=el('div','overlay');
  ov.onclick=e=>{if(e.target===ov){showForm=false;editId=null;form=emptyForm();render();}};
  const modal=el('div','modal');
  modal.innerHTML=`
    <div class="modal-head"><span class="modal-title">${editId?'✏️ Edit':'＋ New Task'}</span>
      <button class="modal-close" onclick="showForm=false;editId=null;form=emptyForm();render()">✕</button></div>
    <div class="modal-body">
      <div class="mfg"><label>Task Name *</label><input type="text" value="${esc(form.name)}" placeholder="Describe the task…" oninput="form.name=this.value"></div>
      <div class="mfg-row">
        <div class="mfg"><label>Category</label><select onchange="form.category=this.value">${CAT.map(c=>`<option value="${c.id}"${form.category===c.id?' selected':''}>${c.icon} ${c.label}</option>`).join('')}</select></div>
        <div class="mfg"><label>Priority</label><select onchange="form.priority=this.value">${PRI.map(p=>`<option value="${p.id}"${form.priority===p.id?' selected':''}>${p.label}</option>`).join('')}</select></div>
      </div>
      <div class="mfg-row">
        <div class="mfg"><label>Status</label><select onchange="form.status=this.value">${STS.map(s=>`<option value="${s.id}"${form.status===s.id?' selected':''}>${s.label}</option>`).join('')}</select></div>
        <div class="mfg"><label>Assign To</label><select onchange="form.assignedTo=this.value">${USERS.map(u=>`<option value="${u.id}"${(form.assignedTo||currentUser)===u.id?' selected':''}>${u.name.split(' ')[0]}</option>`).join('')}</select></div>
      </div>
      <div class="mfg-row">
        <div class="mfg"><label>Start Date</label><input type="date" value="${form.startDate||''}" onchange="form.startDate=this.value"></div>
        <div class="mfg"><label>Due Date</label><input type="date" value="${form.dueDate||''}" onchange="form.dueDate=this.value"></div>
      </div>
      <div class="mfg"><label>Customer / Account</label><input type="text" value="${esc(form.customer||'')}" placeholder="e.g. Eastman, CEMEX…" oninput="form.customer=this.value"></div>
      <div class="mfg"><label>Notes</label><textarea placeholder="Context or reminders…" oninput="form.notes=this.value">${esc(form.notes||'')}</textarea></div>
      <div class="form-actions">
        <button class="fbtn fbtn-cancel" onclick="showForm=false;editId=null;form=emptyForm();render()">Cancel</button>
        <button class="fbtn fbtn-save" onclick="saveTask()">💾 ${editId?'Update':'Add Task'}</button>
      </div>
    </div>`;
  ov.appendChild(modal);root.appendChild(ov);
  setTimeout(()=>{const i=modal.querySelector('input[type=text]');if(i)i.focus();},50);
}

// ══════════════════════════════════════════
// SETTINGS MODAL
// ══════════════════════════════════════════
function renderSettingsModal(root){
  const ov=el('div','overlay');
  ov.onclick=e=>{if(e.target===ov){showSettings=false;render();}};
  const modal=el('div','modal');
  const tabs=[{id:'github',label:'🔗 GitHub'},{id:'notif',label:'🔔 Notifications'}];
  let body='';
  if(stab==='github'){
    body=`
      <div style="padding:12px;background:#F0F4F8;border-radius:6px;border:1.5px solid #E6E6E6;margin-bottom:10px">
        <div style="font-size:.75rem;font-weight:700;margin-bottom:6px">Connected Repo</div>
        <div style="font-size:.82rem;color:#0072EC;font-weight:700">github.com/${ghConfig?.owner}/${ghConfig?.repo}</div>
        <div style="font-size:.7rem;color:#969696;margin-top:3px">Sync status: ${syncStatus} · Last synced: ${lastSynced?lastSynced.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'Not yet'}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="fbtn fbtn-save" onclick="ghRefresh();showSettings=false;render()">🔄 Refresh from GitHub</button>
        <button class="fbtn fbtn-save" style="background:#05A550" onclick="weeklyDownload();showSettings=false;render()">📥 Weekly Download</button>
        <button class="fbtn fbtn-cancel" style="border-color:#ef4444;color:#dc2626" onclick="disconnectGitHub()">⛔ Disconnect</button>
      </div>
      <div style="font-size:.7rem;color:#969696;margin-top:12px;line-height:1.6;padding:9px;background:#F0F4F8;border-radius:5px;border-left:3px solid #0072EC">
        💡 Tasks auto-save to GitHub ~2 seconds after any change. Click 🔄 to pull the latest changes from your teammates. The 📥 Weekly button downloads a dated JSON backup for your records.
      </div>`;
  }
  if(stab==='notif'){
    const inIframe=window.self!==window.top;
    body=inIframe
      ?`<p style="font-size:.79rem;color:#4a5568;line-height:1.7">Notifications need a standalone HTTPS page. Download the app and host on <a href="https://app.netlify.com/drop" target="_blank" style="color:#0072EC">Netlify Drop</a>, then return here to enable.</p>`
      :`<div style="display:flex;align-items:center;justify-content:space-between;padding:11px;background:#F0F4F8;border-radius:6px">
          <div><div style="font-weight:700;font-size:.82rem">Browser Notifications</div><div style="font-size:.7rem;color:#969696;margin-top:2px">Overdue, disrupted, due-today alerts</div></div>
          <button class="fbtn fbtn-save" style="background:${notifPerm==='granted'?'#05A550':'#0072EC'}" onclick="enableNotif()">${notifPerm==='granted'?'✅ On':'Enable'}</button>
        </div>`;
  }
  modal.innerHTML=`
    <div class="modal-head"><span class="modal-title">⚙️ Settings</span>
      <button class="modal-close" onclick="showSettings=false;render()">✕</button></div>
    <div class="modal-body">
      <div class="stabs">${tabs.map(t=>`<div class="stab${stab===t.id?' active':''}" onclick="stab='${t.id}';render()">${t.label}</div>`).join('')}</div>
      ${body}
      <div class="form-actions" style="margin-top:14px"><button class="fbtn fbtn-cancel" onclick="showSettings=false;render()">Close</button></div>
    </div>`;
  ov.appendChild(modal);root.appendChild(ov);
}

// ══════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════
function checkNotifs(){
  if(!settings.browserEnabled||notifPerm!=='granted')return;
  (allTasks[currentUser]||[]).forEach(t=>{
    if(t.status==='completed')return;
    if(isOverdue(t)&&!notified.has('od'+t.id)){notified.add('od'+t.id);new Notification('🔴 Overdue: '+t.name,{body:'Due date passed'});}
    if(isDisrupted(t)&&!notified.has('ds'+t.id)){notified.add('ds'+t.id);new Notification('⚠️ Disrupted: '+t.name,{body:'Start date missed'});}
    if(isDueSoon(t)&&!notified.has('sn'+t.id)){notified.add('sn'+t.id);new Notification('⏰ Due today: '+t.name,{body:'Complete before EOD'});}
  });
}
async function enableNotif(){
  const p=await Notification.requestPermission();notifPerm=p;
  if(p==='granted'){settings.browserEnabled=true;lsSave('tt_settings',settings);toast('🔔 Notifications enabled');}
  else toast('❌ Permission denied');render();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init(){
  if(!ghConfig){renderSetup();return;}
  renderLoading('Loading team tasks from GitHub…');
  const ok=await ghLoadTasks();
  if(!ok){
    document.getElementById('root').innerHTML=`<div class="loading-screen"><div style="font-size:2rem">❌</div><div class="loading-text">Could not load from GitHub. <a href="#" style="color:#F8C622" onclick="lsSave('tt_gh_config',null);location.reload()">Reconnect</a></div></div>`;
    return;
  }
  render();
  setInterval(checkNotifs,30000);
  setInterval(()=>{ ghRefresh(); },300000); // auto-refresh every 5 min
}

init();
</script>
