<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DQA Task Tracker — Project44</title>
<style id="ss">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#07456B;--navy-d:#051f32;--blue:#0072EC;--blue-d:#0058C7;
  --gold:#F8C622;--green:#05A550;--orange:#E98A2C;--red:#D93025;
  --bg:#EDF2F7;--surf:#fff;--border:#DDE6EF;
  --txt:#0D2137;--txt2:#4A6076;--txt3:#8FA4B8;
  --sh-xs:0 1px 2px rgba(13,33,55,.06);
  --sh-sm:0 1px 4px rgba(13,33,55,.08),0 2px 8px rgba(13,33,55,.04);
  --sh-md:0 4px 16px rgba(13,33,55,.10),0 2px 6px rgba(13,33,55,.05);
  --sh-lg:0 24px 64px rgba(13,33,55,.22),0 8px 24px rgba(13,33,55,.10);
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(7,69,107,.18);border-radius:3px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseD{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Stat Cards ── */
.stat{background:var(--surf);border-radius:var(--r12);padding:18px 20px;box-shadow:var(--sh-sm);border-top:3px solid transparent;transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden}
.stat:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.stat-num{font-size:30px;font-weight:800;line-height:1;letter-spacing:-1px}
.stat-lbl{font-size:11px;font-weight:700;color:var(--txt2);margin-top:5px;text-transform:uppercase;letter-spacing:.05em}

/* ── Task Cards ── */
.tc{background:var(--surf);border-radius:var(--r8);padding:14px 16px;margin-bottom:8px;border-left:3px solid;box-shadow:var(--sh-xs);transition:box-shadow .2s,transform .15s;animation:fadeUp .22s ease}
.tc:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}

/* ── Chips/Badges ── */
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;line-height:1.4}
.chip-alert{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;border:1px solid}

/* ── Nav Tabs ── */
.ntab{padding:11px 22px;border:none;background:transparent;color:rgba(255,255,255,.55);font-weight:600;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.01em}
.ntab:hover{color:rgba(255,255,255,.88)}
.ntab.on{color:#fff;border-bottom-color:var(--gold)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:var(--r8);padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.01em}
.btn-p{background:linear-gradient(140deg,var(--blue),var(--blue-d));color:#fff;box-shadow:0 2px 8px rgba(0,114,236,.28)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,114,236,.36)}
.btn-o{background:linear-gradient(140deg,#f5a040,var(--orange));color:#fff;box-shadow:0 2px 8px rgba(233,138,44,.26)}
.btn-o:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(233,138,44,.34)}
.btn-g{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(4px)}
.btn-g:hover{background:rgba(255,255,255,.18)}
.btn-line{background:transparent;color:var(--txt2);border:1.5px solid var(--border)}
.btn-line:hover{border-color:var(--blue);color:var(--blue);background:rgba(0,114,236,.04)}

/* ── Inputs ── */
.fi{width:100%;border:1.5px solid var(--border);border-radius:var(--r8);padding:10px 14px;font-size:13px;outline:none;transition:border .2s,box-shadow .2s;background:var(--surf);color:var(--txt)}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,114,236,.1)}
.flbl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}

/* ── Kanban ── */
.kcol{flex:1;min-width:268px;background:rgba(7,69,107,.05);border:1.5px solid rgba(7,69,107,.09);border-radius:var(--r12);padding:12px}
.khdr{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-radius:var(--r8);margin-bottom:12px;font-size:12px;font-weight:700;color:#fff;letter-spacing:.02em;text-transform:uppercase}

/* ── Section Title ── */
.stitle{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1.5px;background:linear-gradient(90deg,var(--gold) 0%,transparent 100%)}

/* ── Bars ── */
.pbar{height:6px;background:rgba(0,0,0,.07);border-radius:3px;overflow:hidden;margin-top:6px}
.pfil{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.cbar{height:9px;background:rgba(0,0,0,.06);border-radius:5px;overflow:hidden;margin-top:5px}
.cfil{height:100%;border-radius:5px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Modal ── */
.mbg{position:fixed;inset:0;background:rgba(7,33,55,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.modal{background:var(--surf);border-radius:var(--r16);padding:30px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-lg);animation:modalIn .25s cubic-bezier(.34,1.4,.64,1)}

/* ── Avatar ── */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:800;flex-shrink:0;letter-spacing:.01em}

/* ── Toasts ── */
.toast{animation:slideR .28s ease}

/* ── Misc ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<div id="toasts" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px;pointer-events:none"></div>
<div id="root"></div>
<script id="sc">
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const TEAM=['Nikita','Jayesh','Shashi'];
const OWN_CLR={Nikita:'#0072EC',Jayesh:'#05A550',Shashi:'#E98A2C'};
const CAT=[
  {id:'report',     label:'Report',            icon:'📊',color:'#0072EC'},
  {id:'outreaches', label:'Outreaches',         icon:'📣',color:'#E98A2C'},
  {id:'meeting',    label:'Meeting',            icon:'🤝',color:'#05A550'},
  {id:'preparation',label:'Preparation',        icon:'📋',color:'#07456B'},
  {id:'escalation', label:'Support Escalation', icon:'🚨',color:'#D93025'},
  {id:'tools',      label:'Tools Training',     icon:'🛠️',color:'#7C3AED'},
  {id:'skill',      label:'Skill Development',  icon:'📚',color:'#0891B2'},
  {id:'adhoc',      label:'Adhoc',              icon:'⚡',color:'#D97706'},
];
const STS=[
  {id:'todo',      label:'Yet to Start',color:'#64748B',bg:'#F1F5F9'},
  {id:'inprogress',label:'In Progress', color:'#E98A2C',bg:'#FFF7ED'},
  {id:'completed', label:'Completed',   color:'#05A550',bg:'#F0FDF4'},
];
const PRI=[
  {id:'high',  label:'High',  color:'#D93025'},
  {id:'medium',label:'Medium',color:'#E98A2C'},
  {id:'low',   label:'Low',   color:'#05A550'},
];
const GH='https://api.github.com';

// ── STATE ──────────────────────────────────────────────────────────────────
let cfg   =lsLoad('dqa_cfg',{owner:'',repo:'',pat:'',user:'Nikita'});
let tasks =[];
let sha   =null;
let sync  ='idle';
let view  ='my';
let fSt='all',fCat='all';
let showForm=false,editId=null,adhocMode=false;
let toastArr=[],notified=new Set(),now=new Date();

// ── HELPERS ────────────────────────────────────────────────────────────────
function lsLoad(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):''}
function fdt(d,t){return d?fd(d)+(t?' '+t:''):''}
function gc(id){return CAT.find(c=>c.id===id)||CAT[0];}
function gs(id){return STS.find(s=>s.id===id)||STS[0];}
function gp(id){return PRI.find(p=>p.id===id)||PRI[1];}
function isDis(t){return t.status==='todo'&&t.startDate&&now>new Date(t.startDate+(t.startTime?'T'+t.startTime:'T00:00'));}
function isOv(t){return t.status!=='completed'&&t.dueDate&&now>new Date(t.dueDate+(t.dueTime?'T'+t.dueTime:'T23:59'));}
function pct(n,d){return d?Math.round((n/d)*100):0;}
function av(name,sz=26){
  const bg=OWN_CLR[name]||'#64748B';
  const ini=(name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  return`<span class="av" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.38)}px;background:${bg}">${ini}</span>`;
}
function iconBox(emoji,color,sz=36){
  return`<div style="width:${sz}px;height:${sz}px;border-radius:${Math.round(sz*.28)}px;background:${color}18;display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*.45)}px;flex-shrink:0">${emoji}</div>`;
}

// ── GITHUB API ─────────────────────────────────────────────────────────────
async function ghFetch(path,opts={}){
  return fetch(GH+path,{...opts,headers:{'Authorization':'token '+cfg.pat,'Content-Type':'application/json',...(opts.headers||{})}});
}
async function loadTasks(){
  if(!cfg.pat){tasks=lsLoad('dqa_tasks',[]);render();return;}
  sync='loading';render();
  try{
    const r=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/tasks.json');
    if(r.status===404){tasks=[];sha=null;}
    else if(!r.ok){throw new Error('HTTP '+r.status);}
    else{const d=await r.json();sha=d.sha;tasks=JSON.parse(atob(d.content.replace(/\n/g,'')));}
    sync='ok';
  }catch(e){sync='error';showErrToast('Could not load from GitHub: '+e.message);tasks=lsLoad('dqa_tasks',[]);}
  render();
}
async function saveTasks(){
  lsSave('dqa_tasks',tasks);
  if(!cfg.pat){showSaveToast();render();return;}
  sync='saving';render();
  try{
    const body={message:'Update tasks — '+cfg.user+' — '+new Date().toLocaleString('en-IN'),content:btoa(unescape(encodeURIComponent(JSON.stringify(tasks,null,2))))};
    if(sha)body.sha=sha;
    const r=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/tasks.json',{method:'PUT',body:JSON.stringify(body)});
    if(r.ok){const d=await r.json();sha=d.content.sha;sync='ok';showSaveToast();}
    else{sync='error';showErrToast('GitHub save failed — check PAT permissions.');}
  }catch(e){sync='error';showErrToast('Network error: '+e.message);}
  render();
}

// ── TOASTS ─────────────────────────────────────────────────────────────────
function showSaveToast(){
  toastArr=toastArr.filter(x=>x.type!=='saved');
  const aid=Date.now();toastArr.push({aid,type:'saved',msg:'✅  Saved successfully'});renderToasts();
  setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},2500);
}
function showErrToast(msg){
  const aid=Date.now()+Math.random();toastArr.push({aid,type:'error',msg:'❌  '+msg});renderToasts();
  setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},7000);
}
function pushAlertToast(id,type,msg){
  const k=id+'_'+type;if(notified.has(k))return false;notified.add(k);
  const aid=Date.now()+Math.random();toastArr.push({aid,type,msg});renderToasts();
  setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},10000);
  return true;
}
function renderToasts(){
  const b=document.getElementById('toasts');if(!b)return;
  const cfg2={
    saved:{bg:'#F0FDF4',br:'#86EFAC',dot:'#05A550'},
    disrupted:{bg:'#FEFCE8',br:'#FDE047',dot:'#CA8A04'},
    overdue:{bg:'#FFF1F2',br:'#FCA5A5',dot:'#D93025'},
    error:{bg:'#FFF1F2',br:'#FCA5A5',dot:'#D93025'},
  };
  b.innerHTML=toastArr.map(a=>{
    const s=cfg2[a.type]||cfg2.error;
    return`<div class="toast" style="background:${s.bg};border:1.5px solid ${s.br};border-radius:10px;padding:12px 14px;box-shadow:0 8px 24px rgba(13,33,55,.14);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;pointer-events:all;min-width:280px">
      <span style="width:8px;height:8px;border-radius:50%;background:${s.dot};flex-shrink:0"></span>
      <span style="flex:1;color:#0D2137">${esc(a.msg)}</span>
      <button data-action="dimToast" data-aid="${a.aid}" style="border:none;background:transparent;cursor:pointer;color:#8FA4B8;font-size:16px;padding:0;line-height:1">×</button>
    </div>`;
  }).join('');
}

// ── NOTIFICATIONS ──────────────────────────────────────────────────────────
function fireBrowser(title,body,tag){if('Notification' in window&&Notification.permission==='granted'){try{new Notification(title,{body,tag});}catch{}}}
function checkAlerts(){
  tasks.filter(t=>!t.owner||t.owner===cfg.user).forEach(t=>{
    if(isDis(t)&&pushAlertToast(t.id,'disrupted','⚠️  Not Started: '+t.title))fireBrowser('⚠️ Not Started',t.title+' — planned '+fdt(t.startDate,t.startTime),'d_'+t.id);
    if(isOv(t)&&pushAlertToast(t.id,'overdue','🔴  Overdue: '+t.title))fireBrowser('🔴 Overdue',t.title+' — due '+fdt(t.dueDate,t.dueTime),'o_'+t.id);
  });
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function saveTask(){
  const title=(document.getElementById('fm-title')?.value||'').trim();
  if(!title){showErrToast('Please enter a task title.');return;}
  const prev=editId?tasks.find(t=>t.id===editId):null;
  const task={
    id:editId||String(Date.now()),title,
    category:document.getElementById('fm-cat')?.value   ||'adhoc',
    priority:document.getElementById('fm-pri')?.value   ||'medium',
    status:  document.getElementById('fm-status')?.value||'todo',
    owner:   document.getElementById('fm-owner')?.value ||cfg.user,
    startDate:document.getElementById('fm-sdate')?.value||'',
    startTime:document.getElementById('fm-stime')?.value||'',
    dueDate:  document.getElementById('fm-ddate')?.value||'',
    dueTime:  document.getElementById('fm-dtime')?.value||'',
    notes:    document.getElementById('fm-notes')?.value||'',
    createdAt:prev?.createdAt||new Date().toISOString(),
    updatedAt:new Date().toISOString()
  };
  if(editId){['disrupted','overdue'].forEach(x=>notified.delete(editId+'_'+x));tasks=tasks.map(t=>t.id===editId?task:t);}
  else tasks.push(task);
  editId=null;showForm=false;adhocMode=false;
  saveTasks();render();
}
function updSt(id,status){
  ['disrupted','overdue'].forEach(x=>notified.delete(id+'_'+x));
  tasks=tasks.map(t=>t.id===id?{...t,status,updatedAt:new Date().toISOString()}:t);
  saveTasks();render();
}
function delTask(id){if(!confirm('Delete this task?'))return;tasks=tasks.filter(t=>t.id!==id);saveTasks();render();}
function editTask(id){const t=tasks.find(x=>x.id===id);if(!t)return;editId=id;adhocMode=false;showForm=true;render();}
function saveConfig(){
  cfg={
    owner:(document.getElementById('cfg-owner')?.value||'').trim(),
    repo: (document.getElementById('cfg-repo')?.value||'').trim(),
    pat:  (document.getElementById('cfg-pat')?.value||'').trim(),
    user: document.getElementById('cfg-user')?.value||'Nikita'
  };
  lsSave('dqa_cfg',cfg);loadTasks();
}

// ── CHARTS ─────────────────────────────────────────────────────────────────
function donut(segs,sz=108){
  const total=segs.reduce((a,b)=>a+b.v,0);
  if(!total)return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:#E2E8F0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#8FA4B8;flex-shrink:0">No data</div>`;
  let cum=0;
  const parts=segs.filter(s=>s.v>0).map(s=>{const p=(s.v/total)*100;const str=s.c+' '+cum.toFixed(2)+'% '+(cum+p).toFixed(2)+'%';cum+=p;return str;});
  const inner=Math.round(sz*.26);
  return`<div style="position:relative;width:${sz}px;height:${sz}px;flex-shrink:0">
    <div style="width:${sz}px;height:${sz}px;border-radius:50%;background:conic-gradient(${parts.join(',')});box-shadow:0 4px 16px rgba(0,0,0,.12)"></div>
    <div style="position:absolute;inset:${inner}px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 6px rgba(0,0,0,.07)">
      <span style="font-size:${Math.round(sz*.14)}px;font-weight:800;color:#0D2137;letter-spacing:-1px">${total}</span>
      <span style="font-size:${Math.round(sz*.087)}px;color:#8FA4B8;font-weight:600">tasks</span>
    </div>
  </div>`;
}
function hBars(items,maxV){
  return items.map(d=>`<div style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span style="color:var(--txt2)">${esc(d.label)}</span>
      <span style="font-weight:700;color:${d.color||'var(--navy)'}">${d.value}</span>
    </div>
    <div class="cbar"><div class="cfil" style="width:${maxV?pct(d.value,maxV):0}%;background:${d.color||'var(--blue)'}"></div></div>
  </div>`).join('');
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');if(!root)return;
  const hasSetup=cfg.user&&(cfg.pat||cfg._local);
  if(!hasSetup){root.innerHTML=renderSetup();return;}
  root.innerHTML=renderApp();
  renderToasts();
}

// ── SETUP SCREEN ────────────────────────────────────────────────────────────
function renderSetup(){
  return`<div style="min-height:100vh;display:flex">
    <!-- Left panel -->
    <div style="width:420px;flex-shrink:0;background:linear-gradient(160deg,#051f32 0%,#07456B 55%,#0a6090 100%);padding:48px 44px;display:flex;flex-direction:column;justify-content:space-between">
      <div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:48px">
          <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--blue),#004db5);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(0,114,236,.4)">📌</div>
          <div><div style="color:#fff;font-size:16px;font-weight:700">DQA Task Tracker</div><div style="color:rgba(255,255,255,.5);font-size:12px">Project44 · Managed Services</div></div>
        </div>
        <h1 style="color:#fff;font-size:28px;font-weight:800;line-height:1.25;margin-bottom:16px;letter-spacing:-.5px">Your team's tasks,<br>all in one place.</h1>
        <p style="color:rgba(255,255,255,.6);font-size:14px;line-height:1.7;margin-bottom:36px">A shared, real-time task board for the DQA team — built on GitHub, accessible anywhere, with smart deadline alerts.</p>
        <div style="display:flex;flex-direction:column;gap:14px">
          ${[['📊','Live dashboard','High-level manager view at a glance'],['📌','Team Kanban','Tasks by owner, status, and priority'],['🔔','Smart alerts','Browser notifications for missed deadlines']].map(([i,t,s])=>`
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${i}</div>
            <div><div style="color:#fff;font-weight:600;font-size:13px">${t}</div><div style="color:rgba(255,255,255,.5);font-size:12px;margin-top:1px">${s}</div></div>
          </div>`).join('')}
        </div>
      </div>
      <div style="color:rgba(255,255,255,.3);font-size:11px">© 2026 Project44 · Managed Services India Region</div>
    </div>
    <!-- Right panel -->
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:32px;background:var(--bg)">
      <div style="background:var(--surf);border-radius:var(--r16);padding:40px;width:100%;max-width:420px;box-shadow:var(--sh-lg)">
        <div style="margin-bottom:28px">
          <h2 style="font-size:20px;font-weight:800;color:var(--txt);margin-bottom:6px">Connect your workspace</h2>
          <p style="font-size:13px;color:var(--txt2)">Enter your GitHub details to sync tasks across the team in real time.</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div>
            <label class="flbl">Your Name</label>
            <select id="cfg-user" class="fi">

            </select>

          <button data-action="resetCfg" style="display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:5px 12px;cursor:pointer;color:#fff">

// ── MY TASKS ───────────────────────────────────────────────────────────────
function renderMyTasks(){
  const mine=tasks.filter(t=>!t.owner||t.owner===cfg.user);
  const fil=mine.filter(t=>(fSt==='all'||t.status===fSt)&&(fCat==='all'||t.category===fCat))
    .sort((a,b)=>{const po={high:0,medium:1,low:2};if(isDis(a)!==isDis(b))return isDis(a)?-1:1;if(isOv(a)!==isOv(b))return isOv(a)?-1:1;return po[a.priority]-po[b.priority];});
  const cnt=STS.reduce((a,s)=>{a[s.id]=mine.filter(t=>t.status===s.id).length;return a;},{});
  const ovC=mine.filter(isOv).length,disC=mine.filter(isDis).length;

  const statRows=[
    {label:'Yet to Start',v:cnt.todo,     c:'#64748B',bg:'#F1F5F9',icon:'⏳'},
    {label:'In Progress', v:cnt.inprogress,c:'#E98A2C',bg:'#FFF7ED',icon:'🔄'},
    {label:'Completed',   v:cnt.completed, c:'#05A550',bg:'#F0FDF4',icon:'✅'},
    {label:'Overdue',     v:ovC,           c:'#D93025',bg:'#FFF1F0',icon:'🚨'},
    {label:'Disrupted',   v:disC,          c:'#92400E',bg:'#FFFBEB',icon:'⚠️'},
  ];

  return`
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px">
      ${statRows.map(s=>`
      <div class="stat" style="border-top-color:${s.c};background:${s.bg}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div class="stat-num" style="color:${s.c}">${s.v}</div>
          <div style="width:34px;height:34px;border-radius:8px;background:${s.c}15;display:flex;align-items:center;justify-content:center;font-size:16px">${s.icon}</div>
        </div>
        <div class="stat-lbl">${s.label}</div>
      </div>`).join('')}
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <select data-filter="status" style="border:1.5px solid var(--border);border-radius:var(--r8);padding:8px 12px;font-size:13px;background:#fff;cursor:pointer;color:var(--txt)">
        <option value="all" ${fSt==='all'?'selected':''}>All Statuses</option>
        ${STS.map(s=>`<option value="${s.id}" ${fSt===s.id?'selected':''}>${s.label}</option>`).join('')}
      </select>
      <select data-filter="cat" style="border:1.5px solid var(--border);border-radius:var(--r8);padding:8px 12px;font-size:13px;background:#fff;cursor:pointer;color:var(--txt)">
        <option value="all" ${fCat==='all'?'selected':''}>All Categories</option>
        ${CAT.map(c=>`<option value="${c.id}" ${fCat===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
      </select>
      ${(fSt!=='all'||fCat!=='all')?`<button data-action="clearFilters" class="btn btn-line" style="font-size:12px;padding:7px 12px">✕ Clear</button>`:''}
      <span style="margin-left:auto;font-size:12px;color:var(--txt3);align-self:center">${fil.length} task${fil.length!==1?'s':''}</span>
    </div>

    ${fil.length===0
      ?`<div style="text-align:center;padding:70px 0;color:var(--txt3)"><div style="font-size:44px;margin-bottom:14px">📭</div><div style="font-size:15px;font-weight:600">No tasks found</div><div style="font-size:13px;margin-top:6px">Add a task using the button in the header</div></div>`
      :fil.map(t=>taskCard(t,true)).join('')}`;
}

// ── TASK CARD ──────────────────────────────────────────────────────────────
function taskCard(t,showStSel=true){
  const cat=gc(t.category),st=gs(t.status),pr=gp(t.priority),ov=isOv(t),dis=isDis(t);
  const lBorder=dis?'#EAB308':ov?'#D93025':cat.color;
  return`<div class="tc" style="border-left-color:${lBorder};opacity:${t.status==='completed'?.68:1}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <span style="font-size:15px">${cat.icon}</span>
          <span style="font-weight:700;font-size:14px;text-decoration:${t.status==='completed'?'line-through':'none'};color:${t.status==='completed'?'#8FA4B8':'var(--txt)'};letter-spacing:-.1px">${esc(t.title)}</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
          <span class="chip" style="color:${cat.color};background:${cat.color}14;border:1px solid ${cat.color}22">${cat.label}</span>
          <span class="chip" style="color:${pr.color};background:${pr.color}12;border:1px solid ${pr.color}20">
            <span style="width:5px;height:5px;border-radius:50%;background:${pr.color};display:inline-block"></span>${pr.label}
          </span>
          ${t.owner?`<span class="chip" style="color:var(--navy);background:rgba(7,69,107,.07);border:1px solid rgba(7,69,107,.12);gap:5px">${av(t.owner,16)}${esc(t.owner)}</span>`:''}
          ${dis?`<span class="chip-alert" style="color:#854D0E;background:#FEFCE8;border-color:#FDE047">⚠ Disrupted</span>`:''}
          ${ov?`<span class="chip-alert" style="color:#991B1B;background:#FFF1F2;border-color:#FCA5A5">🔴 Overdue</span>`:''}
          ${t.startDate?`<span style="font-size:11px;color:${dis?'#854D0E':'var(--txt3)'};display:flex;align-items:center;gap:3px"><span style="color:#05A550">▶</span> ${fdt(t.startDate,t.startTime)}</span>`:''}
          ${t.dueDate?`<span style="font-size:11px;color:${ov?'#D93025':'var(--txt3)'};display:flex;align-items:center;gap:3px"><span>📅</span>${fdt(t.dueDate,t.dueTime)}</span>`:''}
        </div>
        ${t.notes?`<div style="font-size:12px;color:var(--txt3);margin-top:8px;font-style:italic;line-height:1.5;border-left:2px solid var(--border);padding-left:8px">${esc(t.notes)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0">
        ${showStSel?`<select data-action="updSt" data-id="${t.id}" style="border:1.5px solid ${st.color}35;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;background:${st.bg};color:${st.color};cursor:pointer;outline:none;min-width:128px">${STS.map(s=>`<option value="${s.id}" ${t.status===s.id?'selected':''}>${s.label}</option>`).join('')}</select>`:''}
        <div style="display:flex;gap:5px">
          <button data-action="editTask" data-id="${t.id}" style="border:1.5px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;background:#fff;cursor:pointer;color:var(--txt2);transition:all .15s" onmouseenter="this.style.borderColor='#0072EC';this.style.color='#0072EC'" onmouseleave="this.style.borderColor='';this.style.color=''">Edit</button>
          <button data-action="delTask"  data-id="${t.id}" style="border:1.5px solid #FEE2E2;border-radius:6px;padding:5px 10px;font-size:12px;background:#fff;cursor:pointer;color:#D93025;transition:all .15s">Del</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── TEAM BOARD ─────────────────────────────────────────────────────────────
function renderTeamBoard(){
  const khdr={
    todo:'linear-gradient(135deg,#4B5563,#374151)',
    inprogress:'linear-gradient(135deg,#F59A3A,#E98A2C)',
    completed:'linear-gradient(135deg,#10B981,#05A550)'
  };
  const total=tasks.length;
  return`
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${TEAM.map(m=>{
        const mt=tasks.filter(t=>t.owner===m);
        return`<div style="display:flex;align-items:center;gap:8px;background:var(--surf);border-radius:20px;padding:6px 14px;box-shadow:var(--sh-xs)">
          ${av(m,24)}<span style="font-size:13px;font-weight:600;color:var(--txt)">${m}</span>
          <span style="font-size:12px;color:var(--txt3)">${mt.length} task${mt.length!==1?'s':''}</span>
        </div>`;
      }).join('')}
      <span style="margin-left:auto;align-self:center;font-size:12px;color:var(--txt3)">${total} total tasks across team</span>
    </div>

    <div style="display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:8px">
      ${STS.map(st=>{
        const col=tasks.filter(t=>t.status===st.id);
        return`<div class="kcol">
          <div class="khdr" style="background:${khdr[st.id]}">
            <span>${st.label}</span>
            <span style="background:rgba(255,255,255,.22);border-radius:20px;padding:2px 10px;font-size:11px">${col.length}</span>
          </div>
          ${TEAM.map(member=>{
            const mt=col.filter(t=>t.owner===member);
            if(!mt.length)return'';
            return`<div style="margin-bottom:12px">
              <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">
                ${av(member,20)}
                <span style="font-size:11px;font-weight:700;color:${OWN_CLR[member]||'var(--navy)'};text-transform:uppercase;letter-spacing:.05em">${member}</span>
                <span style="font-size:10px;color:var(--txt3);margin-left:auto">${mt.length}</span>
              </div>
              ${mt.map(t=>taskCard(t,false)).join('')}
            </div>`;
          }).join('')}
          ${col.filter(t=>!t.owner||!TEAM.includes(t.owner)).map(t=>taskCard(t,false)).join('')}
          ${col.length===0?`<div style="text-align:center;padding:28px;color:var(--txt3);font-size:13px">No tasks</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
}

// ── MANAGER DASHBOARD ──────────────────────────────────────────────────────
function renderDashboard(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='completed').length;
  const inP=tasks.filter(t=>t.status==='inprogress').length;
  const todo=tasks.filter(t=>t.status==='todo').length;
  const ovC=tasks.filter(isOv).length;
  const disC=tasks.filter(isDis).length;

  const stSegs=[{v:todo,c:'#64748B'},{v:inP,c:'#E98A2C'},{v:done,c:'#05A550'}];
  const prSegs=[
    {v:tasks.filter(t=>t.priority==='high').length,   c:'#D93025'},
    {v:tasks.filter(t=>t.priority==='medium').length, c:'#E98A2C'},
    {v:tasks.filter(t=>t.priority==='low').length,    c:'#05A550'},
  ];
  const teamStats=TEAM.map(m=>{
    const mt=tasks.filter(t=>t.owner===m);
    return{name:m,total:mt.length,done:mt.filter(t=>t.status==='completed').length,inP:mt.filter(t=>t.status==='inprogress').length,todo:mt.filter(t=>t.status==='todo').length,ov:mt.filter(isOv).length,dis:mt.filter(isDis).length};
  });
  const catBars=CAT.map(c=>({label:c.icon+' '+c.label,value:tasks.filter(t=>t.category===c.id).length,color:c.color})).filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
  const maxCat=Math.max(...catBars.map(x=>x.value),1);
  const atRisk=tasks.filter(t=>isOv(t)||isDis(t)).sort((a,b)=>(isOv(b)?1:0)-(isOv(a)?1:0));

  const bigStats=[
    {label:'Total Tasks',   v:total, c:'#0072EC',bg:'#EFF6FF',icon:'📋'},
    {label:'Completed',     v:done,  c:'#05A550',bg:'#F0FDF4',icon:'✅',sub:total?pct(done,total)+'% completion':''},
    {label:'In Progress',   v:inP,   c:'#E98A2C',bg:'#FFF7ED',icon:'🔄'},
    {label:'Yet to Start',  v:todo,  c:'#64748B',bg:'#F8FAFC',icon:'⏳'},
    {label:'Overdue',       v:ovC,   c:'#D93025',bg:'#FFF1F0',icon:'🚨'},
    {label:'Disrupted',     v:disC,  c:'#92400E',bg:'#FFFBEB',icon:'⚠️'},
  ];

  return`
    <!-- Summary row -->
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px">
      ${bigStats.map(s=>`
      <div class="stat" style="border-top-color:${s.c}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div class="stat-num" style="color:${s.c}">${s.v}</div>
          ${iconBox(s.icon,s.c,34)}
        </div>
        <div class="stat-lbl">${s.label}</div>
        ${s.sub?`<div style="font-size:11px;font-weight:700;color:${s.c};margin-top:5px">${s.sub}</div>`:''}
      </div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1.1fr 0.9fr;gap:16px;margin-bottom:16px">
      <!-- Team Performance -->
      <div class="card" style="padding:22px">
        <div class="stitle">👥 Team Performance</div>
        ${teamStats.map(m=>`
          <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
              <div style="display:flex;align-items:center;gap:9px">
                ${av(m.name,32)}
                <div>
                  <div style="font-weight:700;font-size:14px;color:var(--txt)">${m.name}</div>
                  <div style="font-size:11px;color:var(--txt3)">${m.total} task${m.total!==1?'s':''} · ${pct(m.done,m.total)}% complete</div>
                </div>
              </div>
              <div style="display:flex;gap:5px;flex-wrap:wrap">
                ${m.ov>0?`<span class="chip-alert" style="color:#991B1B;background:#FFF1F2;border-color:#FCA5A5">${m.ov} overdue</span>`:''}
                ${m.dis>0?`<span class="chip-alert" style="color:#854D0E;background:#FEFCE8;border-color:#FDE047">${m.dis} disrupted</span>`:''}
                ${m.ov===0&&m.dis===0&&m.total>0?`<span class="chip-alert" style="color:#05A550;background:#F0FDF4;border-color:#86EFAC">✓ On track</span>`:''}
              </div>
            </div>
            <div class="pbar"><div class="pfil" style="width:${pct(m.done,m.total)}%;background:${m.ov>0?'#D93025':m.dis>0?'#E98A2C':'#05A550'}"></div></div>
            <div style="display:flex;gap:6px;margin-top:9px;flex-wrap:wrap">
              ${STS.map(s=>{const c=tasks.filter(t=>t.owner===m.name&&t.status===s.id).length;return c>0?`<span class="chip" style="color:${s.color};background:${s.bg};border:1px solid ${s.color}22;font-size:10px">${s.label}: ${c}</span>`:''}).join('')}
            </div>
          </div>`).join('')}
      </div>

      <!-- Charts column -->
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card" style="padding:20px">
          <div class="stitle">📊 By Status</div>
          <div style="display:flex;gap:18px;align-items:center">
            ${donut(stSegs,100)}
            <div style="flex:1">
              ${STS.map((s,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <div style="display:flex;align-items:center;gap:7px">
                  <span style="width:10px;height:10px;border-radius:3px;background:${stSegs[i].c};display:inline-block;flex-shrink:0"></span>
                  <span style="font-size:12px;color:var(--txt2)">${s.label}</span>
                </div>
                <span style="font-weight:800;font-size:13px;color:${stSegs[i].c}">${stSegs[i].v}</span>
              </div>`).join('')}
            </div>
          </div>
        </div>
        <div class="card" style="padding:20px">
          <div class="stitle">🎯 By Priority</div>
          <div style="display:flex;gap:18px;align-items:center">
            ${donut(prSegs,100)}
            <div style="flex:1">
              ${PRI.map((p,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <div style="display:flex;align-items:center;gap:7px">
                  <span style="width:10px;height:10px;border-radius:50%;background:${prSegs[i].c};display:inline-block;flex-shrink:0"></span>
                  <span style="font-size:12px;color:var(--txt2)">${p.label}</span>
                </div>
                <span style="font-weight:800;font-size:13px;color:${prSegs[i].c}">${prSegs[i].v}</span>
              </div>`).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <!-- Category breakdown -->
      <div class="card" style="padding:22px">
        <div class="stitle">📁 By Category</div>
        ${catBars.length?hBars(catBars,maxCat):`<div style="text-align:center;padding:24px;color:var(--txt3);font-size:13px">No tasks yet</div>`}
      </div>

      <!-- At-risk table -->
      <div class="card" style="padding:22px">
        <div class="stitle" style="color:var(--red)">⚠️ At-Risk Tasks <span style="font-size:10px;background:#FFF1F2;color:var(--red);border:1px solid #FCA5A5;border-radius:20px;padding:2px 8px;margin-left:6px;font-weight:700">${atRisk.length}</span></div>
        ${atRisk.length===0
          ?`<div style="text-align:center;padding:30px;font-size:13px"><div style="font-size:32px;margin-bottom:10px">✅</div><div style="font-weight:700;color:var(--green)">All tasks on track!</div><div style="color:var(--txt3);font-size:12px;margin-top:4px">No overdue or disrupted tasks</div></div>`
          :atRisk.slice(0,7).map((t,i)=>`<div style="padding:11px 0;border-bottom:${i<atRisk.slice(0,7).length-1?'1px solid var(--border)':'none'}">
            <div style="display:flex;align-items:flex-start;gap:10px">
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.title)}</div>
                <div style="display:flex;gap:5px;flex-wrap:wrap">
                  <span class="chip" style="color:${gc(t.category).color};background:${gc(t.category).color}12;border:1px solid ${gc(t.category).color}20;font-size:10px">${gc(t.category).label}</span>
                  ${t.owner?`<span class="chip" style="font-size:10px;gap:4px;color:var(--navy);background:rgba(7,69,107,.07);border:1px solid rgba(7,69,107,.12)">${av(t.owner,14)}${esc(t.owner)}</span>`:''}
                  ${isOv(t)?`<span class="chip-alert" style="color:#991B1B;background:#FFF1F2;border-color:#FCA5A5;font-size:10px">🔴 Overdue</span>`:''}
                  ${isDis(t)?`<span class="chip-alert" style="color:#854D0E;background:#FEFCE8;border-color:#FDE047;font-size:10px">⚠ Disrupted</span>`:''}
                  ${t.dueDate?`<span style="font-size:10px;color:var(--red);font-weight:600">📅 ${fdt(t.dueDate,t.dueTime)}</span>`:''}
                </div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── TASK FORM ──────────────────────────────────────────────────────────────
function renderForm(){
  const t=editId?tasks.find(x=>x.id===editId):null;
  const defOwner=t?.owner||cfg.user;
  const headerBg=adhocMode?'linear-gradient(135deg,#F59A3A,#E98A2C)':'linear-gradient(135deg,#0072EC,#0058C7)';
  return`<div data-overlay="form" class="mbg">
    <div class="modal">
      <!-- Form header -->
      <div style="background:${headerBg};margin:-30px -30px 24px;padding:20px 28px;border-radius:var(--r16) var(--r16) 0 0;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="color:rgba(255,255,255,.7);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">
            ${adhocMode?'Quick Capture':t?'Edit Task':'New Task'}
          </div>
          <div style="color:#fff;font-size:16px;font-weight:700">${adhocMode?'⚡ Adhoc Task':t?'✏️ Edit Task':'➕ Add Task'}</div>
        </div>
        <button data-action="closeForm" style="border:none;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;cursor:pointer;color:#fff;font-size:18px;line-height:1;backdrop-filter:blur(4px)">×</button>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px">
        <div>
          <label class="flbl">Task Title *</label>
          <input id="fm-title" class="fi" value="${esc(t?.title||'')}" placeholder="What needs to be done?"/>
        </div>
        <div class="g2">
          <div>
            <label class="flbl">Assigned To</label>
            <select id="fm-owner" class="fi">
              ${TEAM.map(m=>`<option value="${m}" ${defOwner===m?'selected':''}>${m}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="flbl">Category</label>
            <select id="fm-cat" class="fi">
              ${CAT.map(c=>`<option value="${c.id}" ${(t?.category||'adhoc')===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="g2">
          <div>
            <label class="flbl">Priority</label>
            <select id="fm-pri" class="fi">
              ${PRI.map(p=>`<option value="${p.id}" ${(t?.priority||'medium')===p.id?'selected':''}>${p.label}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="flbl">Status</label>
            <select id="fm-status" class="fi">
              ${STS.map(s=>`<option value="${s.id}" ${(t?.status||'todo')===s.id?'selected':''}>${s.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div>
          <label class="flbl">🟢 Planned Start</label>
          <div class="g2">
            <input id="fm-sdate" type="date" class="fi" value="${t?.startDate||''}"/>
            <input id="fm-stime" type="time" class="fi" value="${t?.startTime||''}"/>
          </div>
          <span style="font-size:11px;color:var(--txt3);margin-top:5px;display:block">⚠️ Alert fires if not started by this time</span>
        </div>
        <div>
          <label class="flbl">📅 Due Date &amp; Time</label>
          <div class="g2">
            <input id="fm-ddate" type="date" class="fi" value="${t?.dueDate||''}"/>
            <input id="fm-dtime" type="time" class="fi" value="${t?.dueTime||''}"/>
          </div>
          <span style="font-size:11px;color:var(--txt3);margin-top:5px;display:block">🔴 Alert fires if not completed by this time</span>
        </div>
        <div>
          <label class="flbl">Notes</label>
          <textarea id="fm-notes" class="fi" rows="2" placeholder="Any additional context…" style="resize:vertical">${esc(t?.notes||'')}</textarea>
        </div>
        <button data-action="saveTask" style="background:${adhocMode?'linear-gradient(135deg,#F59A3A,#E98A2C)':'linear-gradient(135deg,#0072EC,#0058C7)'};color:#fff;border:none;border-radius:var(--r8);padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;box-shadow:${adhocMode?'0 4px 14px rgba(233,138,44,.35)':'0 4px 14px rgba(0,114,236,.35)'}">
          ${t?'💾  Save Changes':adhocMode?'⚡  Add Adhoc Task':'➕  Add Task'}
        </button>
      </div>
    </div>
  </div>`;
}

// ── EVENT DELEGATION ────────────────────────────────────────────────────────
document.addEventListener('click',function(e){
  if(e.target.dataset.overlay==='form'){showForm=false;editId=null;adhocMode=false;render();return;}
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const{action,id,view:v,aid}=btn.dataset;
  switch(action){
    case 'openAdd':     showForm=true;adhocMode=false;editId=null;render();break;
    case 'openAdhoc':   showForm=true;adhocMode=true;editId=null;render();break;
    case 'closeForm':   showForm=false;editId=null;adhocMode=false;render();break;
    case 'saveTask':    saveTask();break;
    case 'editTask':    editTask(id);break;
    case 'delTask':     delTask(id);break;
    case 'setView':     view=v;render();break;
    case 'saveConfig':  saveConfig();break;
    case 'localMode':   cfg.user=document.getElementById('cfg-user')?.value||'Nikita';cfg._local=true;lsSave('dqa_cfg',cfg);tasks=lsLoad('dqa_tasks',[]);render();break;
    case 'resetCfg':    if(confirm('Switch user or reconfigure GitHub?')){cfg={owner:'',repo:'',pat:'',user:'Nikita'};lsSave('dqa_cfg',cfg);render();}break;
    case 'refreshTasks':loadTasks();break;
    case 'clearFilters':fSt='all';fCat='all';render();break;
    case 'enBrowser':   if('Notification' in window)Notification.requestPermission().then(()=>render());break;
    case 'dlHTML':      dlHTML();break;
    case 'dimToast':    toastArr=toastArr.filter(x=>String(x.aid)!==String(aid));renderToasts();break;
  }
});
document.addEventListener('change',function(e){
  const el=e.target;
  if(el.dataset.filter==='status'){fSt=el.value;render();}
  else if(el.dataset.filter==='cat'){fCat=el.value;render();}
  else if(el.dataset.action==='updSt'){updSt(el.dataset.id,el.value);}
});

// ── DOWNLOAD ───────────────────────────────────────────────────────────────
function dlHTML(){
  const sty=document.getElementById('ss')?.textContent||'';
  const scr=document.getElementById('sc')?.textContent||'';
  const html='<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>DQA Task Tracker — Project44</title>\n<style id="ss">'+sty+'</style>\n</head>\n<body>\n<div id="toasts" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px;pointer-events:none"></div>\n<div id="root"></div>\n<script id="sc">'+scr+'<\/script>\n</body>\n</html>';
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='DQA_TaskTracker.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
}

// ── INIT ───────────────────────────────────────────────────────────────────
if(cfg.pat){loadTasks();}else{tasks=lsLoad('dqa_tasks',[]);render();}
setInterval(()=>{now=new Date();checkAlerts();if(!showForm)render();},60000);
</script>
</body>
</html>
