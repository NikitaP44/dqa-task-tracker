<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DQA Task Tracker — Project44</title>
<style id="ss">
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#07456B;--navy-d:#051f32;--blue:#0072EC;--blue-d:#0058C7;
  --gold:#F8C622;--green:#05A550;--orange:#E98A2C;--red:#D93025;
  --bg:#F0F2F5;--surf:#FFFFFF;--border:#DDE3EA;
  --txt:#172B4D;--txt2:#5E6C84;--txt3:#97A0AF;
  --sh1:0 1px 3px rgba(9,30,66,.1),0 0 0 1px rgba(9,30,66,.04);
  --sh2:0 4px 16px rgba(9,30,66,.14),0 0 0 1px rgba(9,30,66,.04);
  --sh3:0 20px 60px rgba(9,30,66,.2);
  --sb:220px;
}
body{font-family:-apple-system,'Segoe UI',BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(9,30,66,.12);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Sidebar (JIRA-style) ── */
.layout{display:flex;min-height:100vh}
.sb{width:var(--sb);flex-shrink:0;background:#0747A6;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200}
.sb-logo{padding:14px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.1);background:#0052CC}
.sb-icon{width:28px;height:28px;border-radius:6px;background:#0072EC;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-sec{padding:10px 8px 4px;color:rgba(255,255,255,.45);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding-left:14px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 6px;border-radius:3px;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;border:none;background:transparent;transition:.12s;text-align:left;width:calc(100% - 12px)}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.on{background:rgba(255,255,255,.14);color:#fff;font-weight:600}
.nav-badge{margin-left:auto;background:rgba(217,48,37,.85);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-bottom{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding:12px 10px}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:3px;cursor:pointer;transition:.12s}
.sb-user:hover{background:rgba(255,255,255,.08)}
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:700;flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}

/* ── Shell ── */
.content{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#0052CC;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:44px;flex-shrink:0;position:sticky;top:0;z-index:100}
.tb-btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:3px;padding:6px 12px;font-weight:600;font-size:13px;cursor:pointer;transition:.12s;white-space:nowrap}
.tb-btn-p{background:#0072EC;color:#fff}.tb-btn-p:hover{background:#0058C7}
.tb-btn-o{background:#FF991F;color:#172B4D}.tb-btn-o:hover{background:#FF8B00}
.tb-btn-g{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}.tb-btn-g:hover{background:rgba(255,255,255,.2)}

/* ── Inputs ── */
.fi{width:100%;border:2px solid var(--border);border-radius:3px;padding:8px 10px;font-size:14px;outline:none;transition:.1s;background:#fff;color:var(--txt)}
.fi:focus{border-color:var(--blue);background:#fff}
.fi:hover:not(:focus){border-color:#B3BAC5}
.flbl{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:4px;display:block}
.fg{display:flex;flex-direction:column;gap:4px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ════════════════════════════
   1. MY TASKS — SharePoint list
   ════════════════════════════ */
.sp-tile{background:#fff;border:none;border-top:3px solid;padding:14px 16px;transition:box-shadow .1s}
.sp-tile:hover{box-shadow:var(--sh2)}
.sp-tile-num{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.sp-cmd{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid var(--border);gap:2px;min-height:40px;background:#fff}
.sp-cmd-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 9px;border:none;background:transparent;font-size:13px;color:var(--txt);cursor:pointer;transition:.1s;border-radius:2px;white-space:nowrap}
.sp-cmd-btn:hover{background:#F4F5F7}
.sp-cmd-sep{width:1px;height:18px;background:var(--border);margin:0 3px;flex-shrink:0}
.sp-pivot{display:flex;gap:0;border-bottom:1px solid var(--border);background:#fff}
.sp-tab{padding:9px 16px;border:none;background:transparent;font-size:14px;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:.1s;margin-bottom:-1px}
.sp-tab:hover{color:var(--txt);background:#F4F5F7}
.sp-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.sp-tab-cnt{font-size:10px;background:#DFE1E6;color:var(--txt2);border-radius:10px;padding:1px 6px;margin-left:4px;font-weight:600}
.sp-tab.on .sp-tab-cnt{background:#DEEBFF;color:var(--blue)}
/* Quick add bar */
.qa-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#DEEBFF;border-bottom:1px solid #B3D4FF}
.qa-input{flex:1;border:2px solid #B3D4FF;border-radius:3px;padding:6px 10px;font-size:13px;outline:none;background:#fff;color:var(--txt)}
.qa-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,114,236,.15)}
.qa-sel{border:2px solid var(--border);border-radius:3px;padding:5px 8px;font-size:12px;background:#fff;color:var(--txt2);outline:none;cursor:pointer}
.qa-sel:focus{border-color:var(--blue)}
/* List */
.sp-lhdr{display:grid;grid-template-columns:36px 1fr 120px 85px 110px 140px 64px;background:#F4F5F7;border-bottom:1.5px solid var(--border)}
.sp-lhc{padding:8px 10px;font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;border-right:1px solid #EBECF0;white-space:nowrap;user-select:none}
.sp-lhc:last-child{border-right:none}
.sp-row{display:grid;grid-template-columns:36px 1fr 120px 85px 110px 140px 64px;border-bottom:1px solid #EBECF0;align-items:center;transition:.08s;animation:fadeUp .18s ease}
.sp-row:last-child{border-bottom:none}
.sp-row:hover{background:#F7F8FF}
.sp-row:hover .sp-acts{opacity:1}
.sp-row:hover .sp-chk{border-color:var(--blue)}
.sp-cell{padding:9px 10px;font-size:13px;border-right:1px solid #EBECF0;min-width:0;overflow:hidden}
.sp-cell:last-child{border-right:none}
.sp-chk{width:14px;height:14px;border:2px solid #DFE1E6;border-radius:2px;flex-shrink:0;transition:.1s;cursor:pointer}
.sp-acts{opacity:0;display:flex;gap:2px;transition:.1s}
.sp-act{border:none;background:transparent;cursor:pointer;padding:3px 5px;border-radius:2px;font-size:12px;color:var(--txt2);transition:.1s}
.sp-act:hover{background:#F4F5F7}
.sp-stat{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:600;cursor:pointer;border:none;appearance:none;-webkit-appearance:none;width:100%}
.sp-alert{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:2px;font-size:9px;font-weight:700;border:1px solid;white-space:nowrap}
.mbar{height:3px;background:#EBECF0;border-radius:2px;margin-top:8px;overflow:hidden}
.mfil{height:100%;border-radius:2px;transition:width .6s}

/* ════════════════════════════
   2. JIRA SWIMLANE BOARD
   ════════════════════════════ */
.jira-wrap{padding:16px 20px;overflow-x:auto}
.jira-board{min-width:700px;background:var(--surf);border:1px solid var(--border);border-radius:4px;overflow:hidden;box-shadow:var(--sh1)}
.jira-hdr-row{display:grid;grid-template-columns:170px 1fr 1fr 1fr;background:#F4F5F7;border-bottom:2px solid var(--border)}
.jira-hdr-cell{padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#fff;display:flex;justify-content:space-between;align-items:center}
.jira-hdr-lbl{background:transparent;border-right:1px solid var(--border)}
.jira-cnt{background:rgba(255,255,255,.22);border-radius:10px;padding:1px 8px;font-size:10px}
.jira-lane{display:grid;grid-template-columns:170px 1fr 1fr 1fr;border-bottom:2px solid #EBECF0}
.jira-lane:last-child{border-bottom:none}
.jira-lane-lbl{padding:10px 12px;border-right:1px solid var(--border);background:#F8F9FB;display:flex;flex-direction:column;justify-content:flex-start;gap:5px;cursor:pointer;transition:.1s;user-select:none}
.jira-lane-lbl:hover{background:#F0F2F8}
.jira-lane-cell{padding:8px;border-right:1px solid #EBECF0;background:#FAFBFC;min-height:90px;vertical-align:top}
.jira-lane-cell:last-child{border-right:none}
.jira-lane.collapsed .jira-lane-cell{display:none}
.jira-lane.collapsed .jira-lane-lbl{border-bottom:none}
/* JIRA card */
.jc{background:#fff;border-radius:3px;border-left:3px solid;padding:8px 10px;margin-bottom:6px;box-shadow:var(--sh1);transition:.14s;cursor:default;animation:fadeUp .18s ease;position:relative}
.jc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.jc-title{font-size:13px;font-weight:500;color:var(--txt);line-height:1.4;margin-bottom:6px}
.jc-title.done{text-decoration:line-through;color:var(--txt3)}
.jc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.jc-acts{position:absolute;top:6px;right:6px;display:none;gap:2px}
.jc:hover .jc-acts{display:flex}
.jc-act{border:none;background:#F4F5F7;border-radius:2px;padding:2px 5px;font-size:11px;cursor:pointer;color:var(--txt2);transition:.1s}
.jc-act:hover{background:#EBECF0}
.jc-chip{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:2px;font-size:10px;font-weight:600;white-space:nowrap}
.jc-prio{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.jira-empty{text-align:center;padding:18px 8px;color:var(--txt3);font-size:11px}

/* ════════════════════════════
   3. MANAGER DASHBOARD
      (ProjectManager.com style)
   ════════════════════════════ */
.d-wrap{padding:16px 20px}
/* KPI row */
.d-kpi{background:#fff;border-radius:3px;padding:14px 16px;border:1px solid var(--border);transition:box-shadow .12s,transform .12s;cursor:default}
.d-kpi:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.d-kpi-num{font-size:30px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.d-kpi-lbl{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-top:5px}
/* Widgets with colored headers (Image 1 style) */
.wg{background:#fff;border-radius:3px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh1)}
.wg-hdr{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wg-ttl{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.wg-sub{font-size:10px;color:rgba(255,255,255,.65)}
.wg-body{padding:0;flex:1;overflow:hidden}
/* Summary table */
.sum-hdr{display:grid;grid-template-columns:1fr 50px 50px 50px 110px;background:#F4F5F7;border-bottom:1.5px solid var(--border);padding:6px 10px;font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.sum-row{display:grid;grid-template-columns:1fr 50px 50px 50px 110px;padding:8px 10px;border-bottom:1px solid #EBECF0;align-items:center;transition:.08s;cursor:default}
.sum-row:last-child{border-bottom:none}
.sum-row:hover{background:#F7F8FF}
/* Progress bar */
.pbar{height:6px;background:#EBECF0;border-radius:3px;overflow:hidden}
.pfil{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.ibar{height:9px;background:#EBECF0;border-radius:3px;overflow:hidden;cursor:default;transition:.1s}
.ibar:hover{opacity:.8}
.ifil{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
/* Stacked bar */
.sbar{display:flex;height:12px;border-radius:3px;overflow:hidden;background:#EBECF0}
.sbar-s{height:100%;transition:width .7s cubic-bezier(.4,0,.2,1);min-width:0}
/* Donut */
.donut-wrap{position:relative;flex-shrink:0}
/* Vbar chart */
.vbar-area{display:flex;gap:6px;align-items:flex-end;height:72px}
.vbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.vbar-stack{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:72px;gap:1px}
.vbar-s{width:100%;transition:height .7s cubic-bezier(.4,0,.2,1);min-height:0}
/* At-risk table */
.risk-grid{display:grid;grid-template-columns:1fr 80px 95px 110px}
.risk-hdr{background:#F4F5F7;font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;border-bottom:1.5px solid var(--border);border-radius:3px 3px 0 0}
.risk-row{border-bottom:1px solid #EBECF0;transition:.08s;cursor:default}
.risk-row:last-child{border-bottom:none}
.risk-row:hover{background:#FFF8F0}
.risk-cell{padding:8px 10px;font-size:12px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.d-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:2px;font-size:9px;font-weight:700;border:1px solid;white-space:nowrap}
/* Legend */
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}

/* ── Drawer ── */
.drawer-bg{position:fixed;inset:0;background:rgba(9,30,66,.35);z-index:300;animation:fadeIn .18s;backdrop-filter:blur(2px)}
.drawer{position:fixed;top:0;right:0;width:420px;height:100vh;background:#fff;box-shadow:-4px 0 32px rgba(9,30,66,.2);z-index:301;display:flex;flex-direction:column;animation:drawerIn .22s cubic-bezier(.4,0,.2,1)}
.drawer-hdr{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:20px}
.drawer-foot{padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;background:#F4F5F7}
/* Toast */
.toast{animation:slideR .22s ease}
</style>
</head>
<body>
<div id="toasts" style="position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;max-width:340px;pointer-events:none"></div>
<div id="root"></div>
<script id="sc">
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const TEAM=['Nikita','Jayesh','Shashi'];
const OWN_CLR={Nikita:'#0052CC',Jayesh:'#006644',Shashi:'#FF5630'};
const CAT=[
  {id:'report',     label:'Report',            icon:'📊',color:'#0052CC'},
  {id:'outreaches', label:'Outreaches',         icon:'📣',color:'#FF991F'},
  {id:'meeting',    label:'Meeting',            icon:'🤝',color:'#00875A'},
  {id:'preparation',label:'Preparation',        icon:'📋',color:'#344563'},
  {id:'escalation', label:'Support Escalation', icon:'🚨',color:'#DE350B'},
  {id:'tools',      label:'Tools Training',     icon:'🛠️',color:'#6554C0'},
  {id:'skill',      label:'Skill Development',  icon:'📚',color:'#00A3BF'},
  {id:'adhoc',      label:'Adhoc',              icon:'⚡',color:'#FF8B00'},
];
const STS=[
  {id:'todo',      label:'To Do',       color:'#5E6C84',bg:'#F4F5F7'},
  {id:'inprogress',label:'In Progress', color:'#0052CC',bg:'#DEEBFF'},
  {id:'completed', label:'Done',        color:'#006644',bg:'#E3FCEF'},
];
const PRI=[
  {id:'high',  label:'High',  color:'#DE350B'},
  {id:'medium',label:'Medium',color:'#FF8B00'},
  {id:'low',   label:'Low',   color:'#00875A'},
];
const GH='https://api.github.com';

// ── STATE ──────────────────────────────────────────────────────────────────
let cfg=lsLoad('dqa_cfg',{owner:'',repo:'',pat:'',user:'Nikita'});
let tasks=[],sha=null,sync='idle';
let view='my',fCat='all',stFilter='all';
let showForm=false,editId=null,adhocMode=false;
let toastArr=[],notified=new Set(),now=new Date();
let gitFailed=false,errShown=false,lastAttempt=0;
let collapsedLanes=new Set();

// ── HELPERS ────────────────────────────────────────────────────────────────
function lsLoad(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):''}
function fdt(d,t){return d?fd(d)+(t?' '+t:''):''}
function gc(id){return CAT.find(c=>c.id===id)||CAT[0];}
function gs(id){return STS.find(s=>s.id===id)||STS[0];}
function gp(id){return PRI.find(p=>p.id===id)||PRI[1];}
function isDis(t){return t.status==='todo'&&t.startDate&&now>new Date(t.startDate+(t.startTime?'T'+t.startTime:'T00:00'));}
function isOv(t){return t.status!=='completed'&&t.dueDate&&now>new Date(t.dueDate+(t.dueTime?'T'+t.dueTime:'T23:59'));}
function pct(n,d){return d?Math.round((n/d)*100):0;}
function av(name,sz=26){const bg=OWN_CLR[name]||'#42526E';const ini=(name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();return`<span class="av" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.37)}px;background:${bg}">${ini}</span>`;}

// ── GITHUB API ─────────────────────────────────────────────────────────────
async function ghFetch(path,opts={}){const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),9000);try{const r=await fetch(GH+path,{...opts,signal:ctrl.signal,headers:{'Authorization':'token '+cfg.pat,'Content-Type':'application/json',...(opts.headers||{})}});clearTimeout(t);return r;}catch(e){clearTimeout(t);throw e;}}
async function loadTasks(){
  if(!cfg.pat){tasks=lsLoad('dqa_tasks',[]);sync='local';render();return;}
  if(gitFailed&&Date.now()-lastAttempt<180000){tasks=lsLoad('dqa_tasks',[]);sync='offline';render();return;}
  sync='loading';lastAttempt=Date.now();render();
  try{const r=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/tasks.json');if(r.status===404){tasks=[];sha=null;}else if(!r.ok){throw new Error('HTTP '+r.status);}else{const d=await r.json();sha=d.sha;tasks=JSON.parse(atob(d.content.replace(/\n/g,'')));}gitFailed=false;errShown=false;sync='ok';lsSave('dqa_tasks',tasks);}
  catch(e){gitFailed=true;sync='offline';tasks=lsLoad('dqa_tasks',[]);if(!errShown){errShown=true;showErrToast('GitHub unreachable — working offline. '+e.message);}}
  render();
}
async function saveTasks(){
  lsSave('dqa_tasks',tasks);
  if(!cfg.pat){showSaveToast('Saved');render();return;}
  if(gitFailed){showSaveToast('Saved locally (offline)');render();return;}
  sync='saving';render();
  try{const body={message:'Update tasks — '+cfg.user,content:btoa(unescape(encodeURIComponent(JSON.stringify(tasks,null,2))))};if(sha)body.sha=sha;const r=await ghFetch('/repos/'+cfg.owner+'/'+cfg.repo+'/contents/tasks.json',{method:'PUT',body:JSON.stringify(body)});if(r.ok){const d=await r.json();sha=d.content.sha;sync='ok';gitFailed=false;showSaveToast('Synced to GitHub');}else{sync='offline';gitFailed=true;showSaveToast('Saved locally');}}
  catch(e){sync='offline';gitFailed=true;showSaveToast('Saved locally');}
  render();
}

// ── TOASTS ─────────────────────────────────────────────────────────────────
function showSaveToast(msg){toastArr=toastArr.filter(x=>x.type!=='saved');const aid=Date.now();toastArr.push({aid,type:'saved',msg:'✓  '+msg});renderToasts();setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},2500);}
function showErrToast(msg){const aid=Date.now()+Math.random();toastArr.push({aid,type:'error',msg});renderToasts();setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},10000);}
function pushAlertToast(id,type,msg){const k=id+'_'+type;if(notified.has(k))return false;notified.add(k);const aid=Date.now()+Math.random();toastArr.push({aid,type,msg});renderToasts();setTimeout(()=>{toastArr=toastArr.filter(x=>x.aid!==aid);renderToasts();},10000);return true;}
function renderToasts(){const b=document.getElementById('toasts');if(!b)return;const S={saved:{bg:'#E3FCEF',br:'#57D9A3',dot:'#006644'},error:{bg:'#FFEBE6',br:'#FFBDAD',dot:'#DE350B'},disrupted:{bg:'#FFFAE6',br:'#FFE380',dot:'#FF8B00'},overdue:{bg:'#FFEBE6',br:'#FFBDAD',dot:'#DE350B'}};b.innerHTML=toastArr.map(a=>{const s=S[a.type]||S.error;return`<div class="toast" style="background:${s.bg};border:1px solid ${s.br};border-radius:3px;padding:10px 12px;box-shadow:var(--sh2);font-size:13px;display:flex;align-items:flex-start;gap:8px;pointer-events:all;min-width:250px"><span style="width:6px;height:6px;border-radius:50%;background:${s.dot};flex-shrink:0;margin-top:4px"></span><span style="flex:1;color:var(--txt);line-height:1.5">${esc(a.msg)}</span><button data-action="dimToast" data-aid="${a.aid}" style="border:none;background:transparent;cursor:pointer;color:var(--txt3);font-size:16px;line-height:1">×</button></div>`;}).join('');}
function fireBrowser(t,b,tag){if('Notification' in window&&Notification.permission==='granted'){try{new Notification(t,{body:b,tag});}catch{}}}
function checkAlerts(){tasks.filter(t=>!t.owner||t.owner===cfg.user).forEach(t=>{if(isDis(t)&&pushAlertToast(t.id,'disrupted','⚠  Not Started: '+t.title))fireBrowser('⚠ Not Started',t.title,'d_'+t.id);if(isOv(t)&&pushAlertToast(t.id,'overdue','🔴  Overdue: '+t.title))fireBrowser('🔴 Overdue',t.title,'o_'+t.id);});}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function saveTask(){
  const title=(document.getElementById('fm-title')?.value||'').trim();
  if(!title){showErrToast('Please enter a task title.');return;}
  const prev=editId?tasks.find(t=>t.id===editId):null;
  const task={id:editId||String(Date.now()),title,category:document.getElementById('fm-cat')?.value||'adhoc',priority:document.getElementById('fm-pri')?.value||'medium',status:document.getElementById('fm-status')?.value||'todo',owner:document.getElementById('fm-owner')?.value||cfg.user,startDate:document.getElementById('fm-sdate')?.value||'',startTime:document.getElementById('fm-stime')?.value||'',dueDate:document.getElementById('fm-ddate')?.value||'',dueTime:document.getElementById('fm-dtime')?.value||'',notes:document.getElementById('fm-notes')?.value||'',timeTaken:parseInt(document.getElementById('fm-timetaken')?.value,10)||0,createdAt:prev?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};
  if(editId){['disrupted','overdue'].forEach(x=>notified.delete(editId+'_'+x));tasks=tasks.map(t=>t.id===editId?task:t);}
  else tasks.push(task);
  editId=null;showForm=false;adhocMode=false;saveTasks();render();
}
// Quick add — minimal friction, just title + category + priority
function quickAdd(){
  const title=(document.getElementById('qa-input')?.value||'').trim();
  if(!title)return;
  tasks.push({id:String(Date.now()),title,category:document.getElementById('qa-cat')?.value||'adhoc',priority:document.getElementById('qa-pri')?.value||'medium',status:'todo',owner:cfg.user,startDate:'',startTime:'',dueDate:'',dueTime:'',notes:'',timeTaken:0,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
  saveTasks();
  render();
  setTimeout(()=>{const el=document.getElementById('qa-input');if(el){el.value='';el.focus();}},50);
}
function updSt(id,status){['disrupted','overdue'].forEach(x=>notified.delete(id+'_'+x));tasks=tasks.map(t=>t.id===id?{...t,status,updatedAt:new Date().toISOString()}:t);saveTasks();render();}
function delTask(id){if(!confirm('Delete?'))return;tasks=tasks.filter(t=>t.id!==id);saveTasks();render();}
function editTask(id){const t=tasks.find(x=>x.id===id);if(!t)return;editId=id;adhocMode=false;showForm=true;render();}
function saveConfig(){cfg={owner:(document.getElementById('cfg-owner')?.value||'').trim(),repo:(document.getElementById('cfg-repo')?.value||'').trim(),pat:(document.getElementById('cfg-pat')?.value||'').trim(),user:document.getElementById('cfg-user')?.value||'Nikita'};lsSave('dqa_cfg',cfg);loadTasks();}

// ── CHARTS ─────────────────────────────────────────────────────────────────
function donut(segs,sz=110){const tot=segs.reduce((a,b)=>a+b.v,0);if(!tot)return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:#EBECF0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt3);flex-shrink:0">No data</div>`;let cum=0;const parts=segs.filter(s=>s.v>0).map(s=>{const p=(s.v/tot)*100;const r=s.c+' '+cum.toFixed(1)+'% '+(cum+p).toFixed(1)+'%';cum+=p;return r;});const inr=Math.round(sz*.26);return`<div class="donut-wrap" style="width:${sz}px;height:${sz}px;flex-shrink:0"><div style="width:100%;height:100%;border-radius:50%;background:conic-gradient(${parts.join(',')});box-shadow:0 3px 12px rgba(0,0,0,.12)"></div><div style="position:absolute;inset:${inr}px;top:${inr}px;left:${inr}px;right:${inr}px;bottom:${inr}px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 1px 4px rgba(0,0,0,.08)"><span style="font-size:${Math.round(sz*.17)}px;font-weight:800;color:var(--txt);letter-spacing:-1px">${tot}</span><span style="font-size:${Math.round(sz*.09)}px;color:var(--txt3);font-weight:600">tasks</span></div></div>`;}

  root.innerHTML=`<div class="layout">

    </div>
    <div style="flex:1"></div>
    <div class="sb-bottom">
      ${sync==='offline'?`<button data-action="manualSync" style="width:100%;margin-bottom:8px;background:rgba(255,86,48,.15);color:#FF8F73;border:1px solid rgba(255,86,48,.25);border-radius:3px;padding:6px;font-size:11px;font-weight:600;cursor:pointer">↻ Retry GitHub</button>`:''}
      ${np!=='granted'?`<button data-action="enBrowser" style="width:100%;margin-bottom:8px;background:rgba(255,171,0,.12);color:#FFAB00;border:1px solid rgba(255,171,0,.2);border-radius:3px;padding:6px;font-size:11px;font-weight:600;cursor:pointer">🔔 Enable Alerts</button>`:''}
      <div class="sb-user" data-action="resetCfg">${av(cfg.user,28)}<div style="flex:1;min-width:0"><div style="color:#fff;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(cfg.user)}</div><div style="color:rgba(255,255,255,.4);font-size:10px">DQ Analyst</div></div><span style="color:rgba(255,255,255,.3);font-size:11px">⚙</span></div>
      <div style="display:flex;align-items:center;gap:6px;padding:5px 4px;margin-top:4px"><span class="sync-dot" style="background:${sc}"></span><span style="color:rgba(255,255,255,.4);font-size:11px;font-weight:500;flex:1">${sl}</span><button data-action="refreshTasks" style="background:transparent;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:13px;padding:2px 4px">↻</button><button data-action="dlHTML" style="background:transparent;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:11px;padding:2px 4px">⬇</button></div>
    </div>
  </aside>
  <div class="content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px;font-weight:700;color:#fff">${tvMap[view]}</span>

// 1. MY TASKS — SharePoint + Inline Quick Add
// ══════════════════════════════════════════════════════════════
function renderMyTasks(){
  const mine=tasks.filter(t=>!t.owner||t.owner===cfg.user);
  const cnt=STS.reduce((a,s)=>{a[s.id]=mine.filter(t=>t.status===s.id).length;return a;},{});
  const ovC=mine.filter(isOv).length,disC=mine.filter(isDis).length;
  let filtered=mine;
  if(stFilter==='overdue')filtered=mine.filter(t=>isOv(t)||isDis(t));
  else if(stFilter!=='all')filtered=mine.filter(t=>t.status===stFilter);
  if(fCat!=='all')filtered=filtered.filter(t=>t.category===fCat);
  filtered=filtered.sort((a,b)=>{const po={high:0,medium:1,low:2};if(isDis(a)!==isDis(b))return isDis(a)?-1:1;if(isOv(a)!==isOv(b))return isOv(a)?-1:1;return po[a.priority]-po[b.priority];});
  const h=new Date().getHours();const greeting=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  const today=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return`
  <!-- Page header -->
  <div style="background:#fff;border-bottom:1px solid var(--border);padding:16px 20px 0">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div><h1 style="font-size:22px;font-weight:700;color:var(--txt)">${greeting}, ${esc(cfg.user)} 👋</h1><p style="font-size:13px;color:var(--txt2);margin-top:3px">${today}</p></div>
    </div>
    <!-- Stat tiles -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:0">
      ${[{l:'To Do',v:cnt.todo,c:'#5E6C84',b:'#F4F5F7'},{l:'In Progress',v:cnt.inprogress,c:'#0052CC',b:'#DEEBFF'},{l:'Done',v:cnt.completed,c:'#006644',b:'#E3FCEF'},{l:'Overdue',v:ovC,c:'#DE350B',b:'#FFEBE6'},{l:'Disrupted',v:disC,c:'#FF8B00',b:'#FFFAE6'}].map((s,i)=>`
      <div class="sp-tile" style="border-top-color:${s.c};background:${s.b};border-right:${i<4?'1px solid var(--border)':'none'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start"><div class="sp-tile-num" style="color:${s.c}">${s.v}</div><div style="width:28px;height:28px;border-radius:50%;background:${s.c}18;display:flex;align-items:center;justify-content:center;font-size:13px">${['⏳','🔄','✅','🚨','⚠️'][i]}</div></div>
        <div style="font-size:10px;font-weight:700;color:${s.c};text-transform:uppercase;letter-spacing:.04em;margin-top:4px">${s.l}</div>
        ${s.l==='Done'&&mine.length?`<div class="mbar"><div class="mfil" style="width:${pct(s.v,mine.length)}%;background:${s.c}"></div></div>`:''}
      </div>`).join('')}
    </div>
  </div>

  <!-- List panel -->
  <div style="margin:0;background:#fff;border-top:none">
    <!-- Inline Quick Add (main innovation — no drawer needed) -->
    <div class="qa-bar">
      <span style="color:#0052CC;font-size:16px;font-weight:300;flex-shrink:0">＋</span>
      <input id="qa-input" class="qa-input" placeholder="Type task name and press Enter ↵ to add instantly…" autocomplete="off"/>
      <select id="qa-cat" class="qa-sel">
        ${CAT.map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join('')}
      </select>
      <select id="qa-pri" class="qa-sel">
        ${PRI.map(p=>`<option value="${p.id}">${p.label}</option>`).join('')}
      </select>
      <button data-action="quickAdd" style="background:#0052CC;color:#fff;border:none;border-radius:3px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">Add ↵</button>
      <button data-action="openAdd" style="background:transparent;color:#0052CC;border:1px solid #0052CC;border-radius:3px;padding:5px 10px;font-size:11px;cursor:pointer;white-space:nowrap">+ More fields</button>
    </div>

    <!-- Command bar -->
    <div class="sp-cmd">
      <select data-filter="cat" style="border:none;background:transparent;font-size:13px;color:var(--txt2);cursor:pointer;outline:none;padding:5px 6px;border-radius:2px">
        <option value="all">All Categories</option>
        ${CAT.map(c=>`<option value="${c.id}" ${fCat===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
      </select>
      <div class="sp-cmd-sep"></div>
      <span style="font-size:12px;color:var(--txt3);padding:0 6px">${filtered.length} item${filtered.length!==1?'s':''}</span>
      ${fCat!=='all'||stFilter!=='all'?`<div class="sp-cmd-sep"></div><button data-action="clearFilters" class="sp-cmd-btn" style="color:#0052CC">✕ Clear</button>`:''}
    </div>

    <!-- Pivot tabs -->
    <div class="sp-pivot">
      ${[['all','All',mine.length],['todo','To Do',cnt.todo],['inprogress','In Progress',cnt.inprogress],['completed','Done',cnt.completed],['overdue','At Risk',ovC+disC]].map(([val,label,n])=>`<button data-action="stFilter" data-val="${val}" class="sp-tab ${stFilter===val?'on':''}">${label}<span class="sp-tab-cnt" ${val==='overdue'&&n>0?'style="background:#FFEBE6;color:#DE350B"':''}>${n}</span></button>`).join('')}

    ${filtered.length===0?`<div style="text-align:center;padding:48px 20px;color:var(--txt3)"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-size:15px;font-weight:600;color:var(--txt2)">No items</div><div style="font-size:13px;margin-top:6px">Use the quick-add bar above or click <strong>+ Create</strong></div></div>`:`

    ${filtered.map(t=>spRow(t)).join('')}`}
  </div>`;
}

function spRow(t){
  const cat=gc(t.category),pr=gp(t.priority),st=gs(t.status),ov=isOv(t),dis=isDis(t);
  const stP={todo:{bg:'#F4F5F7',c:'#5E6C84'},inprogress:{bg:'#DEEBFF',c:'#0052CC'},completed:{bg:'#E3FCEF',c:'#006644'}}[t.status]||{bg:'#F4F5F7',c:'#5E6C84'};
  return`<div class="sp-row"><div class="sp-cell" style="display:flex;align-items:center;justify-content:center"><div class="sp-chk"></div></div>
  <div class="sp-cell"><div style="display:flex;align-items:center;gap:8px;min-width:0"><div style="width:3px;height:28px;border-radius:1px;background:${cat.color};flex-shrink:0"></div><div style="min-width:0;flex:1"><div style="font-weight:600;font-size:13px;color:${t.status==='completed'?'var(--txt3)':'var(--txt)'};text-decoration:${t.status==='completed'?'line-through':'none'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.title)}${dis?`<span class="sp-alert" style="color:#974F0C;background:#FFFAE6;border-color:#FFE380;margin-left:6px">⚠ Behind</span>`:''}${ov?`<span class="sp-alert" style="color:#BF2600;background:#FFEBE6;border-color:#FFBDAD;margin-left:6px">🔴 Late</span>`:''}</div>${t.notes?`<div style="font-size:10px;color:var(--txt3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">${esc(t.notes.slice(0,50))}${t.notes.length>50?'…':''}</div>`:''}</div></div></div>
  <div class="sp-cell"><span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--txt2)">${cat.icon} ${cat.label}</span></div>
  <div class="sp-cell"><span style="display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:${pr.color}"><span style="width:6px;height:6px;border-radius:50%;background:${pr.color}"></span>${pr.label}</span></div>
  <div class="sp-cell"><span style="font-size:12px;color:${ov?'#DE350B':'var(--txt2)'};font-weight:${ov?600:400}">${t.dueDate?fdt(t.dueDate,t.dueTime):'—'}</span></div>
  <div class="sp-cell"><select data-action="updSt" data-id="${t.id}" class="sp-stat" style="background:${stP.bg};color:${stP.c}">${STS.map(s=>`<option value="${s.id}" ${t.status===s.id?'selected':''}>${s.label}</option>`).join('')}</select>${t.status==='completed'&&t.timeTaken?`<span style="font-size:10px;color:var(--txt3);margin-left:6px;white-space:nowrap">⏱ ${t.timeTaken}m</span>`:''}</div>
  <div class="sp-cell"><div class="sp-acts"><button data-action="editTask" data-id="${t.id}" class="sp-act">✏️</button><button data-action="delTask" data-id="${t.id}" class="sp-act" style="color:#DE350B">🗑</button></div></div></div>`;
}

function renderBoard(){
  const stClr={todo:'#42526E',inprogress:'#0747A6',completed:'#006644'};
  const stBg={todo:'#42526E',inprogress:'#0052CC',completed:'#00875A'};
  return`<div class="jira-wrap">
  <!-- Summary bar -->
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    ${TEAM.map(m=>{const mt=tasks.filter(t=>t.owner===m);const mc=OWN_CLR[m];return`<div style="display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--border);border-left:3px solid ${mc};border-radius:3px;padding:6px 12px;box-shadow:var(--sh1)">${av(m,20)}<div><div style="font-size:12px;font-weight:700;color:var(--txt)">${m}</div><div style="font-size:10px;color:var(--txt3)">${mt.length} tasks · ${pct(mt.filter(t=>t.status==='completed').length,mt.length)}% done</div></div></div>`;}).join('')}
    <button data-action="openAdd" class="tb-btn tb-btn-p" style="margin-left:auto;font-size:12px;padding:5px 12px">＋ Create Issue</button>
  </div>
  <!-- JIRA Board -->
  <div class="jira-board">
    <!-- Column headers -->
    <div class="jira-hdr-row">
      <div class="jira-hdr-cell jira-hdr-lbl" style="color:var(--txt2)">ASSIGNEE</div>
      ${STS.map(s=>{const col=tasks.filter(t=>t.status===s.id);return`<div class="jira-hdr-cell" style="background:${stBg[s.id]}"><span>${s.label.toUpperCase()}</span><span class="jira-cnt">${col.length}</span></div>`;}).join('')}
    </div>
    <!-- Swimlane rows -->
    ${TEAM.map(member=>{
      const mc=OWN_CLR[member]||'#42526E';
      const mt=tasks.filter(t=>t.owner===member);
      const isCollapsed=collapsedLanes.has(member);
      return`<div class="jira-lane ${isCollapsed?'collapsed':''}">
        <div class="jira-lane-lbl" data-action="toggleLane" data-lane="${member}" style="border-left:3px solid ${mc}">
          <div style="display:flex;align-items:center;gap:7px;width:100%">
            ${av(member,24)}
            <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;color:var(--txt)">${member}</div><div style="font-size:10px;color:var(--txt3)">${mt.length} tasks</div></div>
            <span style="color:var(--txt3);font-size:11px;transition:.15s">${isCollapsed?'▶':'▼'}</span>
          </div>
          ${!isCollapsed?`<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
            ${STS.map(s=>{const c=mt.filter(t=>t.status===s.id).length;return c>0?`<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:2px;background:${stBg[s.id]}22;color:${stBg[s.id]}">${c} ${s.label}</span>`:''}).join('')}
          </div>`:''}
        </div>
        ${STS.map(st=>{
          const cards=tasks.filter(t=>t.owner===member&&t.status===st.id);
          return`<div class="jira-lane-cell">
            ${cards.length===0?`<div class="jira-empty">No ${st.label.toLowerCase()} tasks</div>`:cards.map(t=>jiraCard(t)).join('')}
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
    <!-- Unassigned row -->
    ${(()=>{const ua=tasks.filter(t=>!t.owner||!TEAM.includes(t.owner));if(!ua.length)return'';const isC=collapsedLanes.has('__unassigned');return`<div class="jira-lane ${isC?'collapsed':''}">
      <div class="jira-lane-lbl" data-action="toggleLane" data-lane="__unassigned" style="border-left:3px solid #97A0AF">
        <div style="display:flex;align-items:center;gap:7px"><div style="width:24px;height:24px;border-radius:50%;background:#97A0AF;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700">?</div><div><div style="font-weight:700;font-size:13px;color:var(--txt)">Unassigned</div><div style="font-size:10px;color:var(--txt3)">${ua.length} tasks</div></div><span style="color:var(--txt3);font-size:11px;margin-left:auto">${isC?'▶':'▼'}</span></div>
      </div>
      ${STS.map(st=>`<div class="jira-lane-cell">${ua.filter(t=>t.status===st.id).map(t=>jiraCard(t)).join('')||`<div class="jira-empty">—</div>`}</div>`).join('')}
    </div>`;})()}
  </div></div>`;
}

function jiraCard(t){
  const cat=gc(t.category),pr=gp(t.priority),ov=isOv(t),dis=isDis(t);
  return`<div class="jc" style="border-left-color:${dis?'#FF8B00':ov?'#DE350B':cat.color};opacity:${t.status==='completed'?.7:1}">
    <div class="jc-acts"><button data-action="editTask" data-id="${t.id}" class="jc-act">✏</button><button data-action="delTask" data-id="${t.id}" class="jc-act" style="color:#DE350B">✕</button></div>
    <div class="jc-title ${t.status==='completed'?'done':''}">${esc(t.title)}</div>
    <div class="jc-meta">
      <span class="jc-chip" style="color:${cat.color};background:${cat.color}14">${cat.icon} ${cat.label}</span>
      <span class="jc-prio" style="background:${pr.color}" title="${pr.label}"></span>
      ${dis?`<span class="jc-chip" style="color:#974F0C;background:#FFFAE6">⚠</span>`:''}
      ${ov?`<span class="jc-chip" style="color:#BF2600;background:#FFEBE6">🔴</span>`:''}
      ${t.dueDate?`<span style="font-size:10px;color:${ov?'#DE350B':'var(--txt3)'}">📅${fdt(t.dueDate,t.dueTime)}</span>`:''}
      ${t.status==='completed'&&t.timeTaken?`<span class="jc-chip" style="color:#006644;background:#E3FCEF">⏱ ${t.timeTaken}m</span>`:''}
      ${t.owner?`<span style="margin-left:auto">${av(t.owner,16)}</span>`:''}
    </div>
  </div>`;
}

// 3. MANAGER DASHBOARD — ProjectManager.com + Image 4 style
// ══════════════════════════════════════════════════════════════
function renderDash(){
  const tot=tasks.length,done=tasks.filter(t=>t.status==='completed').length;

  const cr=pct(done,tot);const crClr=cr>=70?'#006644':cr>=40?'#0052CC':'#DE350B';
  const ts=TEAM.map(m=>{const mt=tasks.filter(t=>t.owner===m);return{name:m,total:mt.length,done:mt.filter(t=>t.status==='completed').length,inP:mt.filter(t=>t.status==='inprogress').length,todo:mt.filter(t=>t.status==='todo').length,ov:mt.filter(isOv).length,dis:mt.filter(isDis).length};});
  const catBars=CAT.map(c=>({label:c.icon+' '+c.label,value:tasks.filter(t=>t.category===c.id).length,color:c.color})).filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
  const mc=Math.max(...catBars.map(x=>x.value),1);

  const tSegs=[];let cu=0;if(done>0){tSegs.push(`#006644 0% ${pct(done,tot||1)}%`);cu=pct(done,tot||1);}if(inP>0){tSegs.push(`#0052CC ${cu}% ${cu+pct(inP,tot||1)}%`);cu+=pct(inP,tot||1);}if(todo>0)tSegs.push(`#DFE1E6 ${cu}% 100%`);
  const tGrad=tSegs.length?tSegs.join(','):'#DFE1E6';

  return`<div class="d-wrap">
  <!-- ══ Row A: KPI tiles (Image 4 style) ══ -->
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px">
    ${[{l:'Total Tasks',v:tot,c:'#0747A6',bg:'#DEEBFF',icon:'📋'},{l:'Completed',v:done,c:'#006644',bg:'#E3FCEF',icon:'✅',sub:cr+'%'},{l:'In Progress',v:inP,c:'#0052CC',bg:'#DEEBFF',icon:'🔄'},{l:'To Do',v:todo,c:'#42526E',bg:'#F4F5F7',icon:'⏳'},{l:'Overdue',v:ovC,c:'#BF2600',bg:'#FFEBE6',icon:'🚨'},{l:'Disrupted',v:disC,c:'#974F0C',bg:'#FFFAE6',icon:'⚠️'}].map(k=>`
    <div class="d-kpi" style="border-top:3px solid ${k.c};background:${k.bg}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div class="d-kpi-num" style="color:${k.c}">${k.v}</div><div style="width:30px;height:30px;border-radius:50%;background:${k.c}20;display:flex;align-items:center;justify-content:center;font-size:13px">${k.icon}</div></div>
      <div class="d-kpi-lbl">${k.l}</div>${k.sub?`<div style="font-size:10px;color:${k.c};font-weight:700;margin-top:3px">${k.sub} rate</div>`:''}
    </div>`).join('')}
  </div>

  <!-- ══ Row B: Summary | Tasks | Workload ══ -->
  <div style="display:grid;grid-template-columns:1.15fr 1fr .85fr;gap:12px;margin-bottom:12px">

    <!-- Summary (Image 1 style: dark header + table) -->
    <div class="wg">
      <div class="wg-hdr" style="background:#1565C0">
        <span class="wg-ttl">📋 Summary</span>
        <span class="wg-sub">${new Date().toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</span>
      </div>
      <div class="wg-body">
        <div class="sum-hdr"><span>Member</span><span style="text-align:center">Tasks</span><span style="text-align:center">Done</span><span style="text-align:center">OD</span><span>Progress</span></div>
        ${ts.map(m=>{const r=pct(m.done,m.total);const rc=m.ov>0?'#BF2600':r>=70?'#006644':'#0052CC';return`<div class="sum-row" style="background:${m.ov>0?'#FFF8F6':'#fff'}">
          <div style="display:flex;align-items:center;gap:7px">${av(m.name,22)}<span style="font-weight:600;font-size:13px">${m.name}</span>${m.ov>0?`<span style="width:6px;height:6px;border-radius:50%;background:#DE350B"></span>`:''}</div>
          <div style="text-align:center;font-weight:800;font-size:16px;color:#0747A6">${m.total}</div>
          <div style="text-align:center;font-weight:800;font-size:16px;color:#006644">${m.done}</div>
          <div style="text-align:center">${m.ov>0?`<span style="background:#FFEBE6;color:#BF2600;border:1px solid #FFBDAD;border-radius:2px;font-size:10px;font-weight:700;padding:1px 5px">${m.ov}</span>`:`<span style="color:#57D9A3;font-size:14px">✓</span>`}</div>
          <div style="display:flex;align-items:center;gap:5px"><div style="flex:1;height:7px;background:#EBECF0;border-radius:3px;overflow:hidden"><div style="height:100%;width:${r}%;background:${rc};transition:width .7s"></div></div><span style="font-size:11px;font-weight:700;color:${rc};min-width:26px">${r}%</span></div>
        </div>`;}).join('')}
        <!-- Category footer chips -->
        <div style="padding:8px 10px;border-top:1px solid var(--border);background:#F8F9FB;display:flex;flex-wrap:wrap;gap:4px">
          ${catBars.slice(0,5).map(c=>`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:2px;background:${c.color}14;color:${c.color};border:1px solid ${c.color}30">${c.label} ${c.value}</span>`).join('')}
        </div>
      </div>
    </div>

    <!-- Tasks donut (Image 1 style) -->
    <div class="wg">
      <div class="wg-hdr" style="background:#2E7D32">
        <span class="wg-ttl">📊 Tasks</span>
        <div style="display:flex;gap:6px">${[['Completed',done,'#A5D6A7'],['In Progress',inP,'#90CAF9'],['Not Started',todo,'rgba(255,255,255,.4)']].map(([l,v,c])=>`<span style="font-size:9px;color:${c};font-weight:700">${v} ${l.split(' ')[0]}</span>`).join('')}</div>
      </div>
      <div class="wg-body" style="display:flex;flex-direction:column;align-items:center;padding:14px 12px">
        <!-- Legend pills -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px">
          ${[['Completed',done,'#006644','#E3FCEF'],['In Progress',inP,'#0052CC','#DEEBFF'],['Not Started',todo,'#42526E','#F4F5F7']].map(([l,v,c,bg])=>`<div style="display:flex;align-items:center;gap:4px;border:1px solid ${c}25;background:${bg};border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;color:${c}"><span style="width:6px;height:6px;border-radius:50%;background:${c}"></span>${l}: <strong>${v}</strong></div>`).join('')}

        <div style="position:relative;width:140px;height:140px;flex-shrink:0">

          <div style="position:absolute;inset:26px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 6px rgba(0,0,0,.08)">
            <span style="font-size:24px;font-weight:800;color:var(--txt);letter-spacing:-1px;line-height:1">${done}</span>
            <span style="font-size:9px;color:var(--txt3);font-weight:600;margin-top:1px">of ${tot}</span>
            <span style="font-size:8px;color:#006644;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px">complete</span>
          </div>
        </div>
        <div style="margin-top:12px;text-align:center">
          <div style="font-size:28px;font-weight:800;color:${crClr};letter-spacing:-1px">${cr}%</div>
          <div style="font-size:11px;color:var(--txt2);font-weight:600">Completion Rate</div>
          <div style="height:4px;background:#EBECF0;border-radius:2px;margin-top:6px;width:80px"><div style="height:100%;width:${cr}%;background:${crClr};border-radius:2px;transition:width 1s"></div></div>
        </div>
      </div>
    </div>

    <!-- Workload stacked bars (Image 1 style) -->
    <div class="wg">
      <div class="wg-hdr" style="background:#E65100">
        <span class="wg-ttl">📈 Workload</span>
      </div>
      <div class="wg-body" style="padding:12px">
        <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          ${[['Completed','#006644'],['In Progress','#0052CC'],['Remaining','#DFE1E6']].map(([l,c])=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--txt2)"><span class="ldot" style="background:${c}"></span>${l}</div>`).join('')}
        </div>
        ${ts.map(m=>{const dP=pct(m.done,m.total||1),iP=pct(m.inP,m.total||1),rP=100-dP-iP;return`<div style="margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">${av(m.name,18)} ${m.name}</div><span style="font-size:10px;color:var(--txt3)">${m.total}</span></div>
          <div class="sbar">${m.done>0?`<div class="sbar-s" style="width:${dP}%;background:#006644"></div>`:''}${m.inP>0?`<div class="sbar-s" style="width:${iP}%;background:#0052CC"></div>`:''}${m.todo>0?`<div class="sbar-s" style="width:${rP}%;background:#DFE1E6"></div>`:''}</div>
          <div style="display:flex;justify-content:space-between;margin-top:3px;font-size:9px;font-weight:600"><span style="color:#006644">${m.done} done</span><span style="color:#0052CC">${m.inP} active</span><span style="color:#97A0AF">${m.todo} todo</span></div>
        </div>`;}).join('')}
      </div>
    </div>
  </div>

  <!-- ══ Row C: Category | Priority bars | At-Risk ══ -->
  <div style="display:grid;grid-template-columns:1.15fr 1fr .85fr;gap:12px">

    <!-- Category (Image 1: Time widget style) -->
    <div class="wg">
      <div class="wg-hdr" style="background:#4527A0">
        <span class="wg-ttl">📁 By Category</span>
        <span class="wg-sub">${catBars.length} active</span>
      </div>
      <div class="wg-body" style="padding:12px 14px">
        ${catBars.length===0?`<div style="text-align:center;padding:24px;color:var(--txt3);font-size:12px">No tasks</div>`:catBars.map(d=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;padding:3px 5px;border-radius:2px;transition:.08s;cursor:default" onmouseenter="this.style.background='#F4F5F7'" onmouseleave="this.style.background=''">
          <span style="font-size:11px;color:var(--txt2);min-width:105px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.label)}</span>
          <div style="flex:1;height:9px;background:#EBECF0;border-radius:3px;overflow:hidden"><div class="ifil" style="height:100%;width:${pct(d.value,mc)}%;background:${d.color}"></div></div>
          <span style="font-size:12px;font-weight:800;color:${d.color};min-width:18px;text-align:right">${d.value}</span>

            <div class="vbar-stack">
              <div class="vbar-s" style="height:${(mh/mx)*62}px;background:#DE350B;border-radius:2px 2px 0 0"></div>
              <div class="vbar-s" style="height:${(mm/mx)*62}px;background:#FF8B00"></div>
              <div class="vbar-s" style="height:${(ml/mx)*62}px;background:#00875A;border-radius:0 0 2px 2px"></div>
            </div>
            <span style="font-size:9px;font-weight:700;color:var(--txt2)">${m.name.slice(0,3)}</span>
            <span style="font-size:9px;color:var(--txt3)">${m.total}</span>
          </div>`;}).join('')}
        </div>
        <div style="display:flex;gap:10px;margin-bottom:10px">
          ${[['High','#DE350B'],['Med','#FF8B00'],['Low','#00875A']].map(([l,c])=>`<div style="display:flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--txt2)"><span class="ldot" style="background:${c};border-radius:1px"></span>${l}</div>`).join('')}
        </div>
        <div style="border-top:1px solid var(--border);padding-top:10px">
          ${[['High',tasks.filter(t=>t.priority==='high').length,'#DE350B'],['Medium',tasks.filter(t=>t.priority==='medium').length,'#FF8B00'],['Low',tasks.filter(t=>t.priority==='low').length,'#00875A']].map(([l,v,c])=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><span style="font-size:11px;color:var(--txt2);min-width:50px">${l}</span><div class="ibar" style="flex:1"><div class="ifil" style="width:${pct(v,tot||1)}%;background:${c}"></div></div><span style="font-size:11px;font-weight:800;color:${c};min-width:16px;text-align:right">${v}</span></div>`).join('')}
        </div>
      </div>
    </div>

    <!-- At-Risk (Image 1: Workload overflow style) -->
    <div class="wg">
      <div class="wg-hdr" style="background:#B71C1C">
        <span class="wg-ttl">⚠️ At-Risk</span>
        <span style="background:rgba(255,255,255,.2);border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;color:#fff">${atR.length}</span>
      </div>
      <div class="wg-body" style="padding:0">
        ${atR.length===0?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;height:100%"><div style="font-size:28px;margin-bottom:8px">✅</div><div style="font-weight:700;font-size:13px;color:#006644">All on track!</div></div>`:

        ${atR.slice(0,7).map((t,i)=>{const ov=isOv(t),dis=isDis(t);return`<div class="risk-grid risk-row" style="background:${i%2===0?'#fff':'#FAFAFA'}">
          <div class="risk-cell" style="font-weight:600;font-size:12px">${esc(t.title)}</div>
          <div class="risk-cell" style="display:flex;align-items:center;gap:4px">${t.owner?av(t.owner,16):''}<span style="font-size:11px;color:var(--txt2)">${esc(t.owner||'—')}</span></div>
          <div class="risk-cell" style="font-size:11px;color:${ov?'#DE350B':'var(--txt2)'}">${t.dueDate?fdt(t.dueDate,t.dueTime):'—'}</div>
          <div class="risk-cell">${ov?`<span class="d-badge" style="color:#BF2600;background:#FFEBE6;border-color:#FFBDAD">🔴 OD</span>`:''}${dis?`<span class="d-badge" style="color:#974F0C;background:#FFFAE6;border-color:#FFE380">⚠ DIS</span>`:''}</div>
        </div>`;}).join('')}
        ${atR.length>7?`<div style="padding:7px;text-align:center;font-size:10px;color:var(--txt3);border-top:1px solid var(--border)">+${atR.length-7} more</div>`:''}`}
      </div>
    </div>
  </div>
</div>`;}

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:36px;background:#F0F2F5"><div style="background:#fff;border-radius:3px;padding:32px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(9,30,66,.16)"><h2 style="font-size:18px;font-weight:700;margin-bottom:6px">Connect workspace</h2><p style="font-size:13px;color:var(--txt2);margin-bottom:22px">Enter GitHub details to sync across the team.</p><div style="display:flex;flex-direction:column;gap:14px"><div class="fg"><label class="flbl">Your Name</label><select id="cfg-user" class="fi">${TEAM.map(t=>`<option value="${t}" ${cfg.user===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="fg"><label class="flbl">GitHub Owner</label><input id="cfg-owner" class="fi" value="${esc(cfg.owner)}" placeholder="NikitaP44"/></div><div class="fg"><label class="flbl">Repository</label><input id="cfg-repo" class="fi" value="${esc(cfg.repo)}" placeholder="dqa-task-tracker"/></div><div class="fg"><label class="flbl">Personal Access Token</label><input id="cfg-pat" type="password" class="fi" value="${esc(cfg.pat)}" placeholder="ghp_..."/><span style="font-size:11px;color:var(--txt3);margin-top:3px;display:block">Needs Contents: Read &amp; Write</span></div><button data-action="saveConfig" style="background:#0052CC;color:#fff;border:none;border-radius:3px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%">Connect →</button><button data-action="localMode" style="background:transparent;color:#0052CC;border:2px solid var(--border);border-radius:3px;padding:8px;font-size:13px;cursor:pointer;width:100%">Continue locally</button></div></div></div></div>`;}

// ── DRAWER ─────────────────────────────────────────────────────────────────
function renderDrawer(){const t=editId?tasks.find(x=>x.id===editId):null;const defOwner=t?.owner||cfg.user;return`<div data-overlay="form" class="drawer-bg"><div class="drawer"><div class="drawer-hdr" style="background:${adhocMode?'#FF5630':'#0052CC'}"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="color:rgba(255,255,255,.7);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em">${adhocMode?'Quick Capture':t?'Edit Issue':'New Issue'}</div><div style="color:#fff;font-size:16px;font-weight:700;margin-top:2px">${adhocMode?'⚡ Adhoc':t?'✏️ Edit Task':'➕ Create Task'}</div></div><button data-action="closeForm" style="border:none;background:rgba(255,255,255,.15);border-radius:3px;width:30px;height:30px;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center">×</button></div></div>
<div class="drawer-body"><div style="display:flex;flex-direction:column;gap:15px"><div class="fg"><label class="flbl">Task Title *</label><input id="fm-title" class="fi" value="${esc(t?.title||'')}" placeholder="What needs to be done?"/></div><div class="fg2"><div class="fg"><label class="flbl">Assigned To</label><select id="fm-owner" class="fi">${TEAM.map(m=>`<option value="${m}" ${(t?.owner||cfg.user)===m?'selected':''}>${m}</option>`).join('')}</select></div><div class="fg"><label class="flbl">Category</label><select id="fm-cat" class="fi">${CAT.map(c=>`<option value="${c.id}" ${(t?.category||'adhoc')===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}</select></div></div><div class="fg2"><div class="fg"><label class="flbl">Priority</label><select id="fm-pri" class="fi">${PRI.map(p=>`<option value="${p.id}" ${(t?.priority||'medium')===p.id?'selected':''}>${p.label}</option>`).join('')}</select></div><div class="fg"><label class="flbl">Status</label><select id="fm-status" class="fi">${STS.map(s=>`<option value="${s.id}" ${(t?.status||'todo')===s.id?'selected':''}>${s.label}</option>`).join('')}</select></div></div><div class="fg2"><div class="fg"><label class="flbl">⏱ Time Taken (minutes)</label><input id="fm-timetaken" type="number" min="0" step="5" class="fi" value="${t?.timeTaken||''}" placeholder="e.g. 30"/></div><div class="fg" style="justify-content:flex-end"><div style="font-size:11px;color:var(--txt3);line-height:1.4;padding-bottom:9px">Feeds the Weekly Work Done Statement — log minutes when marking Done</div></div></div><div style="background:#F4F5F7;border-radius:3px;padding:12px"><div style="font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Timeline</div><div class="fg2"><div class="fg"><label class="flbl">🟢 Start Date</label><input id="fm-sdate" type="date" class="fi" value="${t?.startDate||''}"/></div><div class="fg"><label class="flbl">Start Time</label><input id="fm-stime" type="time" class="fi" value="${t?.startTime||''}"/></div></div><div class="fg2" style="margin-top:10px"><div class="fg"><label class="flbl">📅 Due Date</label><input id="fm-ddate" type="date" class="fi" value="${t?.dueDate||''}"/></div><div class="fg"><label class="flbl">Due Time</label><input id="fm-dtime" type="time" class="fi" value="${t?.dueTime||''}"/></div></div><div style="font-size:11px;color:var(--txt3);margin-top:7px">Alerts fire when deadlines are missed</div></div><div class="fg"><label class="flbl">Notes</label><textarea id="fm-notes" class="fi" rows="3" placeholder="Context, links, references…" style="resize:vertical">${esc(t?.notes||'')}</textarea></div></div></div>
<div class="drawer-foot"><button data-action="saveTask" style="width:100%;background:${adhocMode?'#FF5630':'#0052CC'};color:#fff;border:none;border-radius:3px;padding:11px;font-size:14px;font-weight:700;cursor:pointer">${t?'Save Changes':adhocMode?'⚡ Add Adhoc':'Create Task'}</button></div></div></div>`;}

// ── EVENTS ─────────────────────────────────────────────────────────────────
document.addEventListener('click',function(e){if(e.target.dataset.overlay==='form'){showForm=false;editId=null;adhocMode=false;render();return;}const btn=e.target.closest('[data-action]');if(!btn)return;const{action,id,view:v,aid,val,lane}=btn.dataset;switch(action){case 'openAdd':showForm=true;adhocMode=false;editId=null;render();break;case 'openAdhoc':showForm=true;adhocMode=true;editId=null;render();break;case 'closeForm':showForm=false;editId=null;adhocMode=false;render();break;case 'saveTask':saveTask();break;case 'quickAdd':quickAdd();break;case 'editTask':editTask(id);break;case 'delTask':delTask(id);break;case 'setView':view=v;render();break;case 'stFilter':stFilter=val;render();break;case 'toggleLane':if(collapsedLanes.has(lane))collapsedLanes.delete(lane);else collapsedLanes.add(lane);render();break;case 'saveConfig':saveConfig();break;case 'localMode':cfg.user=document.getElementById('cfg-user')?.value||'Nikita';cfg._local=true;lsSave('dqa_cfg',cfg);tasks=lsLoad('dqa_tasks',[]);render();break;case 'resetCfg':if(confirm('Switch user?')){cfg={owner:'',repo:'',pat:'',user:'Nikita'};lsSave('dqa_cfg',cfg);render();}break;case 'refreshTasks':gitFailed=false;errShown=false;loadTasks();break;case 'manualSync':gitFailed=false;errShown=false;loadTasks();break;case 'clearFilters':fCat='all';stFilter='all';render();break;case 'enBrowser':if('Notification' in window)Notification.requestPermission().then(()=>render());break;case 'dlHTML':dlHTML();break;case 'dimToast':toastArr=toastArr.filter(x=>String(x.aid)!==String(aid));renderToasts();break;}});
document.addEventListener('change',function(e){const el=e.target;if(el.dataset.filter==='cat'){fCat=el.value;render();}else if(el.dataset.action==='updSt'){updSt(el.dataset.id,el.value);}});
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&e.target.id==='qa-input'){e.preventDefault();quickAdd();}});

// ── DOWNLOAD ───────────────────────────────────────────────────────────────
function dlHTML(){const sty=document.getElementById('ss')?.textContent||'';const scr=document.getElementById('sc')?.textContent||'';const html='<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>DQA Task Tracker — Project44</title>\n<style id="ss">'+sty+'</style>\n</head>\n<body>\n<div id="toasts" style="position:fixed;top:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;max-width:340px;pointer-events:none"></div>\n<div id="root"></div>\n<script id="sc">'+scr+'<\/script>\n</body>\n</html>';const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='DQA_TaskTracker.html';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);}

// ── INIT ───────────────────────────────────────────────────────────────────
if(cfg.pat){loadTasks();}else{tasks=lsLoad('dqa_tasks',[]);render();}
setInterval(()=>{now=new Date();checkAlerts();if(!showForm)render();},60000);
</script>
</body>
</html>
