<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>project44 · DQA Task Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:Arial,Helvetica,sans-serif;background:#F0F4F8;color:#000;display:flex;flex-direction:column}
input,select,textarea,button{font-family:Arial,Helvetica,sans-serif;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c4c4c4;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ═══ LAYOUT ═══ */
.app{display:flex;height:100vh;overflow:hidden}

/* ═══ SIDEBAR ═══ */
.sidebar{width:228px;min-width:228px;background:#07456B;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-circle{width:30px;height:30px;background:#0072EC;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff;flex-shrink:0}
.logo-text{color:#fff;font-size:.85rem;font-weight:700;line-height:1.2}
.logo-sub{color:rgba(255,255,255,.45);font-size:.65rem}

.sb-users{padding:14px 13px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-label{color:rgba(255,255,255,.38);font-size:.62rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;font-weight:700}
.user-card{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:background .15s;border:1.5px solid transparent;margin-bottom:5px}
.user-card:hover{background:rgba(255,255,255,.07)}
.user-card.active{background:rgba(0,114,236,.28);border-color:rgba(0,114,236,.5)}
.u-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:#fff;flex-shrink:0}
.u-name{color:#fff;font-size:.78rem;font-weight:700;white-space:nowrap}
.u-stat{color:rgba(255,255,255,.4);font-size:.63rem;margin-top:1px}
.u-badge{margin-left:auto;font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:999px;background:rgba(239,68,68,.3);color:#fca5a5}

.sb-nav{padding:12px 13px;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.58);font-size:.8rem;font-weight:600;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:#0072EC;color:#fff}
.nav-icon{width:18px;text-align:center;flex-shrink:0;font-size:.95rem}

.sb-mystats{padding:13px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.ss-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ss-row span:first-child{color:rgba(255,255,255,.5);font-size:.72rem}
.ss-val{font-size:.75rem;font-weight:700;color:#fff;background:rgba(255,255,255,.1);padding:1px 7px;border-radius:3px}
.ss-val.red{background:rgba(239,68,68,.32);color:#fca5a5}
.ss-val.amber{background:rgba(248,198,34,.2);color:#F8C622}
.ss-val.green{background:rgba(5,165,80,.25);color:#6ee7b7}

/* ═══ CONTENT ═══ */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ═══ TOPBAR ═══ */
.topbar{background:#0072EC;padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left h1{font-size:.95rem;font-weight:700;color:#fff}
.tb-left p{font-size:.68rem;color:rgba(255,255,255,.65);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:7px}
.tbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:5px;border:none;cursor:pointer;font-size:.75rem;font-weight:700;transition:all .15s;white-space:nowrap}
.tbtn-white{background:#fff;color:#0072EC}.tbtn-white:hover{background:#e6e6e6}
.tbtn-gold{background:#F8C622;color:#07456B}.tbtn-gold:hover{background:#e6b81e}
.tbtn-outline{background:rgba(255,255,255,.14);color:#fff;border:1.5px solid rgba(255,255,255,.3)}.tbtn-outline:hover{background:rgba(255,255,255,.22)}

/* ═══ VIEW TABS ═══ */
.view-tabs{display:flex;background:#fff;border-bottom:2px solid #E6E6E6;padding:0 22px;flex-shrink:0;gap:0}
.vt{padding:10px 16px;font-size:.78rem;font-weight:700;color:#969696;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;display:flex;align-items:center;gap:6px}
.vt:hover{color:#0072EC}
.vt.active{color:#0072EC;border-bottom-color:#0072EC}
.vt-count{background:#F0F4F8;color:#969696;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:3px}
.vt.active .vt-count{background:#0072EC;color:#fff}

/* ═══ KANBAN AREA ═══ */
.kanban-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.kanban-filters{background:#fff;padding:10px 22px;border-bottom:1px solid #E6E6E6;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.fl{color:#969696;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.filter-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:3px 10px;border-radius:3px;font-size:.7rem;font-weight:700;cursor:pointer;border:1.5px solid #E6E6E6;background:#F0F4F8;color:#969696;transition:all .12s}
.chip:hover{border-color:#0072EC;color:#0072EC}
.chip.on{background:#0072EC;color:#fff;border-color:#0072EC}
.chip-member.on{background:var(--mc);border-color:var(--mc)}
.search-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;background:#F0F4F8;border:1.5px solid #E6E6E6;border-radius:5px;padding:4px 10px}
.search-wrap input{border:none;background:none;outline:none;font-size:.78rem;width:150px;color:#000}

/* ═══ KANBAN BOARD ═══ */
.kanban-board{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px 22px;display:flex;gap:14px;align-items:flex-start}

/* ═══ KANBAN COLUMN ═══ */
.kb-col{width:240px;min-width:240px;display:flex;flex-direction:column;max-height:100%;flex-shrink:0}
.kb-col-head{background:#07456B;border-radius:8px 8px 0 0;padding:10px 13px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.kbh-icon{font-size:1rem;flex-shrink:0}
.kbh-label{color:#fff;font-size:.78rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kbh-counts{display:flex;gap:4px;align-items:center;flex-shrink:0}
.kbh-total{background:rgba(255,255,255,.18);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:3px}
.kbh-risk{background:rgba(239,68,68,.45);color:#fca5a5;font-size:.63rem;font-weight:700;padding:2px 6px;border-radius:3px;animation:pulse 2s infinite}
.kb-col-body{background:#E6ECF1;border-radius:0 0 8px 8px;padding:10px 9px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:7px;min-height:120px}
.kb-col-body:empty::after{content:'No tasks';color:#969696;font-size:.75rem;text-align:center;padding:20px 0;display:block}

/* ═══ RISK DIVIDER ═══ */
.risk-divider{display:flex;align-items:center;gap:6px;padding:3px 0}
.risk-divider span{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.risk-divider::before,.risk-divider::after{content:'';flex:1;height:1px;background:currentColor;opacity:.3}
.rd-risk{color:#dc2626}
.rd-high{color:#d97706}
.rd-normal{color:#969696}

/* ═══ KANBAN CARD ═══ */
.kb-card{background:#fff;border-radius:7px;padding:10px 11px;border-left:3px solid var(--lc,#0072EC);box-shadow:0 1px 3px rgba(0,0,0,.07);transition:box-shadow .15s;cursor:default;animation:fadeUp .18s ease;flex-shrink:0}
.kb-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12)}
.kb-card.is-overdue{border-left-color:#ef4444;background:#fffafa}
.kb-card.is-disrupted{border-left-color:#F8C622;background:#fffef5}

.kc-name{font-size:.8rem;font-weight:700;color:#000;line-height:1.35;margin-bottom:7px;word-break:break-word}
.kc-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:5px}
.kc-badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.kc-actions{display:flex;gap:2px;flex-shrink:0}
.kc-btn{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;font-size:.78rem;color:#c4c4c4;transition:all .12s}
.kc-btn:hover{background:#F0F4F8;color:#000}

.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:.63rem;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.b-overdue{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.b-disrupted{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.b-high{background:#ef4444;color:#fff}
.b-medium{background:#F8C622;color:#07456B}
.b-low{background:#05A550;color:#fff}
.b-status{font-weight:700}
.b-owner{color:#fff}

.kc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px;flex-wrap:wrap;gap:4px}
.kc-due{font-size:.65rem;color:#969696;display:flex;align-items:center;gap:3px}
.kc-due.near{color:#d97706;font-weight:700}
.kc-due.past{color:#dc2626;font-weight:700}
.kc-customer{font-size:.63rem;color:#0072EC;font-weight:700;max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-avatars{display:flex;gap:-2px;align-items:center}
.kc-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;border:2px solid #fff;flex-shrink:0}

/* ═══ STS BTN ═══ */
.sts-btn{padding:2px 8px;border-radius:3px;font-size:.64rem;font-weight:700;cursor:pointer;border:1.5px solid;background:#fff;transition:all .12s;white-space:nowrap}

/* ═══ MY TASKS (LIST) ═══ */
.list-area{flex:1;overflow-y:auto;padding:16px 22px}
.list-filters{background:#fff;padding:10px 16px;border-radius:7px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #E6E6E6}
.task-grid{display:grid;gap:9px}
.task-card{background:#fff;border-radius:7px;padding:13px 15px;border:1px solid #E6E6E6;border-left:4px solid var(--lc,#0072EC);box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .15s;animation:fadeUp .18s ease}
.task-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.09)}
.task-card.overdue{border-left-color:#ef4444}
.task-card.disrupted{border-left-color:#F8C622}
.tc-top{display:flex;align-items:flex-start;gap:9px}
.tc-icon{font-size:1.05rem;margin-top:1px;flex-shrink:0}
.tc-body{flex:1;min-width:0}
.tc-name{font-size:.88rem;font-weight:700;color:#000;word-break:break-word;line-height:1.3}
.tc-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:center}
.tc-dates{margin-top:4px;display:flex;gap:10px;font-size:.68rem;color:#969696;flex-wrap:wrap}
.tc-customer{font-size:.68rem;color:#0072EC;font-weight:700;margin-top:3px}
.tc-notes{font-size:.71rem;color:#4a5568;margin-top:6px;line-height:1.5;background:#F4F6F9;padding:5px 9px;border-radius:4px;border-left:3px solid #0072EC}
.tc-actions{display:flex;gap:3px;flex-shrink:0}
.tc-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;font-size:.82rem;color:#969696;transition:all .12s}
.tc-btn:hover{background:#F0F4F8;color:#000}
.empty-state{text-align:center;padding:50px 20px;color:#969696}
.empty-icon{font-size:2.6rem;margin-bottom:10px}
.empty-state h3{font-size:.9rem;color:#4a5568;font-weight:700;margin-bottom:5px}

/* ═══ STATS ═══ */
.stats-area{flex:1;overflow-y:auto;padding:16px 22px}

/* ═══ OVERLAY + MODAL ═══ */
.overlay{position:fixed;inset:0;background:rgba(7,69,107,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:#fff;border-radius:9px;width:100%;max-width:530px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .2s ease}
.modal-head{background:#0072EC;padding:14px 18px;border-radius:9px 9px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:.95rem;font-weight:700;color:#fff}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;padding:3px 8px;border-radius:4px;font-size:.95rem}
.modal-close:hover{background:rgba(255,255,255,.3)}
.modal-body{padding:18px 20px 20px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:.68rem;font-weight:700;color:#07456B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1.5px solid #E6E6E6;border-radius:5px;font-size:.83rem;color:#000;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#0072EC}
.fg textarea{resize:vertical;min-height:62px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.form-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:8px}
.fbtn{padding:6px 16px;border-radius:5px;border:none;cursor:pointer;font-size:.8rem;font-weight:700;transition:all .15s}
.fbtn-cancel{background:#F0F4F8;color:#07456B;border:1.5px solid #E6E6E6}.fbtn-cancel:hover{background:#E6E6E6}
.fbtn-save{background:#0072EC;color:#fff}.fbtn-save:hover{background:#005cc5}

/* SETTINGS */
.stabs{display:flex;border-bottom:2px solid #E6E6E6;margin-bottom:14px}
.stab{padding:7px 13px;font-size:.76rem;font-weight:700;color:#969696;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s}
.stab:hover{color:#0072EC}
.stab.active{color:#0072EC;border-bottom-color:#0072EC}

/* TOAST */
#toastBox{position:fixed;top:63px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;max-width:290px;pointer-events:none}
.toast-item{background:#07456B;color:#fff;padding:8px 13px;border-radius:5px;font-size:.78rem;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.25);border-left:4px solid #0072EC;animation:slideIn .22s ease}

@media(max-width:700px){
  .sidebar{width:190px;min-width:190px}
  .fg-row{grid-template-columns:1fr}
  .kb-col{width:210px;min-width:210px}
}
</style>
</head>
<body>
<div id="toastBox"></div>
<div id="root"></div>
<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const USERS=[
  {id:'nikita',name:'Nikita Tripathi',initials:'NT',role:'DQ Analyst',color:'#0072EC'},
  {id:'jayesh',name:'Jayesh Soni',    initials:'JS',role:'DQ Analyst',color:'#05A550'},
  {id:'shashi',name:'Shashi Sahu',    initials:'SS',role:'DQ Analyst',color:'#E98A2C'},
];
const CAT=[
  {id:'report',      label:'Report',            icon:'📊',color:'#0072EC'},
  {id:'outreaches',  label:'Outreaches',         icon:'📣',color:'#E98A2C'},
  {id:'meeting',     label:'Meeting',            icon:'🤝',color:'#05A550'},
  {id:'preparation', label:'Preparation',        icon:'📋',color:'#00AEEF'},
  {id:'escalation',  label:'Support Escalation', icon:'🚨',color:'#ef4444'},
  {id:'tools',       label:'Tools Training',     icon:'🛠️',color:'#7c3aed'},
  {id:'skill',       label:'Skill Development',  icon:'📚',color:'#07456B'},
  {id:'adhoc',       label:'Adhoc',              icon:'⚡',color:'#F8C622'},
];
const STS=[
  {id:'todo',       label:'Yet to Start',color:'#969696',bg:'#F4F6F9'},
  {id:'inprogress', label:'In Progress', color:'#E98A2C',bg:'#fffbeb'},
  {id:'completed',  label:'Completed',   color:'#05A550',bg:'#f0fdf4'},
];
const PRI=[
  {id:'high',  label:'High',  cls:'b-high'},
  {id:'medium',label:'Medium',cls:'b-medium'},
  {id:'low',   label:'Low',   cls:'b-low'},
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentUser = lsLoad('tt_current_user','nikita');
let allTasks    = {};
let settings    = lsLoad('tt_settings',{browserEnabled:false});
USERS.forEach(u=>{ allTasks[u.id]=lsLoad('tt_tasks_'+u.id,[]); });

let navPage     = 'my';     // 'my' | 'team' | 'stats'
let fCat        = 'all';
let fSts        = 'all';
let fSearch     = '';
let fMember     = 'all';
let showForm    = false;
let editId      = null;
let form        = emptyForm();
let showSettings= false;
let stab        = 'backup';
let notifPerm   = ('Notification' in window)?Notification.permission:'unsupported';
let notified    = new Set();

function emptyForm(){
  return{name:'',category:'report',priority:'medium',status:'todo',
         startDate:'',dueDate:'',customer:'',notes:'',assignedTo:currentUser};
}

// ══════════════════════════════════════
// STORAGE
// ══════════════════════════════════════
function lsLoad(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function saveTasks(uid){lsSave('tt_tasks_'+uid,allTasks[uid]);}

// ══════════════════════════════════════
// TASK CRUD
// ══════════════════════════════════════
function saveTask(){
  if(!form.name.trim()){toast('⚠️ Task name is required');return;}
  const ownerId=form.assignedTo||currentUser;
  if(editId){
    USERS.forEach(u=>{
      allTasks[u.id]=allTasks[u.id].filter(t=>t.id!==editId);
      saveTasks(u.id);
    });
    const t={...form,id:editId,ownerId,createdAt:new Date().toISOString()};
    allTasks[ownerId].push(t);
    saveTasks(ownerId);
    toast('✅ Task updated');
  } else {
    const t={...form,id:Date.now().toString(),createdAt:new Date().toISOString(),ownerId};
    allTasks[ownerId].push(t);
    saveTasks(ownerId);
    toast('✅ Task added');
  }
  showForm=false;editId=null;form=emptyForm();render();
}
function deleteTask(uid,id){
  if(!confirm('Delete this task?'))return;
  allTasks[uid]=allTasks[uid].filter(t=>t.id!==id);
  saveTasks(uid);toast('🗑️ Task deleted');render();
}
function cycleStatus(uid,id){
  const order=['todo','inprogress','completed'];
  allTasks[uid]=allTasks[uid].map(t=>{
    if(t.id!==id)return t;
    return{...t,status:order[(order.indexOf(t.status)+1)%order.length]};
  });
  saveTasks(uid);render();
}
function editTask(uid,id){
  const t=allTasks[uid].find(t=>t.id===id);if(!t)return;
  editId=id;
  form={name:t.name,category:t.category,priority:t.priority,status:t.status,
        startDate:t.startDate||'',dueDate:t.dueDate||'',customer:t.customer||'',
        notes:t.notes||'',assignedTo:t.ownerId||uid};
  showForm=true;render();
}

// ══════════════════════════════════════
// FLAGS & SORT
// ══════════════════════════════════════
function isOverdue(t){return t.status!=='completed'&&t.dueDate&&new Date(t.dueDate)<new Date();}
function isDisrupted(t){return t.status==='todo'&&t.startDate&&new Date(t.startDate)<new Date();}
function isDueSoon(t){
  if(!t.dueDate||t.status==='completed')return false;
  const h=(new Date(t.dueDate)-new Date())/3600000;
  return h>0&&h<24;
}

// Risk score: overdue=0, disrupted=1, high priority=2, medium=3, low=4
function riskScore(t){
  if(isOverdue(t))return 0;
  if(isDisrupted(t))return 1;
  if(t.priority==='high')return 2;
  if(t.priority==='medium')return 3;
  return 4;
}

function sortedByRisk(arr){
  return [...arr].sort((a,b)=>riskScore(a)-riskScore(b));
}

// ══════════════════════════════════════
// BACKUP / RESTORE
// ══════════════════════════════════════
function exportUser(){
  const data={exportedAt:new Date().toISOString(),version:'3.0',userId:currentUser,tasks:allTasks[currentUser]};
  download(JSON.stringify(data,null,2),`TaskTracker_${currentUser}_${today()}.json`);
  toast('💾 Your backup downloaded');
}
function exportTeam(){
  const data={exportedAt:new Date().toISOString(),version:'3.0',type:'team',tasks:allTasks};
  download(JSON.stringify(data,null,2),`TaskTracker_Team_${today()}.json`);
  toast('💾 Team backup downloaded');
}
function importBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.type==='team'&&d.tasks){
          if(!confirm(`Restore full team backup from ${new Date(d.exportedAt).toLocaleString()}?`))return;
          USERS.forEach(u=>{if(d.tasks[u.id]){allTasks[u.id]=d.tasks[u.id];saveTasks(u.id);}});
          toast('✅ Team data restored');render();
        } else if(d.userId&&d.tasks){
          if(!confirm(`Restore ${d.tasks.length} tasks for ${d.userId} from ${new Date(d.exportedAt).toLocaleString()}?`))return;
          allTasks[d.userId]=d.tasks;saveTasks(d.userId);
          toast(`✅ Restored ${d.tasks.length} tasks for ${d.userId}`);render();
        } else throw new Error('Unknown format');
      }catch(err){toast('❌ Invalid backup file');}
    };
    r.readAsText(f);
  };
  inp.click();
}
function download(content,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'application/json'}));
  a.download=filename;a.click();
}
function downloadApp(){
  const src='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([src],{type:'text/html'}));
  a.download='TaskTracker_v3.html';a.click();
  toast('⬇️ App downloaded');
}

// NOTIFICATIONS
// ══════════════════════════════════════
function checkNotifs(){
  if(!settings.browserEnabled||notifPerm!=='granted')return;
  allTasks[currentUser].forEach(t=>{
    if(t.status==='completed')return;
    if(isOverdue(t)&&!notified.has('od'+t.id)){notified.add('od'+t.id);fireNotif('🔴 Overdue: '+t.name,'Due date passed');}
    if(isDisrupted(t)&&!notified.has('ds'+t.id)){notified.add('ds'+t.id);fireNotif('⚠️ Disrupted: '+t.name,'Start date missed');}
    if(isDueSoon(t)&&!notified.has('sn'+t.id)){notified.add('sn'+t.id);fireNotif('⏰ Due today: '+t.name,'Complete before EOD');}
  });
}
function fireNotif(title,body){
  if(notifPerm==='granted')new Notification(title,{body});
  toast('🔔 '+title);
}
async function enableNotif(){
  const p=await Notification.requestPermission();
  notifPerm=p;
  if(p==='granted'){settings.browserEnabled=true;lsSave('tt_settings',settings);toast('🔔 Notifications enabled');}
  else toast('❌ Permission denied');
  render();
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function el(t,c){const d=document.createElement(t);if(c)d.className=c;return d;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getCat(id){return CAT.find(c=>c.id===id)||CAT[0];}
function getSts(id){return STS.find(s=>s.id===id)||STS[0];}
function getUser(id){return USERS.find(u=>u.id===id)||USERS[0];}
function fmtDate(d){if(!d)return null;return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});}
function today(){return new Date().toISOString().split('T')[0];}
function toast(msg){
  const box=document.getElementById('toastBox');if(!box)return;
  const e=document.createElement('div');e.className='toast-item';e.textContent=msg;
  box.appendChild(e);setTimeout(()=>e.remove(),3000);
}
function userStats(uid){
  const t=allTasks[uid];
  return{total:t.length,
    todo:t.filter(x=>x.status==='todo').length,
    inprog:t.filter(x=>x.status==='inprogress').length,
    done:t.filter(x=>x.status==='completed').length,
    overdue:t.filter(x=>isOverdue(x)).length,
    disrupted:t.filter(x=>isDisrupted(x)).length};
}

// ══════════════════════════════════════
// KANBAN BOARD — TEAM VIEW
// ══════════════════════════════════════
function renderKanban(content){
  const wrap=el('div','kanban-wrap');
  content.appendChild(wrap);

  // Filter bar
  const fb=el('div','kanban-filters');
  fb.innerHTML=`
    <span class="fl">Status</span>
    <div class="filter-chips">
      <span class="chip ${fSts==='all'?'on':''}" onclick="fSts='all';render()">All</span>
      ${STS.map(s=>`<span class="chip ${fSts===s.id?'on':''}" onclick="fSts='${s.id}';render()">${s.label}</span>`).join('')}
    </div>
    <div style="width:1px;height:22px;background:#E6E6E6;flex-shrink:0"></div>
    <div class="search-wrap">
      <span style="font-size:.85rem">🔍</span>
      <input type="text" value="${esc(fSearch)}" placeholder="Search tasks…" oninput="fSearch=this.value;render()">
    </div>`;
  wrap.appendChild(fb);

  // Board
  const board=el('div','kanban-board');
  wrap.appendChild(board);

  // Gather tasks to show
  let poolTasks=[];
  const members = fMember==='all' ? USERS.map(u=>u.id) : [fMember];
  members.forEach(uid=>{ allTasks[uid].forEach(t=>poolTasks.push({...t,_uid:uid})); });

  // Apply status + search filters
  poolTasks=poolTasks.filter(t=>{
    const stsOk=fSts==='all'||t.status===fSts;
    const srchOk=!fSearch||[t.name,t.customer||'',t.notes||''].join(' ').toLowerCase().includes(fSearch.toLowerCase());
    return stsOk&&srchOk;
  });

  // Render one column per DQ category
  CAT.forEach(cat=>{
    const colTasks=sortedByRisk(poolTasks.filter(t=>t.category===cat.id));
    const riskCount=colTasks.filter(t=>isOverdue(t)||isDisrupted(t)).length;
    const highCount=colTasks.filter(t=>!isOverdue(t)&&!isDisrupted(t)&&t.priority==='high').length;

    const col=el('div','kb-col');

    // Column header
    const head=el('div','kb-col-head');
    head.innerHTML=`
      <span class="kbh-icon">${cat.icon}</span>
      <span class="kbh-label">${cat.label}</span>
      <div class="kbh-counts">
        ${riskCount>0?`<span class="kbh-risk">🔴 ${riskCount}</span>`:''}
        ${highCount>0?`<span class="kbh-total" style="background:rgba(248,198,34,.3);color:#F8C622">⭐ ${highCount}</span>`:''}
        <span class="kbh-total">${colTasks.length}</span>
      </div>`;
    col.appendChild(head);

    // Column body
    const body=el('div','kb-col-body');
    col.appendChild(body);

    if(colTasks.length===0){
      body.innerHTML='';
    } else {
      // Section dividers: At Risk → High Priority → Normal
      const atRisk   = colTasks.filter(t=>isOverdue(t)||isDisrupted(t));
      const highPri  = colTasks.filter(t=>!isOverdue(t)&&!isDisrupted(t)&&t.priority==='high');
      const normal   = colTasks.filter(t=>!isOverdue(t)&&!isDisrupted(t)&&t.priority!=='high');

      if(atRisk.length>0){
        body.appendChild(dividerEl('🔴 At Risk','rd-risk'));
        atRisk.forEach(t=>body.appendChild(kanbanCard(t)));
      }
      if(highPri.length>0){
        body.appendChild(dividerEl('⭐ High Priority','rd-high'));
        highPri.forEach(t=>body.appendChild(kanbanCard(t)));
      }
      if(normal.length>0){
        if(atRisk.length>0||highPri.length>0) body.appendChild(dividerEl('Normal','rd-normal'));
        normal.forEach(t=>body.appendChild(kanbanCard(t)));
      }
    }

    board.appendChild(col);
  });
}

function dividerEl(label,cls){
  const d=el('div','risk-divider '+cls);
  d.innerHTML=`<span>${label}</span>`;
  return d;
}

function kanbanCard(t){
  const over=isOverdue(t), dis=isDisrupted(t), soon=isDueSoon(t);
  const sts=getSts(t.status), owner=getUser(t._uid);
  const cat=getCat(t.category);
  const card=el('div','kb-card'+(over?' is-overdue':dis?' is-disrupted':''));
  card.style.setProperty('--lc',cat.color);

  const dueCls=over?'past':soon?'near':'';
  const dueTxt=t.dueDate?fmtDate(t.dueDate):null;

  card.innerHTML=`
    <div class="kc-row">
      <div class="kc-badges">
        ${over?'<span class="badge b-overdue">🔴 Overdue</span>':dis?'<span class="badge b-disrupted">⚠️ Disrupted</span>':''}
        <span class="badge ${PRI.find(p=>p.id===t.priority)?.cls||'b-medium'}">${t.priority.charAt(0).toUpperCase()+t.priority.slice(1)}</span>
      </div>
      <div class="kc-actions">
        <button class="kc-btn" onclick="editTask('${t._uid}','${t.id}')" title="Edit">✏️</button>
        <button class="kc-btn" onclick="deleteTask('${t._uid}','${t.id}')" title="Delete">🗑️</button>
      </div>
    </div>
    <div class="kc-name">${esc(t.name)}</div>
    <div style="margin-bottom:5px">
      <button class="sts-btn" style="color:${sts.color};border-color:${sts.color};background:${sts.bg}" onclick="cycleStatus('${t._uid}','${t.id}')">${sts.label} ↻</button>
    </div>
    <div class="kc-footer">
      <div>
        ${dueTxt?`<div class="kc-due ${dueCls}">⏰ ${dueTxt}</div>`:''}
        ${t.customer?`<div class="kc-customer">🏢 ${esc(t.customer)}</div>`:''}
      </div>
      <div class="kc-av" style="background:${owner.color}" title="${owner.name}">${owner.initials}</div>
    </div>`;
  return card;
}

      <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px">

          `<div style="background:#F0F4F8;border-radius:5px;padding:7px 3px;text-align:center">
            <div style="font-size:1.25rem;font-weight:800;color:${c}">${v}</div>
            <div style="font-size:.62rem;color:#969696;line-height:1.2">${l}</div>
          </div>`).join('')}
      </div>
    </div>`;
  });
  html+=`</div>
  <div style="background:#fff;border-radius:8px;padding:16px;border:1px solid #E6E6E6">
    <div style="font-weight:700;font-size:.78rem;color:#07456B;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">Category Breakdown — Full Team</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px">
    ${CAT.map(c=>{
      const total=USERS.reduce((n,u)=>n+allTasks[u.id].filter(t=>t.category===c.id).length,0);
      const done=USERS.reduce((n,u)=>n+allTasks[u.id].filter(t=>t.category===c.id&&t.status==='completed').length,0);
      const risk=USERS.reduce((n,u)=>n+allTasks[u.id].filter(t=>t.category===c.id&&(isOverdue(t)||isDisrupted(t))).length,0);
      return `<div style="padding:10px 11px;border-radius:6px;border:1.5px solid ${c.color}25;background:${c.color}08">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
          <span>${c.icon}</span>
          <span style="font-size:.76rem;font-weight:700;color:${c.color};flex:1">${c.label}</span>
          ${risk>0?`<span style="font-size:.62rem;background:#fef2f2;color:#dc2626;padding:1px 5px;border-radius:3px">🔴 ${risk}</span>`:''}
        </div>
        <div style="font-size:1.25rem;font-weight:800;color:${c.color}">${total}</div>
        <div style="font-size:.65rem;color:#969696">${done} completed</div>
      </div>`;
    }).join('')}

  area.innerHTML=html;

        </div>
        <div class="fg"><label>Priority</label>
          <select onchange="form.priority=this.value">
            ${PRI.map(p=>`<option value="${p.id}"${form.priority===p.id?' selected':''}>${p.label}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>Status</label>
          <select onchange="form.status=this.value">
            ${STS.map(s=>`<option value="${s.id}"${form.status===s.id?' selected':''}>${s.label}</option>`).join('')}
          </select>
        </div>
        <div class="fg"><label>Assign To</label>
          <select onchange="form.assignedTo=this.value">
            ${USERS.map(u=>`<option value="${u.id}"${(form.assignedTo||currentUser)===u.id?' selected':''}>${u.name.split(' ')[0]}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>Planned Start</label>
          <input type="date" value="${form.startDate||''}" onchange="form.startDate=this.value">
        </div>
        <div class="fg"><label>Due Date</label>
          <input type="date" value="${form.dueDate||''}" onchange="form.dueDate=this.value">
        </div>
      </div>
      <div class="fg"><label>Customer / Account</label>
        <input type="text" value="${esc(form.customer||'')}" placeholder="e.g. Eastman, CEMEX, AstraZeneca…" oninput="form.customer=this.value">
      </div>
      <div class="fg"><label>Notes</label>
        <textarea placeholder="Context, links, or reminders…" oninput="form.notes=this.value">${esc(form.notes||'')}</textarea>
      </div>
      <div class="form-actions">
        <button class="fbtn fbtn-cancel" onclick="showForm=false;editId=null;form=emptyForm();render()">Cancel</button>
        <button class="fbtn fbtn-save" onclick="saveTask()">💾 ${editId?'Update':'Add Task'}</button>
      </div>
    </div>`;
  ov.appendChild(modal);root.appendChild(ov);
  setTimeout(()=>{const i=modal.querySelector('input[type=text]');if(i)i.focus();},50);
}

// ══════════════════════════════════════
// SETTINGS MODAL
// ══════════════════════════════════════
function renderSettingsModal(root){
  const ov=el('div','overlay');
  ov.onclick=e=>{if(e.target===ov){showSettings=false;render();}};
  const modal=el('div','modal');
  const tabs=[{id:'backup',label:'💾 Backup'},{id:'notif',label:'🔔 Notifications'}];
  let body='';
  if(stab==='backup'){
    body=`
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="padding:12px;background:#F0F4F8;border-radius:6px;border:1.5px solid #E6E6E6">
          <div style="font-weight:700;font-size:.82rem;margin-bottom:3px">💾 My Backup</div>
          <div style="font-size:.73rem;color:#969696;margin-bottom:9px">Export your own tasks. Restore on any device.</div>
          <button class="fbtn fbtn-save" onclick="exportUser();showSettings=false;render()">Export My Tasks</button>
        </div>
        <div style="padding:12px;background:#F0F4F8;border-radius:6px;border:1.5px solid #E6E6E6">
          <div style="font-weight:700;font-size:.82rem;margin-bottom:3px">🗂️ Team Backup</div>
          <div style="font-size:.73rem;color:#969696;margin-bottom:9px">All 3 members in one file. Recommended for Nikita weekly.</div>
          <button class="fbtn fbtn-save" onclick="exportTeam();showSettings=false;render()">Export Team Backup</button>
        </div>
        <div style="padding:12px;background:#F0F4F8;border-radius:6px;border:1.5px solid #E6E6E6">
          <div style="font-weight:700;font-size:.82rem;margin-bottom:3px">📂 Restore</div>
          <div style="font-size:.73rem;color:#969696;margin-bottom:9px">Accepts personal or team backup files.</div>
          <button class="fbtn fbtn-save" style="background:#05A550" onclick="importBackup();showSettings=false;">Restore from Backup</button>
        </div>
      </div>
      <div style="font-size:.7rem;color:#969696;margin-top:10px;padding:9px;background:#F0F4F8;border-radius:5px;border-left:3px solid #0072EC;line-height:1.6">
        💡 Export a backup every Friday. Store in OneDrive or email to yourself.
      </div>`;
  }
  if(stab==='notif'){
    const inIframe=window.self!==window.top;
    body=inIframe
      ?`<p style="font-size:.8rem;color:#4a5568;line-height:1.7;margin-bottom:10px">Notifications require a standalone HTTPS page.</p>
         <ol style="font-size:.8rem;color:#4a5568;line-height:2.2;padding-left:18px">
           <li>Click <strong>⬇️ Download</strong> in the header</li>
           <li><a href="https://app.netlify.com/drop" target="_blank" style="color:#0072EC">app.netlify.com/drop</a> → drag the file</li>
           <li>Open in Chrome/Edge → Settings → Notifications → Enable</li>
         </ol>`
      :`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#F0F4F8;border-radius:6px">
          <div><div style="font-weight:700;font-size:.83rem">Browser Notifications</div>
          <div style="font-size:.7rem;color:#969696;margin-top:2px">Overdue, disrupted, due-today alerts</div></div>
          <button class="fbtn fbtn-save" style="background:${notifPerm==='granted'?'#05A550':'#0072EC'}" onclick="enableNotif()">${notifPerm==='granted'?'✅ On':'Enable'}</button>
        </div>`;
  }
  modal.innerHTML=`
    <div class="modal-head"><span class="modal-title">⚙️ Settings</span>
      <button class="modal-close" onclick="showSettings=false;render()">✕</button>
    </div>
    <div class="modal-body">
      <div class="stabs">${tabs.map(t=>`<div class="stab${stab===t.id?' active':''}" onclick="stab='${t.id}';render()">${t.label}</div>`).join('')}</div>
      ${body}
      <div class="form-actions" style="margin-top:14px">
        <button class="fbtn fbtn-cancel" onclick="showSettings=false;render()">Close</button>
      </div>
    </div>`;
  ov.appendChild(modal);root.appendChild(ov);
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
render();
setInterval(checkNotifs,30000);
</script>
</body>
